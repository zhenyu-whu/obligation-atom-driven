name: production-default-acceptance-driven
version: 2
description: 面向 Greenfield 完成后的生产演进工作流：保持 OpenSpec default proposal -> specs -> design -> tasks 模式，增加轻量 scope coverage、AC 验收切片、固定 Test ID、可重跑证据和永久回归测试沉淀；不依赖 openspec/orchestrate、change plan、全局编号表或 proposal 前置 source artifact
artifacts:
  - id: proposal
    generates: proposal.md
    description: default-style proposal，带轻量 change scope coverage
    template: proposal.md
    instruction: |
      创建 proposal，说明 WHY 此 change 必要、WHAT 会改变、哪些 capability 受影响，以及后续 specs/design/tasks 如何覆盖本 change 的 material scope。

      核心规则：
      - 本 schema 用于 Greenfield 项目完成后的后续新增、修改和修复。它遵循 OpenSpec default schema 的 proposal/specs/design/tasks 心智，不消费 `openspec/orchestrate`、change plan、final change packet、全局编号表或 capability anchor packet。
      - proposal 的主要输入是用户请求、现有 `openspec/specs/`、现有代码、当前产品行为，以及用户显式提供的 issue、设计稿、外部文档或调研结论。不得要求创建 `source-truth.md`、独立 `acceptance.md`、旧版 source coverage artifact、`change-source-map.md` 或任何 proposal 前置 artifact。
      - 若用户请求本身足够明确，优先用它定义 change boundary；若请求含糊，先读取现有 specs/code 建立 baseline，并在仍无法安全判断时只提出必要澄清。
      - 若 change 修改 existing capability，读取对应 `openspec/specs/<capability>/spec.md`。若新增 capability，使用 kebab-case capability 名称。
      - Proposal 必须包含 `Change Scope Coverage`，用 change-local `SI-###` 标识 material scope item。`SI-###` 只在本 change 内有效，不是全局编号。
      - `Artifact Handling` 允许值为 `spec`、`guard`、`design`、`proof`、`context`。`spec` 表示应进入 requirement/scenario；`guard` 表示 non-goal、MUST NOT、preserve 或明确负向边界；`design` 表示主要由 design 决定实现形态；`proof` 表示主要由 tasks/test/evidence 验证；`context` 只提供背景，不生成实现范围。
      - 下游 artifacts 必须引用 exact `SI-###`，不得使用 ranges。每个 material scope item 必须有 downstream coverage expectation。
      - Proposal 可以保留 open design decisions，但不得把尚未确认的实现选择伪装成用户已要求的产品范围。
      - 当用户请求描述可见操作或控件能力时，proposal 必须保留具体 operation verb 和可观察结果：触发入口、作用对象、相关 API/data mutation、成功后的页面或持久化变化，以及 disabled/failure/recovery 边界。

      写入前：
      - 读取现有 `openspec/specs/` 中相关 capability spec。没有相关 spec 时记录为 new capability。
      - 按需读取现有代码、测试、配置和路由，确认 baseline 与影响面；不要做无边界的全仓库探索。
      - 若用户提供外部输入，读取相关片段并记录到 `Baseline / Input Read Set`。
      - 建立 scope item list，并为每个 material item 分配 `SI-###`。

      阻断条件：
      - 用户请求与现有 spec 或代码 baseline 冲突，且无法通过 proposal 里的 open question 安全表达。
      - 无法判断 change 是新增 capability、修改 existing capability、还是只属于实现/测试/运维修复。
      - 发现本 change 会破坏已归档或现有 specs 的明确 MUST/MUST NOT，且用户没有要求修改该 capability。
      - scope item 缺少 artifact handling 或 downstream coverage expectation。

      必需章节：
      - **Why**
      - **Baseline / Input Read Set**
      - **What Changes**
      - **Capabilities**
      - **Change Scope Coverage**
      - **Non-Goals**
      - **Impact**
      - **Rollout / Readiness**
      - **Open Questions**
      - **Proposal Alignment Gate**
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: default OpenSpec delta specs
    template: spec.md
    instruction: |
      创建 OpenSpec delta specification files，定义 production system 应该做什么。

      写入前：
      - 读取 `proposal.md`，使用 `Change Scope Coverage` 作为 scope-reading interface。
      - 只为有 `Artifact Handling: spec` 或 `Artifact Handling: guard` 的 capability 创建 delta spec。只有 `design`、`proof` 或 `context` scope item 时不得创建空 spec。
      - 修改 existing capability 前，读取 `openspec/specs/<capability>/spec.md` 并保持 capability folder name。
      - 建立 capability-to-scope map。每个 `spec` scope item 必须落到 requirement/scenario；每个 `guard` scope item 必须落到 guard、MUST NOT、non-goal 或 Production Alignment Gate。

      Delta operations：
      - 新行为使用 `## ADDED Requirements`。
      - 变化行为使用 `## MODIFIED Requirements`，修改前必须复制完整 existing requirement block。
      - 删除行为只在有 **Reason** 和 **Migration** 时使用 `## REMOVED Requirements`。
      - 重命名只在有 `FROM:` / `TO:` 时使用 `## RENAMED Requirements`。

      Format requirements：
      - 每个 requirement 使用 `### Requirement: <name>`。
      - Requirement names 和 scenario names 由 agent 拟定时优先中文；只有 existing requirement name、API/DB/package identifiers 或稳定技术术语才保留英文。
      - Requirement 正文使用 SHALL / MUST / MUST NOT 表达规范行为。
      - 每个 requirement 必须包含 `Scope Items:` bullets，列出 exact `SI-###` 和简短 scope 摘要。
      - 每个 requirement 必须包含 `Baseline Trace:` bullets，列出用户输入、existing spec、代码路径、路由/API、数据表、配置、测试或外部输入来源；没有外部来源时说明来自用户请求。
      - 每个 scenario 使用 `#### Scenario: <name>`，且必须使用 exactly 4 hashtags。
      - 每个 requirement 必须至少有一个 scenario。
      - 若 requirement 包含多个用户可见操作，scenario 必须逐项枚举或拆分；每个操作要定义触发、预期 UI/API/data 后果、持久化或 reload 后结果，以及适用的 disabled/failure/recovery 行为。

      Final alignment gate：
      - 每个 spec file 必须以 `## Production Alignment Gate` 结束。
      - Gate 必须列出 covered scope items、artifact handling、baseline/input consumed、product workflow coverage、architecture/module coverage、data/API/backend coverage、auth/security/privacy coverage、async/realtime/worker coverage、storage/asset coverage、observability/ops/deployment coverage、verification coverage 和明确边界/负向行为 coverage。
      - 如果任何 spec-relevant scope item 未被 requirement/scenario 或 guard 表示，停止并修订 proposal/specs。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: production design for the accepted spec delta
    template: design.md
    instruction: |
      创建设计文档，说明 HOW to implement the production change。

      写入前：
      - 读取 proposal 和所有实际生成的 delta specs；不要期待纯 design/proof-only capability 有 spec file。
      - 使用 proposal 的 `Change Scope Coverage`、spec `Scope Items`、spec `Baseline Trace` 作为 scope-reading interface。
      - 按需读取现有代码、测试、配置、数据库 schema、路由/API 和相关 specs，确认 design 能落到真实 production boundary。
      - 起草前建立 design coverage map。每个 spec requirement/scenario、每个 `Artifact Handling: design` item、每个 `guard` item，以及每个需要 implementation placement 的 material scope item 都必须映射到 design decision、guard handling 或 explicit blocker。

      Design-specific constraints：
      - Design 必须追溯到 proposal/specs、用户输入或现有 baseline。无法追溯的设计选择必须删除或记录为 open question。
      - 当 scope 定义行为但未定义实现形态时，design 必须选择最小 production-compatible technical shape，并说明为什么不扩大到更大的产品范围。
      - Design 不得把生产行为替换成 placeholder、diagnostic、mock-only、static-only、fixture-only 或 sandbox-only 行为，除非 proposal 明确标记为 deferred、non-goal、context 或 proof-only。
      - Design 必须说明 change 如何处理 architecture/runtime/module boundaries、routing/navigation、data ownership、transactions、auth/security、async processing、realtime streams、storage、provider boundaries、rendering chain、deployment 和 verification strategy。
      - 对每个会改变数据、状态、route 或用户可见结果的 UI control，Frontend / UX Design 必须定义 owner component、runtime/client-server boundary、event trigger、handler/action/API route、request payload、response merge 或 reload persistence、submitting/disabled/error/retry behavior。

      必需章节：
      - **Context**
      - **Goals / Non-Goals**
      - **Baseline / Scope Map**
      - **Decisions**
      - **Architecture / Module Boundary Design**
      - **Domain / Data / Migration Design**
      - **API / Auth / Security Design**
      - **Async / Realtime / AI / Worker Design**
      - **Frontend / UX Design**
      - **Observability / Ops / Deployment Design**
      - **Verification Design**
      - **Rollout / Compatibility**
      - **Production Alignment Gate**
      - **Risks / Trade-offs**
      - **Open Questions**

      `Production Alignment Gate` 必须回答：
      - 哪些 `SI-###` 被 implemented、preserved、deferred 或作为明确边界/负向 guard。
      - 每个 artifact handling 是否被正确消费，尤其是 `design`、`proof` 和 `guard` 是否没有被伪装成 spec requirement。
      - 每个 spec scenario 是否有 design 中对应的 implementation contract。
      - 每个 data mutation 是否在适用时有 table/column/constraint/transaction/idempotency details。
      - 每个 route/API/auth path 是否在适用时有 request/session/response/error handling details。
      - 每个 UI state 是否在适用时有 owner component、transition trigger、disabled/failure/recovery behavior 和 responsive handling。
      - 是否仍有需要 implementer 从 proposal/spec/design 外部推断的行为。
    requires:
      - proposal
      - specs

  - id: tasks
    generates: tasks.md
    description: acceptance-driven implementation checklist with fixed proof
    template: tasks.md
    instruction: |
      创建 task list，将 production implementation work 拆成以 acceptance 为完成标准的执行清单。

      目的：
      - 本 schema 没有独立 `acceptance.md`。`tasks.md` 是 apply-ready execution and acceptance contract。
      - Tasks 必须按 acceptance slices 分组。每个 AC 描述 user/system-observable behavior、覆盖的 scope items、spec/design 依据和所需 primary evidence。
      - 一个 AC 可以包含多个 implementation tasks，并且必须至少包含一个 verification 或 acceptance task，其 proof 强度足以验收该 AC。
      - 所有 tasks 完成表示 implementation 和 acceptance proof 完成；不得把最终验收延后到独立 artifact。

      写入前：
      - 读取 proposal、所有实际生成的 delta specs 和 design。
      - 建立 scope items、artifact handling、spec scenarios、design decisions、AC sections、checkbox task IDs、coverage table references、Runtime Appendix rows 和 Test Evidence rows 的索引。每个 coverage table task ID 必须解析到实际 checkbox task。
      - 先建立 runtime acceptance model，再把该模型分层写入 `Runtime Acceptance Index`、AC-local execution contracts、checkbox tasks 和 `Verification Appendix`。
      - 建立 runtime provision graph：列出每个 runtime surface / operation / state / branch / chain / Test ID 由 baseline、current-change AC、future change 还是 explicit negative boundary 提供，并区分每个 AC 的 `provides`、`consumes`、`depends-on` 和 `start-gate`。AC sections 必须按该 graph 的拓扑顺序生成。
      - 建立 ownership resolution map：区分 `Scope/Artifact Owner AC`（负责 proposal/spec/design coverage）与 `Runtime/Test Evidence Owner AC`（负责 runtime rows、Test Evidence row、fixed command 和 execution evidence）。两者冲突时，AC-local `Runtime Rows Owned:`、`Test IDs:` 和 checkbox `Runtime Rows:` / `Test IDs:` 一律以 `Runtime Acceptance Index` / `Test Evidence Matrix.AC ID` 为准；coverage tables 只能记录 handoff，不得把非 owning AC 的 Test ID 塞进 scope/artifact owner AC。
      - 若某个 AC 的 primary proof、fixed command 或 Required Evidence 消费 current-change 内尚未由 baseline 或 earlier AC 提供的 API、DB、repository、auth、route、worker、queue、provider、storage、config 或 runtime state，必须在生成阶段重排、合并 AC、把 provider work 内联到该 AC，或生成更早的 provider AC。
      - 写入时必须明确 artifact information ownership：coverage tables 只负责 proposal/spec/design coverage；`Runtime Acceptance Index` 只负责 AC 到 row/Test ID 的路由；AC section 是人工审阅和 worker 执行主入口；`Verification Appendix` 是 runtime row 详情、fixed commands、evidence directories、fixture boundaries 和 CI runnable 状态的唯一事实来源；`Regression Test Deposit` 是永久回归测试文件、常规回归命令、行为断言 oracle 和“不测实现细节”边界的唯一事实来源。
      - 如果某个 scope item/scenario/design decision 的 coverage AC 与 runtime proof AC 不同，必须在 coverage row 的 `Acceptance Slice IDs` / `Acceptance Proof` 中写明 handoff；`Implementation Task IDs` 可以指向 scope/artifact owner 的实现任务，`Verification Task IDs` 必须指向 runtime/Test Evidence owner AC 的 final verification task。不要为了让 coverage row 看起来同 AC 而创建引用外部 Test ID 的伪 task。
      - Testing Quality Core 不可选：每个 change 的 `tasks.md` 都必须包含 `Test Layer Plan`、`Test Evidence Matrix`、verification evidence plan fields和 `Regression Test Deposit`。complexity gate 只能决定 runtime detail matrices 的展开深度，不能关闭分层测试、固定证据、verification plan或永久回归沉淀计划。
      - 写入时必须先建立 `Test Layer Plan`，再写 `Test Evidence Matrix`。`Test Layer Plan` 必须按 AC/behavior 列出需要的 unit、component、route/API contract、DB/integration、browser E2E、security/negative、config/ops/check 等测试层；每个被省略的适用层都必须有 scope-backed 不适用理由。
      - `Test Layer Plan` 是不可降级的分层测试契约。`Required Layers` 中每个适用层都必须映射到独立 exact `T-###`；同一 `T-###` 不得同时代表 unit、component、route/API contract、DB/integration、browser E2E、security/negative 或 config/ops/check 等多个 required layer。
      - 一个 `Test ID` 的 `Layer` 只能是单一稳定类别。若一个物理测试文件覆盖多个层，必须在 `Test Evidence Matrix` 中拆成多个 Test ID、稳定 test name/filter、固定命令和 evidence row；不得用一个 broad smoke/e2e script 同时登记为 unit/component/API/DB/security 的 primary proof。
      - smoke、browser E2E、staging smoke、ops check 或 final summary 只能登记其真实层级，可作为 supplemental/default-path proof；不得填入 unit/component/route/API/DB/security 层来替代可低层稳定断言。只有行为确实没有稳定低层 contract boundary 时才可省略低层，并且理由必须解释为什么该层不适用，不能写“已有 smoke 覆盖”或泛泛的“需要真实 readback”。
      - 写入或更新 `Test Evidence Matrix` 与 `Regression Test Deposit` 前，必须读取并遵守 `openspec/schemas/shared/verification-regression-gates.md`。required behavior 的测试计划必须定义可重跑验证命令、证据目录、行为 oracle 和永久回归沉淀计划；tasks 阶段不得把尚未执行的验证登记为新增/变更行为的验收证据。
      - 生成 `Test Evidence Matrix` 时必须把每个 `T-###` 的计划执行闭环写清楚：root-relative fixed command、canonical evidence directory、预期 harness-owned `ledger.json`、`command.log` 或 runner/CI result/report 类型、CI/root/package 入口，以及最终 audit 可重跑的最小 regression command。tasks 阶段不得声称新 required behavior 已 passed/deposited；实际执行结果、`Evidence Produced` 实际路径和 deposit 状态由 apply 阶段更新。
      - `ledger.json` 是 apply-stage evidence harness 或 CI artifact collector 的执行账本。tasks 只把它列为预期 evidence category，并描述 runner/harness artifact 契约；canonical `ledger.json`、`command.log` 和 evidence path 的生成由 apply/CI harness 管理。

      Runtime acceptance model 原则：
      - 每个 runtime row 必须回链到 proposal scope item、spec requirement/scenario、design decision 或明确的 proof requirement。无法回链的 row 只能作为非阻断工程辅助，不得成为 AC scope、产品行为或完成门禁。
      - 通用 web 最佳实践只能用于选择 proof 形态、测试层级和 evidence 强度，不能产生用户未要求且 specs/design 未承接的 route、control、state、API、job、event、provider、storage、retry、offline、toast 或 lifecycle 行为。
      - 如果 proposal/spec/design 中出现 operation verbs、status enum、stage、terminal state、failure branch、disabled/loading/empty/retry/recovery branch、async queue/worker/provider/SSE/storage chain、auth/security branch 或 responsive variant，tasks 必须把它们抽取成 runtime acceptance model rows。
      - runtime detail matrices 可按实际 runtime 触达面最小化，但不能删除。若 change 确实不触及 route/control/API/data mutation/auth/DB/worker/SSE/storage/provider/state/branch，对应 `Runtime Surface Inventory`、`Operation Coverage Matrix`、`State / Branch Coverage Matrix`、`Async / Realtime Chain Matrix` 可以只保留最小 `Not applicable` 行，并必须写明 scope-backed 理由。只要 proposal/spec/design/tasks 任一处出现对应 runtime 行为，就必须展开对应矩阵行。
      - AC sections 必须按 externally meaningful user/system acceptance behavior、terminal state、failure/recovery branch 或 async chain segment 分组，不按文件分组。
      - 每个 AC section 必须至少有一个 final verification / acceptance checkbox，并在 `Primary Proof`、`Required Evidence` 和 coverage rows 中被引用。

      测试计划契约原则：
      - 测试计划必须从 behavior contract 反推，而不是从私有 helper、当前组件层级、className、调用次数或临时实现分支反推。
      - 每个 `Scope Role = required behavior` 的 Test ID 默认必须遵守 `openspec/schemas/shared/verification-regression-gates.md` 的 Verification Gate、Execution Gate、Behavior Oracle 和 Mock Policy。若执行验证不适用，必须在 `Test Evidence Matrix` 的 `Evidence Status` 和 `Regression Test Deposit` 中写明 scope-backed reason。
      - 每个 required behavior Test ID 都必须优先选择最小充分测试层：纯规则/解析/校验/映射/脱敏/状态机用 unit；组件状态、表单、编辑器、权限态和错误态用 component；route/DTO/auth/response contract 用 route/API contract；事务、幂等、索引、迁移和持久化 invariant 用 DB/integration；queue/worker/retry/补偿用 worker/job integration；跨页面真实用户路径用 browser E2E；明确 MUST NOT、未授权、敏感字段等稳定负向契约用 security/negative 或 config/ops/check。最小充分层拥有 primary proof ownership，不得被更高层 smoke/browser Test ID 替代。
      - 测试层级代码要求属于 `openspec/schemas/shared/verification-regression-gates.md` 和 apply/evidence/final gate。tasks 阶段只登记预期 `Layer`、`Default Path Level`、`Test File / Name`、covered rows、fixture/mock boundary、omitted-layer reason 和预期 evidence 类型；不得声称测试代码已满足 harness/runtime。
      - 写入 `Test Evidence Matrix.Layer` 时，只使用稳定类别：unit、component、route/API contract、DB/integration、worker/job integration、realtime/SSE integration、browser E2E、visual/responsive、security/negative、config/ops/check。具体适用性按 `Test Layer Plan` 的最小充分层原则和 shared gate 判定；目录名、文件名、脚本名、截图或 agent 口述不能提升层级。
      - 若某 behavior 需要真实 component/browser/API/DB/worker/SSE/visual/security/config proof，tasks 只把该需要登记为独立 Test ID、default-path expectation 和 omitted-layer reason；实际 harness/runtime 证明由 apply/evidence/final gate 完成。
      - 不得为“防止未来新增能力”生成全仓结构冻结式 guard 测试或默认门禁，例如完整 route/file/table allowlist、禁止未来 package/API route/DB table、或按当前源码清单断言必须完全相等。只有当用户显式要求架构冻结，且该冻结本身是稳定产品/安全契约时，才可生成这类检查；否则应把边界拆到对应 production owner 的稳定负向行为测试，或在 design/tasks 中作为非阻断说明记录。
      - 不得把私有 helper、mock 调用次数、非契约 DOM 层级、className、快照全文、`data-testid` 存在、按钮 enabled 或当前实现输出登记为 required behavior 的 primary proof 或永久回归 oracle。
      - required behavior 的 Test Evidence row 必须给出唯一 `Fixed Command`、`Verification Expectation` 和计划态 `Evidence Status`。`Verification Expectation` 必须匹配 scope/spec/design 行为契约，不能计划为语法、fixture、环境或测试自身错误。
      - 如果某个 baseline/preserve/proof-only Test ID 不需要执行验证，tasks 阶段必须把该 Test ID 明确登记为 preserve/baseline/not-applicable proof 并记录 reason；新增或变更行为默认保持 `planned`，直到 apply 阶段产出 execution evidence。
      - `Fixed Command` 是计划态固定命令；tasks 阶段不得声称 verification 阶段已通过，也不得把 planned oracle 改成匹配当前实现输出。
      - Mock 只能隔离外部、慢速或非确定性边界；不得断言 mock 行为本身，不得为了测试向 production code 增加 test-only API。每个 mock/fixture 必须说明被替代的真实 side effects 以及由哪个 default-path proof 覆盖。
      - 每个 required behavior Test ID 在 tasks 阶段必须有 fixed command、canonical evidence directory、预期执行证据类型和 `Regression Test Deposit` 计划行；执行证据由 apply/evidence/final gate 产出和检查。proof-only、config/ops/check、staging-only 或一次性 readiness 可写 not-applicable，但必须给出 scope-backed 理由。
      - 对用户可见状态、route/API/DTO/auth、data mutation/persistence/security、worker/SSE 或其它跨边界 behavior，tasks 只负责在 `Test Layer Plan` 中登记 required/supplemental/omitted layers、独立 Test ID、primary proof layer 和 omitted-layer reason；不得展开 runtime proof 实现方式。
      - 若只计划 smoke/browser/default-path proof，tasks 必须记录为什么可低层稳定断言不适用，并把该理由同步到 `Regression Test Deposit`。具体 proof 是否满足低层责任由 apply/shared gate 检查。
      - `Regression Test Deposit` 的 `Deposit Status` 为 `required` 只表示计划，不表示已沉淀。tasks 生成阶段新增/变更 required behavior 默认必须保持 `required`，或以 `blocked` / `not-applicable` 记录 scope-backed 理由和后续 gate；不得在 `required` 状态下宣称 implementation 已完成或 ready。
      - `Regression Test Deposit.Permanent Test File` 在 tasks 阶段只登记 production owner-local 长期测试文件或稳定 runner entry；不得登记 change-scoped、evidence-only 或 `openspec-results/**` / `test-results/**` path 作为永久测试代码。具体 owner placement 是否匹配测试层由 apply/shared gate 检查。OpenSpec evidence ledger 由 apply/CI harness 管理。
      - 永久回归测试必须计划为可被常规回归入口触达：优先使用 package/root test script、稳定 Playwright/Vitest file/filter、或已登记的 smoke/e2e/ops script。若 `Regression Command` 不能从仓库根目录稳定执行，或 `CI Runnable?` 只是口头 yes 而无 root/package/CI 入口说明，该 Test ID 不得计划为已完成。
      - `deposited` 是 apply/final 状态；完整 evidence 条件由 apply/evidence/final gate 判定。tasks 生成阶段不得把新增/变更 required behavior 写成 `deposited`；若引用已有 baseline/preserve evidence，必须写明 reason 和证据来源。

      Task-writing constraints：
      - 严格遵循 checkbox format。
      - 按 `## AC-### <short acceptance slice name>` headings 分组。short acceptance slice name 应优先中文，除非它是 exact source-native identifier。
      - 每个 AC section 必须包含 non-checkbox fields：`Acceptance:`、`Scope Items:`、`Artifact Handling:`、`Spec:`、`Design:`、`Runtime Rows Owned:`、`Test IDs:`、`Prerequisites:`、`Provides:`、`Consumes:`、`Start Gate:`、`No-Scope Boundary:`、`Primary Proof:`、`Required Evidence:`、`Mock / Fixture Boundary:`、`Mock Policy:`。
      - 每个 executable task 必须是 checkbox：`- [ ] AC-###.N Task description`。
      - Checkbox task descriptions 必须中文，除非 description 完全由固定 ID、commands、paths、code identifiers 或 source-native terms 构成。
      - 每个 checkbox 后必须跟随 indented trace block，字段为 `Trace:`、`Runtime Rows:`、`Test IDs:`、`Acceptance:`、`Proof:`、`Overrides:`。
      - `Trace:` 默认写 `inherits AC-###`。只有当该 task 的 scope/spec/design/no-scope/mock 边界比 owning AC 更窄或有例外时，才在 `Trace:` 或 `Overrides:` 中展开 exact override。
      - 每个 Test ID 必须使用 exact `T-###`，在整个 change 内唯一且只归属一个 AC。禁止 `T-005B`、`T-AC005-TRIAL-RESPONSIVE`、`T-001-smoke` 或任何带名称、AC 编号、slug、字母后缀的 Test ID。
      - AC section 的 `Test IDs:` 和 checkbox `Test IDs:` 只能由 `Test Evidence Matrix.AC ID` 反推，不能由 proposal/spec/design coverage row 或 artifact handling ownership 反推。若当前 AC 只承担 scope/artifact coverage 而 runtime proof 属于另一个 AC，则当前 AC 写 handoff summary，不列对方 Test ID。

      必需结构：
      - `## Acceptance-Driven Coverage`
      - `### Scope Item Coverage`
      - `### Requirement / Scenario Coverage`
      - `### Design Decision Coverage`
      - `## Runtime Acceptance Index`
      - `### AC Runtime Ownership Index`
      - one or more `## AC-###` sections
      - `## Verification Appendix`
      - `### Runtime Surface Inventory`
      - `### Operation Coverage Matrix`
      - `### State / Branch Coverage Matrix`
      - `### Async / Realtime Chain Matrix`
      - `### Test Layer Plan`
      - `### Test Evidence Matrix`
      - `### Regression Test Deposit`

      Matrix column constraints：
      - Coverage table 中的 task IDs 可以跨 AC 引用，但只表示 proposal/spec/design 覆盖关系，不改变 task 或 Test ID ownership。跨 AC 时 `Acceptance Proof` 必须说明 scope/artifact owner 与 runtime/Test Evidence owner 的 handoff；任一 referenced checkbox 的 `Test IDs:` 仍只能列它所在 AC 拥有的 Test IDs。
      - 当 `AC Runtime Ownership Index` / detail matrices 的 owning AC 与 coverage tables 的 scope/artifact AC 不一致时，runtime/Test Evidence owner 是 executable contract 的唯一归属。必须把 Test ID、Evidence Directory、Regression Deposit 和 final verification checkbox 留在 runtime owner AC；scope/artifact owner AC 只能通过 coverage row 或 AC text 引用 handoff summary。
      - `Test Layer Plan`、`Test Evidence Matrix` 和 `Regression Test Deposit` 是强制 Testing Quality Core，不得用 `Not applicable` 整表跳过。只允许对单个 Test ID、单个测试层或单个 deposit 行写 scope-backed `not-applicable` / `blocked` 理由。
      - runtime detail matrices 可以按需最小化：无对应 runtime 行为时保留最小 `Not applicable` 行；有 route/control/API/data mutation/auth/DB/worker/SSE/storage/provider/state/branch 时必须展开对应 row，不得用 broad proof 或 Test Layer Plan 替代 runtime row。
      - `Test Layer Plan` columns 至少包含：`AC ID`、`Behavior / Boundary`、`Scope Basis`、`Required Layers`、`Test IDs By Layer`、`Omitted Layers / Reason`、`Primary Proof Layer`、`Regression Entry`、`No-Scope-Expansion Check`。它必须解释为什么某个 behavior 只用 smoke/browser 或只用低层测试仍足够；不得留空。
      - `Test Evidence Matrix` columns 至少包含：`Test ID`、`AC ID`、`Fixed Command`、`Test File / Name`、`Layer`、`Covers Rows`、`Default Path Level`、`Fixture Boundary`、`Verification Expectation`、`Evidence Status`、`Requires Tests Passed`、`Evidence Directory`、`Evidence Produced`、`CI Runnable?`、`Scope Basis`、`Artifact Handling`、`Scope Role`、`No-Scope-Expansion Check`。`Default Path Level` 只能使用 `http-app`、`route-handler-real-service`、`component-user-flow`、`db-integration`、`service-contract`、`controller-contract`、`browser-e2e`、`static-analysis`；route/auth/query/tenant/DI 行为的 `controller-contract` 只能作为 supplemental proof，必须配对 `http-app` 或 `route-handler-real-service`。`Test File / Name` 必须引用按 production owner 放置的长期 test/spec 文件或稳定 runner entry，不得引用 change-scoped 聚合目录。tasks 阶段 required behavior 可停留 `planned`；apply/final 完成时只能是 `passed`、`not-applicable` 或 evidence-level `blocked`，其中只有 `passed` 可作为 success proof 或 deposited regression。
      - `Evidence Directory` 必须计划为 `openspec-results/<change-slug>/<AC-ID>/<Test-ID>/`，其中 `<Test-ID>` 必须匹配 `T-[0-9]{3}`。tasks 阶段只登记 canonical directory；实际 evidence 保存、复制和 curated artifacts 由 apply/evidence/final gate 检查。需要产出截图、trace 或 machine-readable facts 时，使用 runner artifact/attachment、测试框架 output directory 或由 evidence harness 注入的临时 artifact directory。
      - 每个 Test ID 的 `Evidence Produced` 必须列出预期 artifact categories，例如 harness-owned `ledger.json`、`command.log`、runner/CI result/report、screenshot、trace、DOM snapshot、API facts、DB facts、job/event facts、log/audit facts 或 failure trace。实际文件存在性和内容一致性由 apply/evidence/final gate 检查。
      - `Fixed Command` 和 `Regression Command` 必须是真正能定位该 Test ID 的最小命令。不得使用 `pnpm test -- <file> -t <name>`、`pnpm test:e2e -- <file> -t <name>` 或任何 `pnpm test* -- ...` 透传 file/filter 的形式作为单个 Test ID 的固定命令；这类参数容易被 runner 当作 `--` 后的 positional args 而导致整包/整目录测试被运行。需要 file/name filter 时，使用 `pnpm exec vitest run ... <file> -t <name>`、`pnpm exec playwright test ... --grep ...`、或为该 Test ID 建立专用 package/root script。
      - `Test IDs By Layer` 必须对 `Required Layers` 中每个适用层使用不同 exact `T-###`。同一 Test ID 不得出现在多个 required layer 下；若某层只是 supplemental 或 not-applicable，必须在该层 cell 中标明并指出唯一 primary layer。
      - `Test Evidence Matrix` 的 `Layer` 必须是单一层级，禁止写 `browser E2E + route/API + DB integration` 这类组合层；组合 proof 必须拆成多行、多 Test ID、多固定命令或稳定 filter。
      - `Regression Test Deposit` 一行可以列同一 AC 的多个 Test ID，但每个 Test ID 必须已有独立 Evidence row。不得把多个测试层折叠到同一个 smoke/evidence-only 文件，除非该文件内存在可由稳定 test name/filter 区分的长期测试，并且每层都有独立 regression command。
      - `Regression Test Deposit` 的 `Permanent Test File` 不得只指向 `openspec-results/`、`test-results/`、agent 临时脚本、`openspec/changes/**`，或只为当前 change 存在的 evidence-only / change-scoped feature bucket。除 `not-applicable` 外，必须指向按 production owner 放置的可持续维护 test/spec 文件，或稳定 smoke/e2e/ops 测试入口；禁止用 `tests/<change-slug>/` 或 `tests/<change-slug-prefix>/` 承载 unit、domain、DB、API、component 等 owner-local 测试。
      - `Regression Test Deposit = deposited` 是 apply/final 完成状态。tasks 阶段新增/变更 required behavior 不得写成 `deposited`；若登记 baseline/preserve `deposited`，只允许引用已有测试入口并写明 evidence reason。新增/变更 behavior 的具体写入条件由 apply/evidence/final gate 负责。

      Proof strength planning：
      - tasks 阶段只登记 required proof categories 和 expected evidence types，不展开执行方式。用户可见、API/data、worker/SSE、auth/security/privacy、failure/recovery 等行为必须映射到相应 Test ID 和 detail rows。
      - 实际 browser/component/API/DB/worker/SSE/visual/security/config proof 的 runtime 执行、readback、artifact 和日志事实由 apply/evidence/final gate 检查。

      Final check：
      - 确认每个 `SI-###` 在 proposal、specs、design、AC sections、task overrides 与 coverage tables 中一致或有明确 handoff 理由。
      - 确认 scope/artifact owner 与 runtime/Test Evidence owner 已解析：若同一 `SI-###`、scenario 或 design decision 的 implementation/proof 跨 AC，coverage row 必须写明 handoff，且所有 AC-local `Test IDs:` / checkbox `Test IDs:` 仍只引用本 AC 拥有的 Test IDs。
      - 确认每个 in-scope requirement scenario 映射到 AC section。
      - 确认每个 material design decision 映射到 AC section。
      - 确认 `Runtime Acceptance Index` 中每个 owning row 都能解析到 AC-local `Runtime Rows Owned:`、`Test IDs:`、checkbox `Runtime Rows:` / `Test IDs:` 和 `Verification Appendix` detail matrix rows。
      - 确认 AC section 输出顺序是 runtime provision graph 的拓扑序。
      - 确认每个 required behavior、preserve boundary 和 proof-only guard 都在 `Test Layer Plan` 中有测试层选择；省略 unit/component/API/DB/browser/security/config 等适用层时必须有 scope-backed 理由，且理由不能只是“已有 smoke 覆盖”。
      - 确认 `Required Layers` 中每个适用层都有独立 Test ID，且没有同一 Test ID 被登记为多个 required layer 或组合 `Layer`。若只有 smoke/browser Test ID 覆盖多个可低层断言，tasks 不可 final。
      - 确认每个 Test ID 有 fixed command、canonical evidence directory、预期 evidence produced 类型和 local/CI runnable 标记，并出现在 owning AC 的 `Test IDs:` 和相关 checkbox trace 中。
      - 确认每个 checkbox task 的 `Test IDs:` 都能在 `Test Evidence Matrix` 中解析，且每个 Test ID 的 owning `AC ID` 等于 checkbox 所在 AC；任何 scope/artifact owner AC 引用 runtime owner AC Test ID 的情况都是 blocker，必须改为 coverage handoff、移动 task、拆分 Test ID 或调整 runtime ownership。
      - 确认每个 required behavior Test ID 计划满足 `openspec/schemas/shared/verification-regression-gates.md`：有唯一 `Fixed Command`、来自 scope/spec/design 行为契约的 `Verification Expectation` 和计划态 `Evidence Status`；不得把尚未执行的验证登记为新增/变更行为的 success proof。
      - 确认每个 required behavior Test ID 在 `Regression Test Deposit` 中有永久回归沉淀计划或 scope-backed `not-applicable` 理由；沉淀行必须包含按 production owner 放置的可维护 test file、最小回归命令、behavior contract、assertion oracle、fixture boundary、CI tier 和明确的 `Not Testing` 实现细节边界，不得把 unit/domain/DB/API/component 测试集中到 change-scoped `tests/<change-slug-prefix>/` 目录。
      - 确认新增/变更 required behavior 的 `Regression Test Deposit` 不被写成 `deposited`，除非引用已有 baseline/preserve evidence 并写明 reason；不得以 `required` 作为 implementation 完成状态。
      - 确认每个永久回归命令计划能从仓库根目录稳定执行，并且可通过 root/package script、CI job、稳定 test file/filter 或登记的 smoke/e2e/ops script 触达；未接入常规回归入口的测试只能计划为临时 evidence，不能计划为 deposited。
      - 确认没有 implementation-detail tests 被登记为 primary proof 或永久回归沉淀。
      - 确认每个 coverage table task ID 解析到 checkbox task，且每个 AC 有 final verification/acceptance checkbox。
      - finalizing `tasks.md` 后必须执行 Testing Quality Core plan audit，并修复所有测试计划、默认路径、Test ID ownership、fixed command、verification evidence fields 和 Regression Test Deposit 缺口。该 audit 是 Testing Quality Core 的结构自查，不替代人工 proposal/spec/design 审查，也不替代 apply 阶段的验证执行。
    requires:
      - proposal
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    编码前读取 proposal、specs、design 和 tasks。

    实现前建立 apply preflight index：
    - Proposal `Change Scope Coverage` rows、scope items、guard/context rows、artifact handling 和 baseline/input references。
    - Spec requirements/scenarios 及其 `SI-###` references。
    - Design decisions 及其 `SI-###` references。
    - AC sections、AC-local execution contract fields、checkbox task IDs、trace inheritance / overrides、coverage table rows、AC-owned Test IDs、Prerequisites/Provides/Consumes/Start Gate 和 proof/evidence requirements。
    - `Runtime Acceptance Index`：每个 AC 的 scope basis、runtime surface rows、operation rows、state/branch rows、async/realtime rows、Test IDs、Provides Rows、Consumes Rows、Depends On AC IDs、Prerequisite Test IDs、Start Gate、scope role、no-scope-expansion check 和 detail matrix row references。
    - `Verification Appendix`：`Runtime Surface Inventory`、`Operation Coverage Matrix`、`State / Branch Coverage Matrix`、`Async / Realtime Chain Matrix`、`Test Layer Plan`、`Test Evidence Matrix` 的全部 row IDs、scope basis、scope role、provider/consumer ownership、AC ID、Requires Tests Passed、Test IDs 和 no-scope-expansion checks。
    - `Test Layer Plan`：每个 AC/behavior 的 required test layers、Test IDs by layer、omitted layers / reason、primary proof layer 和 regression entry。Testing Quality Core 不可选；runtime detail matrices 只在确实无对应 runtime 行为时允许最小 `Not applicable` 行。
    - Test evidence matrix：每个 Test ID、owning AC ID、fixed command、test file/name、layer、covered row IDs、default path 标记、fixture boundary、verification expectation、evidence status、requires tests passed、canonical evidence directory、evidence produced 和 CI runnable 标记。
    - Regression test deposit：每个 AC/Test ID 的永久测试文件、最小回归命令、behavior contract、assertion oracle、fixture boundary、CI tier、Not Testing 边界和 deposit status。

    若 preflight index 发现 missing scope item coverage、unresolved task IDs、coverage table 跨 AC proof 缺少 handoff 说明、runtime index 缺失或与 AC-local contract 不一致、mandatory runtime row 缺少 scope basis / provider / consumer / AC ID / Test ID、缺少 `Test Layer Plan`、Test Layer Plan 未覆盖 required behavior / preserve boundary / proof-only guard、省略适用测试层但没有 scope-backed 理由、`Required Layers` 多层却复用同一 Test ID、同一 Test ID 被登记到多个 required layer、Test Evidence row 的 `Layer` 是组合层、smoke/browser/ops/final summary Test ID 被登记为 unit/component/API/DB/security primary proof、Omitted Layers reason 只是“已有 smoke 覆盖”或泛泛“需要真实 readback”、Test ID 不匹配 exact `T-[0-9]{3}`、同一 Test ID 出现在多个 AC-local contracts、checkbox 引用非 owning AC Test ID、缺少 fixed command、缺少 canonical evidence directory、Test File / Name 或 Regression Deposit Permanent Test File 使用 `tests/<change-slug-prefix>/`、`openspec/changes/**`、`openspec-results/**`、`test-results/**` 或其他 change-scoped/evidence-only path 承载永久测试代码、unit/domain/DB/API/component 等 owner-local 测试没有靠近对应 packages/apps production owner、required behavior Test ID 缺少 `Fixed Command` / `Verification Expectation` / `Evidence Status` 且没有 scope-backed not-applicable reason、required behavior Test ID 缺少 `Regression Test Deposit` 行、Regression Deposit 只停留在 `required` 且被当作完成、Regression Deposit 用 smoke/evidence-only 文件代表可低层稳定断言、永久回归命令不能从仓库根目录稳定执行、CI Runnable 缺少 root/package/CI 入口说明、AC consumes 后置 AC 才提供的 runtime row、Depends On AC IDs 形成循环、checkbox trace 字段缺失、缺少 final verification task、英文主导 task descriptions、用户可见操作只有 presence-only/static proof，或 proof 弱于 proposal/spec/design，暂停并更新 artifacts 后再编辑代码。

    测试层级代码门禁：
    - apply 阶段必须以 `openspec/schemas/shared/verification-regression-gates.md` 的 `Test Layer Code Requirements` 和 `Mock Policy` 作为执行准则；tasks 中的 `Layer`、`Default Path Level`、预期 evidence 或目录命名只是计划，不足以证明测试代码满足层级。
    - apply 前必须按 `Test Evidence Matrix.Layer` 打开或创建对应测试文件，确认实际 harness/runtime 与登记层级一致；若层级与代码 harness/runtime 不匹配，先修订 `Test Layer Plan` / `Test Evidence Matrix`，或补齐正确层级测试，不得用实现绕过。
    - `browser E2E` 行必须有真实浏览器 runtime marker（例如 Playwright/WebDriver/Cypress import、browser/context/page、`page.goto`、locator/getByRole、click/fill/select/press/submit、DOM/readback/screenshot/trace assertion）。没有这些 marker 的 `tests/e2e/**` 文件不得勾选 browser E2E Test ID；直接 import route handler、repository、server action、状态机或 component reducer 时必须改登记为 route/API、DB/integration、unit 或 component supplemental。
    - `component` 行必须有真实 component harness marker（mount/render 到交互 DOM、screen/getByRole/label/text、userEvent/fireEvent 或 framework interaction helper）。只用 `renderToStaticMarkup`、snapshot、字符串 DOM、reducer/state-machine 调用时，不得勾选 component primary proof。
    - `unit` 行不得触发真实 HTTP、浏览器 DOM、数据库事务、queue/worker 或 storage side effect；若实际测试跨越这些边界，必须改登记为对应 integration/component/API/browser 层，或补充正确层级 Test ID。
    - route/API 行必须调用实际 route handler、server action、API entry、RPC resolver 或 service contract boundary，并构造 Request/session/auth/context；DB/integration 行必须执行真实 database/repository/transaction/migration/readback/invariant path；worker/job、realtime/SSE、visual/responsive、security/negative 和 config/ops/check 行必须分别证明对应 production-compatible boundary。只证明 mock、fixture、私有 helper、静态文件存在或 broad command 通过时，必须先补测试或修 artifacts。

    Implementation 和 acceptance 在本 schema 中是同一个 workflow：
    - 按依赖顺序处理 AC sections。
    - 编辑任何 task 前，先读取当前 AC 的 AC-local execution contract：`Acceptance:`、`Scope Items:`、`Artifact Handling:`、`Spec:`、`Design:`、`Runtime Rows Owned:`、`Test IDs:`、`Prerequisites:`、`Provides:`、`Consumes:`、`Start Gate:`、`No-Scope Boundary:`、`Primary Proof:`、`Required Evidence:`、`Mock / Fixture Boundary:` 和 `Mock Policy:`。
    - 编辑任何 task 前，确认当前 AC 的 `Prerequisites:`、`Depends On AC IDs` 和 `Prerequisite Test IDs` 已完成且证据存在；若未满足，必须先处理前置 AC 或修订 tasks。
    - 编辑任何 task 前，读取该 task 的 `Trace:`、`Runtime Rows:`、`Test IDs:`、`Acceptance:`、`Proof:` 和 `Overrides:` 字段。`Trace: inherits AC-###` 表示 task 继承 AC-level scope/spec/design/no-scope/mock policy。
    - 不实现无法追溯到 proposal、specs、design 或现有 baseline 的行为。
    - 优先建立或补齐该 AC-local `Test IDs:` 和 task `Test IDs:` 对应的自动测试，并同时落实 `Regression Test Deposit` 中的永久回归测试。实现与验证完成后，运行同一 Test ID 的唯一 `Fixed Command` 证明通过。实现完成前，`Test Layer Plan` 中每个 required layer 对应的独立 Test ID 必须存在或有 evidence-level blocked/not-applicable 理由；实现后相关 Test IDs、最小 regression commands 和 execution evidence 必须通过。fixed command、typecheck、lint、test、oracle 或 evidence 缺口失败默认是未完成工作，worker 必须修复实现、测试、artifacts 或 evidence harness 并重跑；只有失败原因无法由 agent 在当前 change scope 内自主解除时，才可记录 evidence-level `blocked` 并返回流程级 blocker。
    - 为每个 required layer 创建或补齐符合该 layer code requirements 的测试代码。若实现过程中发现组件状态、DTO/route contract、DB invariant、security/privacy boundary 或纯规则可低层稳定测试，必须新增对应 Test ID、Evidence row 和 Regression Deposit 行；不得把新低层责任塞进既有 smoke/browser Test ID。
    - 如果 fixed command 失败、只证明 mock/fixture/实现细节存在，或验证 oracle 不符合 `Verification Expectation`，先修实现、测试或 artifacts；不得削弱测试 oracle 以获得通过。
    - fixed command 或等价 regression command 通过后，必须把 `Evidence Status`、`Evidence Produced` 和 `Regression Test Deposit.Deposit Status` 更新回 `tasks.md`。新增/变更 required behavior 只有在永久测试文件或稳定入口已存在、regression command 已由当前 worktree evidence 证明通过时，才能写成 `deposited`。
    - 如果某个 behavior 只由 smoke/browser E2E 覆盖，而该 behavior 存在可低层稳定断言的 rule、DTO、component state、API contract、DB invariant 或 security boundary，必须先补齐对应低层测试或更新 artifacts 写明不适用理由；不得用单一 smoke 脚本替代分层测试体系。
    - 除非 task 的 `Proof:` 已执行且 linked acceptance slice 达到所需 fidelity，否则不得标记 task complete。
    - 如果实现新增或发现新的 operation、state、branch、terminal outcome、async step、event、job、provider branch、storage branch、auth/security branch 或 responsive variant，先更新 `Verification Appendix`、`Runtime Acceptance Index`、owning AC-local contract、AC tasks 和 Test Evidence Matrix，再继续实现或勾选。
    - 对用户可见的 mutating/selection/action control，勾选相关 task 前必须通过实际 runtime surface 执行 user-equivalent interaction，并断言 handler/API 被触发、响应或持久化数据正确、rendered UI 更新且 reload/readback 后仍成立。
    - 执行 proof strength：browser E2E 必须来自真实浏览器交互；component 必须来自可交互 component harness；API、DB、worker、SSE、visual、security 和 config/ops proof 必须分别来自对应 runtime/boundary 的命令结果、readback、artifact 或日志事实。静态 DOM、截图、`data-testid`、enabled/disabled、API-only proof、mock response 或 broad command 只能作为补充，不能单独支撑 required behavior completion。
    - 测试相关 evidence 必须由 evidence harness 运行固定命令后生成或收集到 `openspec-results/<change-slug>/<AC-ID>/<Test-ID>/`，其中 `<Test-ID>` 必须匹配 `T-[0-9]{3}`。harness 负责清理或隔离目录、捕获 stdout/stderr 到 `command.log`、写入 harness-owned `ledger.json`、复制 runner/CI result/report 和索引截图、trace、DOM/API/DB/job/log facts。
    - 测试代码负责行为断言和 runner artifact/attachment 产出；canonical `ledger.json`、`command.log` 和 `openspec-results/<change-slug>/<AC-ID>/<Test-ID>/` 由 harness 管理。如果需要业务 readback facts，使用 runner report、machine-readable attachment 或 harness 注入的临时 artifact directory，由 harness 复制和索引。
    - 工作时维护 AC/Test-local execution evidence：没有当前 worktree 的命令输出、exit code、`command.log` 或 runner/CI result/report，且没有 harness-owned `ledger.json` 或等价 CI artifact index，不得勾选依赖该 Test ID 的 task。
    - 当前 AC final verification / acceptance checkbox 勾选前，必须执行 AC evidence audit 并修复本 AC 所有 execution evidence / deposit 缺口；AC-005/final proof 只能消费已经通过各自 AC evidence gate 的前置 evidence，不得把 final gate 作为前置 AC 执行证据的首次 canonicalization 检查。
    - 实现前必须执行 Testing Quality Core plan audit；该 gate 不要求 apply-owned evidence 已存在。当前 AC 完成前必须执行 AC evidence audit。最终 audit 前必须执行全量 Testing Quality Core final audit。`Regression Test Deposit` 停留 `required`、evidence final 状态不完整或 execution evidence 缺失等问题默认是 worker 必须修复的未完成工作；只有无法在当前 change scope 内自主解除时，才成为流程级 blocker。
    - 所有 tasks 勾选后，对三张 `Acceptance-Driven Coverage` 表、`Runtime Acceptance Index`、每个 AC-local contract、`Verification Appendix` 六张矩阵、`Regression Test Deposit` 和 `openspec/schemas/shared/verification-regression-gates.md` 的 verification/regression/anti-pattern gates 做最终 audit。只有 audit 通过后，change 才 ready for archive。
