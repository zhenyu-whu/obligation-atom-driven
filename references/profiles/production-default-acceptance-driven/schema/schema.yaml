name: production-default-acceptance-driven
version: 5
description: 面向 Greenfield 完成后的生产演进工作流：proposal -> specs -> design -> runtime-acceptance -> verification -> tasks，将 canonical runtime coverage 拆入 runtime-acceptance.md，并由 tasks.md 和 verification.md 分别投影实现验收与测试 oracle
artifacts:
  - id: proposal
    generates: proposal.md
    description: default-style proposal，带轻量 change scope coverage
    template: proposal.md
    instruction: |
      创建 proposal，说明 WHY 此 change 必要、WHAT 会改变、哪些 capability 受影响，以及后续 specs/design/verification/tasks 如何覆盖本 change 的 material scope。

      核心规则：
      - 本 schema 用于 Greenfield 项目完成后的后续新增、修改和修复。它遵循 OpenSpec default schema 的 proposal/specs/design 心智，并新增独立 verification artifact；不消费 `openspec/orchestrate`、change plan、final change packet、全局编号表或 capability anchor packet。
      - proposal 的主要输入是用户请求、现有 `openspec/specs/`、现有代码、当前产品行为，以及用户显式提供的 issue、设计稿、外部文档或调研结论。不得要求创建 `source-truth.md`、独立 `acceptance.md`、旧版 source coverage artifact、`change-source-map.md` 或任何 proposal 前置 artifact。
      - 若用户请求本身足够明确，优先用它定义 change boundary；若请求含糊，先读取现有 specs/code 建立 baseline，并在仍无法安全判断时只提出必要澄清。
      - 若 change 修改 existing capability，读取对应 `openspec/specs/<capability>/spec.md`。若新增 capability，使用 kebab-case capability 名称。
      - Proposal 必须包含 `Change Scope Coverage`，用 change-local `SI-###` 标识 material scope item。`SI-###` 只在本 change 内有效，不是全局编号。
      - `Artifact Handling` 允许值为 `spec`、`guard`、`design`、`proof`、`context`。`spec` 表示应进入 requirement/scenario；`guard` 表示 non-goal、MUST NOT、preserve 或明确负向边界；`design` 表示主要由 design 决定实现形态；`proof` 表示主要由 verification/runtime proof 验证；`context` 只提供背景，不生成实现范围。
      - 下游 artifacts 必须引用 exact `SI-###`，不得使用 ranges。每个 material scope item 必须有 downstream coverage expectation。
      - Proposal 可以保留 open design decisions，但不得把尚未确认的实现选择伪装成用户已要求的产品范围。
      - 当用户请求描述可见操作或控件能力时，proposal 必须保留具体 operation verb 和可观察结果：触发入口、作用对象、相关 API/data mutation、成功后的页面或持久化变化，以及 disabled/failure/recovery 边界。

      写入前：
      - 读取现有 `openspec/specs/` 中相关 capability spec。没有相关 spec 时记录为 new capability。
      - 按需读取现有代码、测试、配置和路由，确认 baseline 与影响面；不要做无边界的全仓库探索。
      - 若用户提供外部输入，读取相关片段并记录到 `Baseline / Input Read Set`。
      - 建立 scope item list，并为每个 material item 分配 `SI-###`。

      阻断条件：
      - 用户请求与现有 spec 或代码 baseline 冲突，且无法通过 proposal 里的 open question 安全表达。
      - 无法判断 change 是新增 capability、修改 existing capability、还是只属于实现/测试/运维修复。
      - 发现本 change 会破坏已归档或现有 specs 的明确 MUST/MUST NOT，且用户没有要求修改该 capability。
      - scope item 缺少 artifact handling 或 downstream coverage expectation。

      必需章节：
      - **Why**
      - **Baseline / Input Read Set**
      - **What Changes**
      - **Capabilities**
      - **Change Scope Coverage**
      - **Non-Goals**
      - **Impact**
      - **Rollout / Readiness**
      - **Open Questions**
      - **Proposal Alignment Gate**
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: default OpenSpec delta specs
    template: spec.md
    instruction: |
      创建 OpenSpec delta specification files，定义 production system 应该做什么。

      写入前：
      - 读取 `proposal.md`，使用 `Change Scope Coverage` 作为 scope-reading interface。
      - 只为有 `Artifact Handling: spec` 或 `Artifact Handling: guard` 的 capability 创建 delta spec。只有 `design`、`proof` 或 `context` scope item 时不得创建空 spec。
      - 修改 existing capability 前，读取 `openspec/specs/<capability>/spec.md` 并保持 capability folder name。
      - 建立 capability-to-scope map。每个 `spec` scope item 必须落到 requirement/scenario；每个 `guard` scope item 必须落到 guard、MUST NOT、non-goal 或 Production Alignment Gate。

      Delta operations：
      - 新行为使用 `## ADDED Requirements`。
      - 变化行为使用 `## MODIFIED Requirements`，修改前必须复制完整 existing requirement block。
      - 删除行为只在有 **Reason** 和 **Migration** 时使用 `## REMOVED Requirements`。
      - 重命名只在有 `FROM:` / `TO:` 时使用 `## RENAMED Requirements`。

      Format requirements：
      - 每个 requirement 使用 `### Requirement: <name>`。
      - Requirement names 和 scenario names 由 agent 拟定时优先中文；只有 existing requirement name、API/DB/package identifiers 或稳定技术术语才保留英文。
      - Requirement 正文使用 SHALL / MUST / MUST NOT 表达规范行为。
      - 每个 requirement 必须包含 `Scope Items:` bullets，列出 exact `SI-###` 和简短 scope 摘要。
      - 每个 requirement 必须包含 `Baseline Trace:` bullets，列出用户输入、existing spec、代码路径、路由/API、数据表、配置、测试或外部输入来源；没有外部来源时说明来自用户请求。
      - 每个 scenario 使用 `#### Scenario: <name>`，且必须使用 exactly 4 hashtags。
      - 每个 requirement 必须至少有一个 scenario。
      - 若 requirement 包含多个用户可见操作，scenario 必须逐项枚举或拆分；每个操作要定义触发、预期 UI/API/data 后果、持久化或 reload 后结果，以及适用的 disabled/failure/recovery 行为。

      Final alignment gate：
      - 每个 spec file 必须以 `## Production Alignment Gate` 结束。
      - Gate 必须列出 covered scope items、artifact handling、baseline/input consumed、product workflow coverage、architecture/module coverage、data/API/backend coverage、auth/security/privacy coverage、async/realtime/worker coverage、storage/asset coverage、observability/ops/deployment coverage、verification coverage 和明确边界/负向行为 coverage。
      - 如果任何 spec-relevant scope item 未被 requirement/scenario 或 guard 表示，停止并修订 proposal/specs。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: production design for the accepted spec delta
    template: design.md
    instruction: |
      创建设计文档，说明 HOW to implement the production change。

      写入前：
      - 读取 proposal 和所有实际生成的 delta specs；不要期待纯 design/proof-only capability 有 spec file。
      - 使用 proposal 的 `Change Scope Coverage`、spec `Scope Items`、spec `Baseline Trace` 作为 scope-reading interface。
      - 按需读取现有代码、测试、配置、数据库 schema、路由/API 和相关 specs，确认 design 能落到真实 production boundary。
      - 起草前建立 design coverage map。每个 spec requirement/scenario、每个 `Artifact Handling: design` item、每个 `guard` item，以及每个需要 implementation placement 的 material scope item 都必须映射到 design decision、guard handling 或 explicit blocker。

      Design-specific constraints：
      - Design 必须追溯到 proposal/specs、用户输入或现有 baseline。无法追溯的设计选择必须删除或记录为 open question。
      - 当 scope 定义行为但未定义实现形态时，design 必须选择最小 production-compatible technical shape，并说明为什么不扩大到更大的产品范围。
      - Design 不得把生产行为替换成 placeholder、diagnostic、mock-only、static-only、fixture-only 或 sandbox-only 行为，除非 proposal 明确标记为 deferred、non-goal、context 或 proof-only。
      - Design 必须说明 change 如何处理 architecture/runtime/module boundaries、routing/navigation、data ownership、transactions、auth/security、async processing、realtime streams、storage、provider boundaries、rendering chain、deployment 和 verification strategy；canonical RS-/OP-/ST-/CH- runtime row registry 不写入 design，必须由后续 `runtime-acceptance.md` 承载。
      - 对每个会改变数据、状态、route 或用户可见结果的 UI control，Frontend / UX Design 必须定义 owner component、runtime/client-server boundary、event trigger、handler/action/API route、request payload、response merge 或 reload persistence、submitting/disabled/error/retry behavior。

      必需章节：
      - **Context**
      - **Goals / Non-Goals**
      - **Baseline / Scope Map**
      - **Decisions**
      - **Architecture / Module Boundary Design**
      - **Domain / Data / Migration Design**
      - **API / Auth / Security Design**
      - **Async / Realtime / AI / Worker Design**
      - **Frontend / UX Design**
      - **Observability / Ops / Deployment Design**
      - **Verification Design**
      - **Rollout / Compatibility**
      - **Production Alignment Gate**
      - **Risks / Trade-offs**
      - **Open Questions**

      `Production Alignment Gate` 必须回答：
      - 哪些 `SI-###` 被 implemented、preserved、deferred 或作为明确边界/负向 guard。
      - 每个 artifact handling 是否被正确消费，尤其是 `design`、`proof` 和 `guard` 是否没有被伪装成 spec requirement。
      - 每个 spec scenario 是否有 design 中对应的 implementation contract。
      - 每个 data mutation 是否在适用时有 table/column/constraint/transaction/idempotency details。
      - 每个 route/API/auth path 是否在适用时有 request/session/response/error handling details。
      - 每个 UI state 是否在适用时有 owner component、transition trigger、disabled/failure/recovery behavior 和 responsive handling。
      - 是否仍有需要 implementer 从 proposal/spec/design 外部推断的行为。
    requires:
      - proposal
      - specs

  - id: runtime-acceptance
    generates: runtime-acceptance.md
    description: canonical runtime coverage registry，定义供 tasks.md 与 verification.md 共同引用的 RS/OP/ST/CH rows
    template: runtime-acceptance.md
    instruction: |
      创建 runtime-acceptance.md，定义本 change 的 canonical runtime acceptance coverage model。

      目的：
      - `runtime-acceptance.md` 是 tasks.md 和 verification.md 的共同 runtime coverage source。
      - 它只定义 RS-/OP-/ST-/CH- runtime rows、scope basis、runtime obligation、observable fact、owner candidate、default path policy、external boundary、scope role 和 no-scope-expansion check。
      - 它不是 implementation task list、测试计划、执行证据总账、AC checkbox、VID 状态、Proof Slice 状态或 regression deposit。
      - 后续 `tasks.md` 只能引用本 artifact 中已定义的 runtime rows 来分配 AC/proof ownership；后续 `verification.md` 只能引用本 artifact 中已定义的 runtime rows 来分配 VID/Proof Slice coverage。

      写入前：
      - 读取 proposal、所有实际生成的 delta specs 和 design。
      - 建立 proposal `SI-###` rows、artifact handling map、spec scenarios、design decisions 和 proof handling items 的索引。
      - 从 proposal/spec/design 中抽取 runtime surfaces、operations、states/branches、async/realtime chains，以及 explicit no-async/no-worker/no-queue 等 preserve boundary。
      - 对每个候选 runtime row，确认它有 scope basis、runtime obligation、public/runtime observable fact、default path policy、external boundary、scope role 和 no-scope-expansion check。
      - 不从 tasks.md、verification.md、当前实现细节、测试文件结构、evidence/deposit 结构或 OpenSpec artifact 文本结构推导 runtime rows。

      必需章节：
      - `## Runtime Acceptance Intent`
      - `## Runtime Coverage Source Map`
      - `## Runtime Surface Inventory`
      - `## Operation Coverage Matrix`
      - `## State / Branch Coverage Matrix`
      - `## Async / Realtime Chain Matrix`
      - `## Coverage Closure Checklist`

      内容约束：
      - Runtime row ID 必须全局唯一，并且只使用 `RS-###`、`OP-###`、`ST-###`、`CH-###` 格式。
      - 每个 runtime row 必须包含 scope basis、runtime obligation、observable fact、owner candidate、default path policy、external boundary、scope role 和 no-scope-expansion check。
      - `Runtime Surface Inventory` 只定义 surface rows；`Operation Coverage Matrix` 只定义 operation rows；`State / Branch Coverage Matrix` 只定义 state/branch rows；`Async / Realtime Chain Matrix` 只定义 async/realtime 或 explicit no-async boundary rows。
      - 若 change 不触及某类 runtime row，保留最小 `Not applicable` 行并给出 scope-backed 理由。
      - 不得包含 AC checkbox、Implementation Task IDs、Acceptance Proof Task IDs、VID、Proof Slice、测试文件、固定命令、runner selector、evidence path、执行状态或 deposit status。

      Final check：
      - 每个 in-scope requirement scenario、material design decision、guard 和 proof handling item 都映射到至少一个 runtime row，或有 scope-backed not-applicable reason。
      - 没有 orphan scope item、orphan scenario、orphan design decision 或 orphan proof handling item。
      - 没有 scope 外 runtime behavior、无 SI ranges、无 duplicate runtime row IDs。
      - 每个 runtime row 都能被后续 tasks 和 verification 投影引用，不需要 implementer 或 test agent 从 proposal/spec/design 外部重新发明 row。
    requires:
      - proposal
      - specs
      - design

  - id: verification
    generates: verification.md
    description: 独立测试意图、行为 oracle、Proof Slice 和测试前一致性预检 artifact
    template: verification.md
    instruction: |
      创建 verification.md，定义从 proposal、specs、design 和 runtime-acceptance.md 独立推导的测试意图、行为 oracle、Proof Slice、建议测试层、harness 预期、mock/fixture 边界、失败/负向覆盖和不测边界。

      目的：
      - `verification.md` 是 independent test intent and oracle artifact，不是测试实现清单、执行证据总账或回归沉淀表。
      - VID 定义业务 oracle，不是 test case；Proof Slice Matrix 定义 test agent 可消费的单层测试义务模型。
      - `verification.md` 不依赖 `tasks.md`，不得从 `tasks.md` 推导测试目标，也不得为实现任务补造新行为。
      - `verification.md` 必须引用 runtime-acceptance.md 中已定义的 Runtime Row IDs，并证明 required/preserve/proof-only runtime rows 均有 VID/Proof Slice coverage 或 scope-backed manual/not-applicable reason。
      - 每个 VID 必须能回链到 proposal 的 exact `SI-###`、spec requirement/scenario、design decision 或明确 baseline/input trace。
      - oracle 必须描述 public/runtime observable behavior，不能来自当前实现细节、私有 helper、artifact 文本结构或 OpenSpec 流程状态。
      - Runtime Acceptance 名称只表示真实运行边界可观察验收；`runtime` 不是测试层级、测试类型或默认目录。

      写入前：
      - 读取 proposal、所有实际生成的 delta specs、design 和 runtime-acceptance.md。
      - 建立 behavior oracle map：从 `spec` scope item、`guard`、material design decision、`proof` handling 和 runtime-acceptance canonical rows 中抽取可回归行为。
      - 对每个候选 VID，先检查它是否有 source basis、是否能被 public/runtime behavior 观察、是否没有引入 scope 外行为。
      - 从 `Behavior Oracle Matrix` 中每个 required VID 拆分一个或多个 Proof Slice；按最小充分测试层拆，不把 browser、API、DB、provider、security 断言混在同一 slice。
      - 每个 Proof Slice 只能有一个 `Primary Layer` 和一个 `Production Owner`。`Primary Layer` 只能是：`unit`、`component`、`route/API`、`DB/integration`、`contract`、`worker/job`、`realtime/SSE`、`browser/e2e`、`visual/responsive`、`security/negative`。
      - `Production Owner` 写 owner 边界，例如 `packages/domain`、`packages/db`、`apps/web`、`apps/worker`，不写具体测试文件路径。
      - `Oracle Fragment` 和 `Primary Assertion Shape` 只能来自 proposal/specs/design/verification oracle；不得新增 scope 外 behavior。
      - Proof Slice Matrix 不写固定命令、runner selector、evidence path、deposit status、执行状态或具体测试文件名。

      必需章节：
      - `## Verification Intent`
      - `## Behavior Oracle Matrix`
      - `## Proof Slice Matrix`
      - `## Runtime Coverage Reconciliation`
      - `## Suggested Layer Matrix`
      - `## Harness Rationale`
      - `## Mock And Fixture Boundary`
      - `## Failure And Negative Coverage`
      - `## Regression Intent`
      - `## Do Not Test`
      - `## Oracle Consistency Checklist`

      内容约束：
      - `Behavior Oracle Matrix` columns 至少包含：`VID`、`Runtime Row IDs`、`Source Basis`、`Runtime Behavior`、`Observable Surface`、`Oracle`、`Failure Signal`、`Priority`。
      - `Proof Slice Matrix` columns 至少包含：`Slice ID`、`VID`、`Runtime Row IDs`、`Primary Layer`、`Production Owner`、`Oracle Fragment`、`Primary Assertion Shape`、`Fixture / Mock Boundary`、`Notes`。
      - `Runtime Coverage Reconciliation` columns 至少包含：`Runtime Row ID`、`Row Type`、`Source / Scope Basis`、`Runtime Obligation`、`Scope Role`、`VID IDs`、`Proof Slice IDs`、`Coverage Status`、`Gap / Not-Covered Reason`。
      - 每个 required VID 至少有一个 Proof Slice；如果一个 VID 需要多层 proof，必须拆成多行 slice，而不是在同一 slice 混合多个 primary layer。
      - `Suggested Layer Matrix` 只给最小充分测试层建议、理由、被省略稳定层理由和人工/环境 gate，不指定具体测试文件、固定命令、runner selector 或 evidence path。
      - `Harness Rationale` 必须说明交互或边界需求、harness 期望、primary assertion shape 和 failure localization，不指定具体文件或命令。
      - `Mock And Fixture Boundary` 必须说明允许的 fixture/mock、不能替换的 default path、被替换 side effect 和补偿 proof。
      - `Failure And Negative Coverage` 必须覆盖 required failure、negative、security、recovery 或 next-state branch；不适用时写 scope-backed reason。
      - `Regression Intent` 只描述长期回归重要性和预期覆盖，不登记 permanent test file、regression command 或 deposit status。
      - `Do Not Test` 必须明确禁止私有 helper、调用次数、DOM 层级、className、快照全文、当前实现分支、OpenSpec artifact 文本结构、change slug、VID 本身、执行产物布局，以及 artifact/config/text scan 作为产品行为 primary proof。
      - `Do Not Test` 必须明确 `tests/runtime` 不是新业务测试默认目标；repo-wide env/ops/workspace/forbidden-drift 测试不属于后续 production schema 默认要求，除非 proposal/spec/design 明确 scope-backed 且能归入被测 production owner。

      Final check：
      - 每个 required VID 都有 source basis、observable surface、oracle 和 failure signal。
      - 每个 VID 和 Proof Slice 都只引用 runtime-acceptance.md 中已定义的 Runtime Row IDs。
      - 每个 required / preserve / proof-only runtime row 都有 VID 和 Proof Slice，除非有 scope-backed manual/not-applicable reason。
      - 每个 required VID 至少有一个 Proof Slice。
      - 每个 Proof Slice 都有 scope-backed oracle fragment、单一 primary layer、production owner、primary assertion shape 和 fixture/mock boundary。
      - Proof Slice 没有混合多个测试层，没有把 `runtime` 当测试层级，也没有把 `tests/runtime` 当默认落位。
      - 没有 VID 从 `tasks.md`、当前实现细节、测试文件结构或 evidence/deposit 结构推导。
      - 没有具体测试路径、固定测试命令、evidence directory 或 deposit status。
      - 每个 required VID 都说明了最小充分层级、harness 预期、mock/fixture 边界、失败/负向覆盖和长期回归意图。
      - Oracle Consistency Checklist 能支持 test agent 在写测试前输出 `Artifact Consistency Blocker`。
    requires:
      - proposal
      - specs
      - design
      - runtime-acceptance

  - id: tasks
    generates: tasks.md
    description: 生产实现计划与运行时验收覆盖模型
    template: tasks.md
    instruction: |
      创建 task list，将 production implementation work 拆成以 acceptance 为完成标准的执行清单，并建立 runtime acceptance model。

      目的：
      - `tasks.md` 是 apply-ready production implementation and runtime acceptance model。
      - `tasks.md` 保留 acceptance slice、proposal/spec/design coverage、AC-local runtime ownership、provider/consumer graph、no-scope boundary 和 runtime proof 摘要。
      - canonical runtime rows 只来自 `runtime-acceptance.md`；`tasks.md` 不再独立定义 RS-/OP-/ST-/CH- rows。
      - Runtime Acceptance 只表示真实运行边界可观察验收；`runtime` 不是测试层级、测试类型或默认测试目录。
      - `tasks.md` 不包含测试计划、测试编号、测试文件、固定测试命令、evidence directory、evidence status 或 Regression Deposit。
      - `tasks.md` 不消费 `verification.md` 来制造实现需求；两者都只能从 proposal、specs 和 design 推导。

      写入前：
      - 读取 proposal、所有实际生成的 delta specs、design 和 runtime-acceptance.md。
      - 建立 proposal `SI-###` rows、artifact handling map、spec scenarios、design decisions、AC sections、checkbox task IDs 和 coverage table references 的索引。
      - 索引 runtime-acceptance.md 中的 canonical runtime rows：runtime surface、operation、state/branch、async/realtime chain、default path policy、external boundary 和 no-scope boundary。
      - 建立 runtime provision graph：每个 runtime row 由 baseline、current-change AC、future change 或 explicit negative boundary 提供；AC sections 必须按该 graph 拓扑排序。
      - 区分 Scope/Artifact Owner AC 与 Runtime Acceptance Owner AC。跨 AC handoff 只能写在 coverage/proof 摘要中，不得把测试编号或测试执行细节塞进 owner AC。

      必需结构：
      - `## Acceptance-Driven Coverage`
      - `## Runtime Acceptance Index`
      - `## AC-### <中文验收切片名称>` sections
      - `## Runtime Acceptance Projection`

      Acceptance-Driven Coverage：
      - 必须包含 `Scope Item Coverage`、`Requirement / Scenario Coverage`、`Design Decision Coverage` 三张表。
      - `Scope Item Coverage` 每行只能有一个 exact `SI-###`，不得使用 ranges、aggregate rows 或多 ID 单元格。
      - coverage 表必须包含 `Acceptance Slice IDs`、`Implementation Task IDs`、`Acceptance Proof Task IDs` 和 `Acceptance Proof`。
      - `Verification Task IDs` 字段必须改为 `Acceptance Proof Task IDs`；这里的 proof task 是 checkbox task，不是测试编号。
      - coverage 表不得出现测试文件、测试命令、evidence path、deposit status 或测试编号。

      Runtime Acceptance Index：
      - 必须包含 `AC Runtime Ownership Index` table。
      - columns 至少包含：`AC ID`、`Scope Basis`、`Runtime Surface Rows`、`Operation Rows`、`State / Branch Rows`、`Async / Realtime Rows`、`Provides Rows`、`Consumes Rows`、`Depends On AC IDs`、`Prerequisite Runtime Facts`、`Start Gate`、`Scope Role`、`No-Scope-Expansion Check`、`Detail Matrix Rows`、`Acceptance Proof Task IDs`。
      - Runtime Acceptance Index 只作为主 agent preflight 路由表，不是测试计划来源。
      - 所有 RS-/OP-/ST-/CH- row ID 必须已在 runtime-acceptance.md 中定义；不得在 tasks.md 新增 canonical runtime row。

      AC section：
      - 每个 AC section 必须包含 `Acceptance:`、`Scope Items:`、`Artifact Handling:`、`Spec:`、`Design:`、`Runtime Rows Owned:`、`Prerequisites:`、`Provides:`、`Consumes:`、`Start Gate:`、`No-Scope Boundary:`、`Primary Proof:`、`Required Evidence:`、`External Boundary / Default Path Policy:`、`Mock Policy:`。
      - `Required Evidence:` 只允许描述 runtime proof category，例如 browser/rendered fact、API/data fact、job/storage fact、log/audit fact；不得写测试文件、测试命令、evidence path 或执行状态。
      - `External Boundary / Default Path Policy:` 描述 production/default path、外部依赖和 sandbox 约束，不描述测试 fixture 实现。
      - 每个 checkbox task 必须包含 `Scope Items:`、`Artifact Handling:`、`Spec:`、`Design:`、`Runtime Rows:`、`Acceptance:`、`Baseline:`、`Preserve:`、`Proof:`、`Mock Policy:` trace 字段。
      - `Scope Items:` 必须列 exact `SI-###`；无 scope-backed 行为的 repository/setup task 才可写 `Not applicable` 并给出理由。
      - `Runtime Rows:` 必须列该 task 负责或最终 proof 覆盖的 RS-/OP-/ST-/CH- rows；无 runtime 行为时写 `Not applicable` 并给出 scope-backed 理由。
      - `Acceptance:` 必须描述 task 贡献证明的具体行为，而不是 file-edit summary。
      - `Baseline:` 必须列 proposal baseline/input read set、spec/design 的既有行为或输入事实。
      - `Preserve:` 必须说明必须保留的 module/data/API/auth/worker/UI/responsive/privacy/ops constraints。
      - `Proof:` 必须说明可观察 proof；用户可见操作必须证明 runtime interaction、API/data effect 和 reload/readback。
      - `Mock Policy:` 必须说明 mock/sandbox/default path 规则；不得用 mock 替代 required runtime boundary。
      - 每个 AC section 必须至少有一个 final acceptance/proof checkbox。

      Runtime Acceptance Projection：
      - 只保留 runtime-acceptance.md 到 AC/checkbox 的 projection tables：`Runtime Row Ownership Projection`、`Provider / Consumer Projection`、`Projection Closure Checklist`。
      - projection tables 必须包含 runtime row ID、row type、owner AC、implementation task IDs、acceptance proof task IDs、provides/consumes rows、depends-on AC、start gate、projection status 和 blocker/not-applicable reason。
      - 本节不得重新定义 canonical runtime row 详情；runtime detail 只允许存在于 runtime-acceptance.md。
      - 不得包含测试层计划、测试证据矩阵、回归沉淀表、测试编号、固定命令、测试文件、evidence directory、CI runnable 或 deposit status。

      Final check：
      - 每个 material scope item 的 `Artifact Handling` 在 proposal、specs、design、AC sections、task overrides 与 coverage tables 中一致或有明确 handoff 理由。
      - 每个 in-scope requirement scenario 和 material design decision 都映射到 AC section 或 explicit blocker。
      - 每个 runtime-acceptance.md 中 required / preserve / proof-only runtime row 都有 owner AC、provider/consumer relationship 和 acceptance proof checkbox，或 explicit blocker/not-applicable reason。
      - tasks.md 没有引用 runtime-acceptance.md 中不存在的 runtime row，也没有定义新的 canonical runtime row。
      - AC section 输出顺序满足 runtime provision graph；没有后置 provider dependency、循环依赖或 hidden runtime dependency。
      - `tasks.md` 不得出现 `Test Evidence Matrix`、`Regression Test Deposit`、`Test Layer Plan`、`Fixed Command`、`Test File / Name`、`Evidence Directory`、`Evidence Status`、`Deposit Status` 或 `Test IDs` 字段。
    requires:
      - proposal
      - specs
      - design
      - runtime-acceptance

apply:
  requires: [runtime-acceptance, verification, tasks]
  tracks: tasks.md
  instruction: |
    本 schema 的 apply instruction 只定义 schema-local artifact 语义；执行顺序、subagent 编排、测试质量门禁、evidence 输出和 ready-for-archive 判定必须遵守 `openspec/agent-runtime/openspec-apply-change.md`。

    Apply 必须读取 proposal、specs、design、runtime-acceptance、verification 和 tasks。缺少 `runtime-acceptance.md` 或 `verification.md` 是 blocker；新 schema 不兼容旧 `tasks.md` 内置测试矩阵模式。

    `runtime-acceptance.md` 是 canonical runtime coverage registry：
    - 它定义 RS-/OP-/ST-/CH- runtime rows、scope basis、runtime obligation、observable fact、owner candidate、default path policy、external boundary、scope role 和 no-scope-expansion check。
    - `tasks.md` 和 `verification.md` 只能引用其中已定义的 runtime rows，不得各自发明新的 canonical runtime row。

    `tasks.md` 是 production implementation and runtime acceptance model：
    - 使用 change-local `SI-###` 作为 scope item ID；`SI-###` 只在本 change 内有效。
    - `Acceptance-Driven Coverage` 负责把 scope items、spec scenarios 和 design decisions 映射到 AC、implementation checkbox 和 acceptance proof checkbox。
    - `Runtime Acceptance Index` 和 `Runtime Acceptance Projection` 只把 runtime-acceptance.md rows 投影到 provider/consumer graph、start gates、no-scope boundary 和 runtime proof categories。
    - AC section 是 implementation slice；coverage tables 和 runtime appendix 不是额外 executable work。
    - `tasks.md` 只允许更新 implementation checkbox；不得写入测试计划、测试编号、测试文件、固定命令、evidence path、执行状态或 deposit 状态。

    `verification.md` 是 independent test intent and oracle artifact：
    - VID 必须回链到 proposal `SI-###`、spec requirement/scenario、design decision、明确 baseline/input trace 或 runtime-acceptance.md runtime rows。
    - oracle 必须描述 public/runtime observable behavior，不得来自当前实现细节、私有 helper、artifact 文本结构或 OpenSpec 流程状态。
    - Proof Slice Matrix 是测试义务模型，不是执行清单；每个 required VID 必须拆成一个或多个单层 Proof Slice。
    - Proof Slice 的 `Primary Layer` 只能是 `unit`、`component`、`route/API`、`DB/integration`、`contract`、`worker/job`、`realtime/SSE`、`browser/e2e`、`visual/responsive`、`security/negative`。
    - Proof Slice 的 `Production Owner` 是 production owner 边界，不是测试目录、runner selector 或 evidence 目录。
    - Suggested layer 只是测试层建议，不是固定测试计划；apply 阶段必须按 `openspec-apply-change.md` 和 `test-quality-strength.md` 消费 Proof Slice 生成或确认测试。
    - apply 阶段不得为了适配当前实现静默修改 `verification.md`。

    Artifact integrity blockers：
    - `runtime-acceptance.md` 缺失、runtime row ID 重复、runtime row 缺少 scope basis/default path/no-scope boundary、或包含测试/任务/evidence/deposit 字段，必须报告 `Artifact Consistency Blocker`。
    - `tasks.md` 或 `verification.md` 引用了 runtime-acceptance.md 中不存在的 runtime row，必须报告 `Artifact Consistency Blocker`。
    - runtime-acceptance.md 中 required / preserve / proof-only runtime row 缺少 tasks projection 或 verification VID/Proof Slice projection，必须报告 `Artifact Consistency Blocker`。
    - 同一 runtime row 在 runtime-acceptance.md、tasks.md 和 verification.md 中的 scope basis、scope role、default path policy 或 no-scope boundary 冲突，必须报告 `Artifact Consistency Blocker`。
    - `tasks.md` 不得包含 `Test Evidence Matrix`、`Regression Test Deposit`、`Test Layer Plan`、`Fixed Command`、`Test File / Name`、`Evidence Directory`、`Evidence Status`、`Deposit Status` 或 `Test IDs` 字段。
    - `verification.md` 不得包含具体测试路径、固定测试命令、runner selector、evidence directory 或 deposit status。
    - `verification.md` 若缺少 `Proof Slice Matrix`、required VID 缺少 slice、slice 混合多个 primary layer、slice 缺少 production owner、或 slice 把 `tests/runtime`/repo-wide env/ops/workspace/forbidden-drift 当成默认新测试目标，必须报告 `Artifact Consistency Blocker`。
    - `verification.md` 的 oracle 若与 proposal/specs/design 冲突、引入 scope 外行为、要求测试 artifact/process、或依赖 implementation detail，必须报告 `Artifact Consistency Blocker`。
