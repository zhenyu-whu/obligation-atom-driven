name: production-default-acceptance-driven
version: 18
description: 面向 Greenfield 完成后的生产演进工作流；artifact graph 由本 schema 定义，artifact 内容合同由 _production-contracts 定义，trace-first 编排由 agent-runtime 定义
artifacts:
  - id: proposal
    generates: proposal.md
    description: default-style proposal，带轻量 change scope coverage
    template: proposal.trace.template.jsonc
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；schema template 是 trace/proposal.trace.json 的 JSONC authoring guide，不是 proposal.md Markdown 模板。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: default OpenSpec delta specs
    template: spec.trace.template.jsonc
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；不得仅按 schema template 直接写 Markdown。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: production design for the accepted spec delta
    template: design.trace.template.jsonc
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；schema template 是 trace/design.trace.json 的 JSONC authoring guide，不是 design.md Markdown 模板。不得仅按 schema template 直接写 Markdown。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires:
      - proposal
      - specs

  - id: runtime-acceptance
    generates: runtime-acceptance.md
    description: runtime fact register，细化 proposal/spec/design 背景并投影供 tasks.md 与 verification.md 共同引用的 RS/OP/ST/CH rows
    template: runtime-acceptance.trace.template.jsonc
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；schema template 是 trace/runtime-acceptance.trace.json 的 JSONC authoring guide，不是 runtime-acceptance.md Markdown 模板。不得仅按 schema template 直接写 Markdown。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires:
      - proposal
      - specs
      - design

  - id: verification
    generates: verification.md
    description: slice-only 独立测试意图、Proof Slice 原子测试义务和测试前一致性预检 artifact
    template: verification.trace.template.jsonc
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；schema template 是 trace/verification.trace.json 的 JSONC authoring guide，不是 verification.md Markdown 模板。verification writer 必须把 Proof Slice canonical register 写入 trace/verification.trace.json 的 verification-slice-register，不得新建 trace/verification.proof-slices.json。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires:
      - proposal
      - specs
      - design
      - runtime-acceptance

  - id: tasks
    generates: tasks.md
    description: 生产实现计划与 specs/design/runtime contribution closure 模型
    template: tasks.trace.template.jsonc
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；schema template 是 trace/tasks.trace.json 的 JSONC authoring guide，不是 tasks.md Markdown 模板。不得仅按 schema template 直接写 Markdown。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires:
      - proposal
      - specs
      - design
      - runtime-acceptance

apply:
  requires: [verification, tasks]
  tracks: tasks.md
  instruction: |
    本 schema 的 apply instruction 只作为 OpenSpec CLI entrypoint。Apply 编排、subagent 模型、checkpoint、测试反馈闭环、evidence 输出和 ready-for-archive 判定必须读取并遵守 `openspec/agent-runtime/openspec-apply-change.md`。
    Schema-local apply 消费契约必须从 apply contract bundle 读取：`openspec/schemas/_production-contracts/apply/common/*.md` 和 `openspec/schemas/_production-contracts/apply/overlays/production-default-acceptance-driven.md`。
    Apply 必须具备 `trace/runtime-acceptance.trace.json`、`trace/verification.trace.json` 和 `trace/tasks.trace.json`；`tasks.md` 仅作为 checkbox tracking/writeback 文件，缺少可回写 checkbox 即 blocker。新 schema 不兼容旧 trace 测试矩阵模式，旧 change 如需处理必须单独迁移。
    Checkpoint commit 只作为写入型 apply-stage agent 的过程性审计轨迹，不得作为 runtime oracle、Proof Slice evidence、verification pass、runtime fact covered 或 ready-for-archive 信号。
