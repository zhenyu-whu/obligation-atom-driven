name: production-default-acceptance-driven
version: 1
description: 面向 Greenfield 完成后的生产演进工作流：保持 OpenSpec default proposal -> specs -> design -> tasks 模式，增加轻量 scope coverage、AC 验收切片、固定 Test ID、可重跑证据和永久回归测试沉淀；不依赖 openspec/orchestrate、change plan、全局编号表或 proposal 前置 source artifact
artifacts:
  - id: proposal
    generates: proposal.md
    description: default-style proposal，带轻量 change scope coverage
    template: proposal.md
    instruction: |
      创建 proposal，说明 WHY 此 change 必要、WHAT 会改变、哪些 capability 受影响，以及后续 specs/design/tasks 如何覆盖本 change 的 material scope。

      核心规则：
      - 本 schema 用于 Greenfield 项目完成后的后续新增、修改和修复。它遵循 OpenSpec default schema 的 proposal/specs/design/tasks 心智，不消费 `openspec/orchestrate`、change plan、final change packet、全局编号表或 capability anchor packet。
      - proposal 的主要输入是用户请求、现有 `openspec/specs/`、现有代码、当前产品行为，以及用户显式提供的 issue、设计稿、外部文档或调研结论。不得要求创建 `source-truth.md`、独立 `acceptance.md`、旧版 source coverage artifact、`change-source-map.md` 或任何 proposal 前置 artifact。
      - 若用户请求本身足够明确，优先用它定义 change boundary；若请求含糊，先读取现有 specs/code 建立 baseline，并在仍无法安全判断时只提出必要澄清。
      - 若 change 修改 existing capability，读取对应 `openspec/specs/<capability>/spec.md`。若新增 capability，使用 kebab-case capability 名称。
      - Proposal 必须包含 `Change Scope Coverage`，用 change-local `SI-###` 标识 material scope item。`SI-###` 只在本 change 内有效，不是全局编号。
      - `Artifact Handling` 允许值为 `spec`、`guard`、`design`、`proof`、`context`。`spec` 表示应进入 requirement/scenario；`guard` 表示 non-goal、MUST NOT、preserve 或 forbidden drift；`design` 表示主要由 design 决定实现形态；`proof` 表示主要由 tasks/test/evidence 验证；`context` 只提供背景，不生成实现范围。
      - 下游 artifacts 必须引用 exact `SI-###`，不得使用 ranges。每个 material scope item 必须有 downstream coverage expectation。
      - Proposal 可以保留 open design decisions，但不得把尚未确认的实现选择伪装成用户已要求的产品范围。
      - 当用户请求描述可见操作或控件能力时，proposal 必须保留具体 operation verb 和可观察结果：触发入口、作用对象、相关 API/data mutation、成功后的页面或持久化变化，以及 disabled/failure/recovery 边界。

      写入前：
      - 读取现有 `openspec/specs/` 中相关 capability spec。没有相关 spec 时记录为 new capability。
      - 按需读取现有代码、测试、配置和路由，确认 baseline 与影响面；不要做无边界的全仓库探索。
      - 若用户提供外部输入，读取相关片段并记录到 `Baseline / Input Read Set`。
      - 建立 scope item list，并为每个 material item 分配 `SI-###`。

      阻断条件：
      - 用户请求与现有 spec 或代码 baseline 冲突，且无法通过 proposal 里的 open question 安全表达。
      - 无法判断 change 是新增 capability、修改 existing capability、还是只属于实现/测试/运维修复。
      - 发现本 change 会破坏已归档或现有 specs 的明确 MUST/MUST NOT，且用户没有要求修改该 capability。
      - scope item 缺少 artifact handling 或 downstream coverage expectation。

      必需章节：
      - **Why**
      - **Baseline / Input Read Set**
      - **What Changes**
      - **Capabilities**
      - **Change Scope Coverage**
      - **Non-Goals**
      - **Impact**
      - **Rollout / Readiness**
      - **Open Questions**
      - **Proposal Alignment Gate**
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: default OpenSpec delta specs
    template: spec.md
    instruction: |
      创建 OpenSpec delta specification files，定义 production system 应该做什么。

      写入前：
      - 读取 `proposal.md`，使用 `Change Scope Coverage` 作为 scope-reading interface。
      - 只为有 `Artifact Handling: spec` 或 `Artifact Handling: guard` 的 capability 创建 delta spec。只有 `design`、`proof` 或 `context` scope item 时不得创建空 spec。
      - 修改 existing capability 前，读取 `openspec/specs/<capability>/spec.md` 并保持 capability folder name。
      - 建立 capability-to-scope map。每个 `spec` scope item 必须落到 requirement/scenario；每个 `guard` scope item 必须落到 guard、MUST NOT、non-goal 或 Production Alignment Gate。

      Delta operations：
      - 新行为使用 `## ADDED Requirements`。
      - 变化行为使用 `## MODIFIED Requirements`，修改前必须复制完整 existing requirement block。
      - 删除行为只在有 **Reason** 和 **Migration** 时使用 `## REMOVED Requirements`。
      - 重命名只在有 `FROM:` / `TO:` 时使用 `## RENAMED Requirements`。

      Format requirements：
      - 每个 requirement 使用 `### Requirement: <name>`。
      - Requirement names 和 scenario names 由 agent 拟定时优先中文；只有 existing requirement name、API/DB/package identifiers 或稳定技术术语才保留英文。
      - Requirement 正文使用 SHALL / MUST / MUST NOT 表达规范行为。
      - 每个 requirement 必须包含 `Scope Items:` bullets，列出 exact `SI-###` 和简短 scope 摘要。
      - 每个 requirement 必须包含 `Baseline Trace:` bullets，列出用户输入、existing spec、代码路径、路由/API、数据表、配置、测试或外部输入来源；没有外部来源时说明来自用户请求。
      - 每个 scenario 使用 `#### Scenario: <name>`，且必须使用 exactly 4 hashtags。
      - 每个 requirement 必须至少有一个 scenario。
      - 若 requirement 包含多个用户可见操作，scenario 必须逐项枚举或拆分；每个操作要定义触发、预期 UI/API/data 后果、持久化或 reload 后结果，以及适用的 disabled/failure/recovery 行为。

      Final alignment gate：
      - 每个 spec file 必须以 `## Production Alignment Gate` 结束。
      - Gate 必须列出 covered scope items、artifact handling、baseline/input consumed、product workflow coverage、architecture/module coverage、data/API/backend coverage、auth/security/privacy coverage、async/realtime/worker coverage、storage/asset coverage、observability/ops/deployment coverage、verification coverage 和 forbidden drift checked。
      - 如果任何 spec-relevant scope item 未被 requirement/scenario 或 guard 表示，停止并修订 proposal/specs。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: production design for the accepted spec delta
    template: design.md
    instruction: |
      创建设计文档，说明 HOW to implement the production change。

      写入前：
      - 读取 proposal 和所有实际生成的 delta specs；不要期待纯 design/proof-only capability 有 spec file。
      - 使用 proposal 的 `Change Scope Coverage`、spec `Scope Items`、spec `Baseline Trace` 作为 scope-reading interface。
      - 按需读取现有代码、测试、配置、数据库 schema、路由/API 和相关 specs，确认 design 能落到真实 production boundary。
      - 起草前建立 design coverage map。每个 spec requirement/scenario、每个 `Artifact Handling: design` item、每个 `guard` item，以及每个需要 implementation placement 的 material scope item 都必须映射到 design decision、guard handling 或 explicit blocker。

      Design-specific constraints：
      - Design 必须追溯到 proposal/specs、用户输入或现有 baseline。无法追溯的设计选择必须删除或记录为 open question。
      - 当 scope 定义行为但未定义实现形态时，design 必须选择最小 production-compatible technical shape，并说明为什么不扩大到更大的产品范围。
      - Design 不得把生产行为替换成 placeholder、diagnostic、mock-only、static-only、fixture-only 或 sandbox-only 行为，除非 proposal 明确标记为 deferred、non-goal、context 或 proof-only。
      - Design 必须说明 change 如何处理 architecture/runtime/module boundaries、routing/navigation、data ownership、transactions、auth/security、async processing、realtime streams、storage、provider boundaries、rendering chain、deployment 和 verification strategy。
      - 对每个会改变数据、状态、route 或用户可见结果的 UI control，Frontend / UX Design 必须定义 owner component、runtime/client-server boundary、event trigger、handler/action/API route、request payload、response merge 或 reload persistence、submitting/disabled/error/retry behavior。

      必需章节：
      - **Context**
      - **Goals / Non-Goals**
      - **Baseline / Scope Map**
      - **Decisions**
      - **Architecture / Module Boundary Design**
      - **Domain / Data / Migration Design**
      - **API / Auth / Security Design**
      - **Async / Realtime / AI / Worker Design**
      - **Frontend / UX Design**
      - **Observability / Ops / Deployment Design**
      - **Verification Design**
      - **Rollout / Compatibility**
      - **Production Alignment Gate**
      - **Risks / Trade-offs**
      - **Open Questions**

      `Production Alignment Gate` 必须回答：
      - 哪些 `SI-###` 被 implemented、preserved、deferred 或作为 forbidden-drift guard。
      - 每个 artifact handling 是否被正确消费，尤其是 `design`、`proof` 和 `guard` 是否没有被伪装成 spec requirement。
      - 每个 spec scenario 是否有 design 中对应的 implementation contract。
      - 每个 data mutation 是否在适用时有 table/column/constraint/transaction/idempotency details。
      - 每个 route/API/auth path 是否在适用时有 request/session/response/error handling details。
      - 每个 UI state 是否在适用时有 owner component、transition trigger、disabled/failure/recovery behavior 和 responsive handling。
      - 是否仍有需要 implementer 从 proposal/spec/design 外部推断的行为。
    requires:
      - proposal
      - specs

  - id: tasks
    generates: tasks.md
    description: acceptance-driven implementation checklist with fixed proof
    template: tasks.md
    instruction: |
      创建 task list，将 production implementation work 拆成以 acceptance 为完成标准的执行清单。

      目的：
      - 本 schema 没有独立 `acceptance.md`。`tasks.md` 是 apply-ready execution and acceptance contract。
      - Tasks 必须按 acceptance slices 分组。每个 AC 描述 user/system-observable behavior、覆盖的 scope items、spec/design 依据和所需 primary evidence。
      - 一个 AC 可以包含多个 implementation tasks，并且必须至少包含一个 verification 或 acceptance task，其 proof 强度足以验收该 AC。
      - 所有 tasks 完成表示 implementation 和 acceptance proof 完成；不得把最终验收延后到独立 artifact。

      写入前：
      - 读取 proposal、所有实际生成的 delta specs 和 design。
      - 建立 scope items、artifact handling、spec scenarios、design decisions、AC sections、checkbox task IDs、coverage table references、Runtime Appendix rows 和 Test Evidence rows 的索引。每个 coverage table task ID 必须解析到实际 checkbox task。
      - 先建立 runtime acceptance model，再把该模型分层写入 `Runtime Acceptance Index`、AC-local execution contracts、checkbox tasks 和 `Verification Appendix`。
      - 建立 runtime provision graph：列出每个 runtime surface / operation / state / branch / chain / Test ID 由 baseline、current-change AC、future change 还是 forbidden boundary 提供，并区分每个 AC 的 `provides`、`consumes`、`depends-on` 和 `start-gate`。AC sections 必须按该 graph 的拓扑顺序生成。
      - 若某个 AC 的 primary proof、fixed command 或 Required Evidence 消费 current-change 内尚未由 baseline 或 earlier AC 提供的 API、DB、repository、auth、route、worker、queue、provider、storage、config 或 runtime state，必须在生成阶段重排、合并 AC、把 provider work 内联到该 AC，或生成更早的 provider AC。
      - 写入时必须明确 artifact information ownership：coverage tables 只负责 proposal/spec/design coverage；`Runtime Acceptance Index` 只负责 AC 到 row/Test ID 的路由；AC section 是人工审阅和 worker 执行主入口；`Verification Appendix` 是 runtime row 详情、fixed commands、evidence directories、ledger files、fixture boundaries 和 CI runnable 状态的唯一事实来源；`Regression Test Deposit` 是永久回归测试文件、常规回归命令、行为断言 oracle 和“不测实现细节”边界的唯一事实来源。
      - Testing Quality Core 不可选：每个 change 的 `tasks.md` 都必须包含 `Test Layer Plan`、`Test Evidence Matrix`、TDD red/green fields 和 `Regression Test Deposit`。complexity gate 只能决定 runtime detail matrices 的展开深度，不能关闭分层测试、固定证据、TDD 或永久回归沉淀。
      - 写入时必须先建立 `Test Layer Plan`，再写 `Test Evidence Matrix`。`Test Layer Plan` 必须按 AC/behavior 列出需要的 unit、component、route/API contract、DB/integration、browser E2E、security/negative、config/ops/check 等测试层；每个被省略的适用层都必须有 scope-backed 不适用理由。
      - `Test Layer Plan` 是不可降级的分层测试契约。`Required Layers` 中每个适用层都必须映射到独立 exact `T-###`；同一 `T-###` 不得同时代表 unit、component、route/API contract、DB/integration、browser E2E、security/negative 或 config/ops/check 等多个 required layer。
      - 一个 `Test ID` 的 `Layer` 只能是单一稳定类别。若一个物理测试文件覆盖多个层，必须在 `Test Evidence Matrix` 中拆成多个 Test ID、稳定 test name/filter、固定命令和 evidence row；不得用一个 broad smoke/e2e script 同时登记为 unit/component/API/DB/security 的 primary proof。
      - smoke、browser E2E、staging smoke、ops check 或 final summary 只能登记其真实层级，可作为 supplemental/default-path proof；不得填入 unit/component/route/API/DB/security 层来替代可低层稳定断言。只有行为确实没有稳定低层 contract boundary 时才可省略低层，并且理由必须解释为什么该层不适用，不能写“已有 smoke 覆盖”或泛泛的“需要真实 readback”。
      - 写入或更新 `Test Evidence Matrix` 与 `Regression Test Deposit` 前，必须读取并遵守 `openspec/schemas/shared/tdd-regression-gates.md`。required behavior 的测试必须先证明自己能因正确行为缺口失败，再作为实现成功 proof；不得把测试后补的立即通过用例当作验收证据。
      - 生成 `Test Evidence Matrix` 时必须把每个 `T-###` 的执行闭环写清楚：root-relative fixed command、red/green command、canonical evidence directory、`command.log`、`ledger.json`、CI/root/package 入口，以及最终 audit 可重跑的最小 regression command。只写“将产生截图/日志”或口述 evidence 不算完成定义。

      Runtime acceptance model 原则：
      - 每个 runtime row 必须回链到 proposal scope item、spec requirement/scenario、design decision 或明确的 proof requirement。无法回链的 row 只能作为非阻断工程辅助，不得成为 AC scope、产品行为或完成门禁。
      - 通用 web 最佳实践只能用于选择 proof 形态、测试层级和 evidence 强度，不能产生用户未要求且 specs/design 未承接的 route、control、state、API、job、event、provider、storage、retry、offline、toast 或 lifecycle 行为。
      - 如果 proposal/spec/design 中出现 operation verbs、status enum、stage、terminal state、failure branch、disabled/loading/empty/retry/recovery branch、async queue/worker/provider/SSE/storage chain、auth/security branch 或 responsive variant，tasks 必须把它们抽取成 runtime acceptance model rows。
      - runtime detail matrices 可按实际 runtime 触达面最小化，但不能删除。若 change 确实不触及 route/control/API/data mutation/auth/DB/worker/SSE/storage/provider/state/branch，对应 `Runtime Surface Inventory`、`Operation Coverage Matrix`、`State / Branch Coverage Matrix`、`Async / Realtime Chain Matrix` 可以只保留最小 `Not applicable` 行，并必须写明 scope-backed 理由。只要 proposal/spec/design/tasks 任一处出现对应 runtime 行为，就必须展开对应矩阵行。
      - AC sections 必须按 externally meaningful user/system acceptance behavior、terminal state、failure/recovery branch 或 async chain segment 分组，不按文件分组。
      - 每个 AC section 必须至少有一个 final verification / acceptance checkbox，并在 `Primary Proof`、`Required Evidence` 和 coverage rows 中被引用。

      测试生成原则：
      - 测试必须从 behavior contract 反推，而不是从私有 helper、当前组件层级、className、调用次数或临时实现分支反推。
      - 每个 `Scope Role = required behavior` 的 Test ID 默认必须遵守 `openspec/schemas/shared/tdd-regression-gates.md` 的 Red Gate、Green Gate、Behavior Oracle 和 Mock Policy。若 red-first 不适用，必须在 `Test Evidence Matrix` 的 TDD fields 和 `Regression Test Deposit` 中写明 scope-backed reason。
      - 每个 required behavior Test ID 都必须优先选择最小充分测试层：纯规则/解析/校验/映射/脱敏/状态机用 unit；组件状态、表单、编辑器、权限态和错误态用 component；route/DTO/auth/response contract 用 route/API contract；事务、幂等、索引、迁移和持久化 invariant 用 DB/integration；queue/worker/retry/补偿用 worker/job integration；跨页面真实用户路径用 browser E2E；边界、未授权、敏感字段和 forbidden drift 用 security/negative 或 config/ops/check。最小充分层拥有 primary proof ownership，不得被更高层 smoke/browser Test ID 替代。
      - 不得把私有 helper、mock 调用次数、非契约 DOM 层级、className、快照全文、`data-testid` 存在、按钮 enabled 或当前实现输出登记为 required behavior 的 primary proof 或永久回归 oracle。
      - `Must Fail Before Implementation` 不能只是 yes/no 标记。required behavior 的 Test Evidence row 必须给出 `Red Command`、`Expected Red Failure`、`Observed Red Failure`、`Green Command` 和 `TDD Status`；red 失败原因必须匹配 scope/spec/design 缺口，不能是语法、fixture、环境或测试自身错误。
      - 如果 red command 直接通过，必须修正测试 oracle，或把该 Test ID 明确改为 preserve/baseline/not-applicable proof 并记录 reason；不得继续用该测试证明新增或变更行为成功。
      - Green 阶段失败时必须修 production implementation，不得削弱断言、删除 edge/failure/security case、放宽 privacy oracle，或改成匹配当前实现输出。
      - Mock 只能隔离外部、慢速或非确定性边界；不得断言 mock 行为本身，不得为了测试向 production code 增加 test-only API。每个 mock/fixture 必须说明被替代的真实 side effects 以及由哪个 default-path proof 覆盖。
      - 每个 required behavior Test ID 必须有 fixed command、canonical evidence directory、ledger file 和 `Regression Test Deposit` 行；proof-only、config/ops/check、staging-only 或一次性 readiness 可写 not-applicable，但必须给出 scope-backed 理由。
      - 对每个用户可见的 mutating/selection/action control，除 browser E2E/default-path proof 外，还必须在 `Test Layer Plan` 中考虑 component 层对表单状态、权限态、错误/恢复、pending/disabled 和本地敏感状态生命周期的覆盖；若不新增 component 测试，必须说明为什么该组件状态无法通过仓库 component test project 稳定测试。`需要真实 actor/readback` 只能解释 API/DB/default-path 层，不足以省略表单、权限、pending/error 或本地敏感状态的 component proof。
      - 对每个 route/API/DTO/auth/security contract，除端到端 smoke 外，还必须在 `Test Layer Plan` 中考虑 route/API contract、unit 或 security/negative 层，并给出独立 Test ID。直接浏览器 smoke 中截获 request/response 或看见 UI 成功，不能等同 route/API contract 的永久沉淀，除非明确没有可调用 contract boundary。
      - 对每个 data mutation、transaction、migration、idempotency、redaction、audit 或 persistence invariant，除 UI/browser proof 外，还必须在 `Test Layer Plan` 中考虑 DB/integration 或 security/negative 层，并给出独立 Test ID；只断言 UI 成功不得作为 stored data、audit、redaction 或 persistence invariant 的唯一永久回归。
      - Smoke、browser E2E、staging smoke 或 broad workspace command 可以作为最高强度端到端 proof，但不得作为可低层测试的 rule、DTO、component state、API contract、DB invariant、auth/security/privacy boundary 的唯一永久回归沉淀。若 required behavior 只有 smoke/browser Test ID，且存在可稳定低层断言，这是 blocker。若确实只沉淀 smoke，`Test Layer Plan` 和 `Regression Test Deposit` 必须逐层记录不适用理由；缺少理由是 blocker。
      - `Regression Test Deposit` 的 `Deposit Status` 为 `required` 只表示计划，不表示已沉淀。所有 implementation tasks 勾选完成前，每个 required behavior 的沉淀行必须变为 `deposited`，或以 `blocked` / `not-applicable` 记录 scope-backed 理由和后续 gate；不得在 `required` 状态下宣称 change ready。
      - 永久回归测试必须可被常规回归入口触达：优先使用 package/root test script、稳定 Playwright/Vitest file/filter、或已登记的 smoke/e2e/ops script。若 `Regression Command` 不能从仓库根目录稳定执行，或 `CI Runnable?` 只是口头 yes 而无 root/package/CI 入口说明，该 Test ID 不得算作完成。
      - `deposited` 的含义是永久测试文件或稳定 smoke/e2e/ops 入口已经存在，且该 Test ID 的 latest green/final evidence 能证明 regression command 已在当前 worktree 通过；若 regression command 未运行、只登记计划路径、或只能依赖临时 evidence-only 文件，状态必须保持 `required` / `blocked`，不能写 `deposited`。

      Task-writing constraints：
      - 严格遵循 checkbox format。
      - 按 `## AC-### <short acceptance slice name>` headings 分组。short acceptance slice name 应优先中文，除非它是 exact source-native identifier。
      - 每个 AC section 必须包含 non-checkbox fields：`Acceptance:`、`Scope Items:`、`Artifact Handling:`、`Spec:`、`Design:`、`Runtime Rows Owned:`、`Test IDs:`、`Prerequisites:`、`Provides:`、`Consumes:`、`Start Gate:`、`No-Scope Boundary:`、`Primary Proof:`、`Required Evidence:`、`Mock / Fixture Boundary:`、`Mock Policy:`。
      - 每个 executable task 必须是 checkbox：`- [ ] AC-###.N Task description`。
      - Checkbox task descriptions 必须中文，除非 description 完全由固定 ID、commands、paths、code identifiers 或 source-native terms 构成。
      - 每个 checkbox 后必须跟随 indented trace block，字段为 `Trace:`、`Runtime Rows:`、`Test IDs:`、`Acceptance:`、`Proof:`、`Overrides:`。
      - `Trace:` 默认写 `inherits AC-###`。只有当该 task 的 scope/spec/design/no-scope/mock 边界比 owning AC 更窄或有例外时，才在 `Trace:` 或 `Overrides:` 中展开 exact override。
      - 每个 Test ID 必须使用 exact `T-###`，在整个 change 内唯一且只归属一个 AC。禁止 `T-005B`、`T-AC005-TRIAL-RESPONSIVE`、`T-001-smoke` 或任何带名称、AC 编号、slug、字母后缀的 Test ID。

      必需结构：
      - `## Acceptance-Driven Coverage`
      - `### Scope Item Coverage`
      - `### Requirement / Scenario Coverage`
      - `### Design Decision Coverage`
      - `## Runtime Acceptance Index`
      - `### AC Runtime Ownership Index`
      - one or more `## AC-###` sections
      - `## Verification Appendix`
      - `### Runtime Surface Inventory`
      - `### Operation Coverage Matrix`
      - `### State / Branch Coverage Matrix`
      - `### Async / Realtime Chain Matrix`
      - `### Test Layer Plan`
      - `### Test Evidence Matrix`
      - `### Regression Test Deposit`

      Matrix column constraints：
      - `Test Layer Plan`、`Test Evidence Matrix` 和 `Regression Test Deposit` 是强制 Testing Quality Core，不得用 `Not applicable` 整表跳过。只允许对单个 Test ID、单个测试层或单个 deposit 行写 scope-backed `not-applicable` / `blocked` 理由。
      - runtime detail matrices 可以按需最小化：无对应 runtime 行为时保留最小 `Not applicable` 行；有 route/control/API/data mutation/auth/DB/worker/SSE/storage/provider/state/branch 时必须展开对应 row，不得用 broad proof 或 Test Layer Plan 替代 runtime row。
      - `Test Layer Plan` columns 至少包含：`AC ID`、`Behavior / Boundary`、`Scope Basis`、`Required Layers`、`Test IDs By Layer`、`Omitted Layers / Reason`、`Primary Proof Layer`、`Regression Entry`、`No-Scope-Expansion Check`。它必须解释为什么某个 behavior 只用 smoke/browser 或只用低层测试仍足够；不得留空。
      - `Test Evidence Matrix` columns 至少包含：`Test ID`、`AC ID`、`Fixed Command`、`Test File / Name`、`Layer`、`Covers Rows`、`Default Path?`、`Fixture Boundary`、`Must Fail Before Implementation`、`Red Command`、`Expected Red Failure`、`Observed Red Failure`、`Green Command`、`TDD Status`、`Requires Tests Passed`、`Evidence Directory`、`Evidence Produced`、`Ledger File`、`CI Runnable?`、`Scope Basis`、`Artifact Handling`、`Scope Role`、`No-Scope-Expansion Check`。required behavior 的 `TDD Status` 完成时只能是 `green-passed`、`not-applicable` 或 `blocked`，不能停留在 `red-required`。
      - `Test IDs By Layer` 必须对 `Required Layers` 中每个适用层使用不同 exact `T-###`。同一 Test ID 不得出现在多个 required layer 下；若某层只是 supplemental 或 not-applicable，必须在该层 cell 中标明并指出唯一 primary layer。
      - `Test Evidence Matrix` 的 `Layer` 必须是单一层级，禁止写 `browser E2E + route/API + DB integration` 这类组合层；组合 proof 必须拆成多行、多 Test ID、多固定命令或稳定 filter。
      - `Regression Test Deposit` 一行可以列同一 AC 的多个 Test ID，但每个 Test ID 必须已有独立 Evidence row。不得把多个测试层折叠到同一个 smoke/evidence-only 文件，除非该文件内存在可由稳定 test name/filter 区分的长期测试，并且每层都有独立 regression command。

      Proof strength：
      - 用户可见行为必须包含 user-equivalent interaction、browser-rendered DOM/screenshot、responsive、accessibility 或 visual evidence。
      - API 行为必须 call 或 test 该 contract。
      - persistence、data mutation、migration、idempotency 或 transaction behavior 必须断言 resulting stored data 和相关 invariants。
      - worker、queue、provider、SSE/outbox、reconciler 或 async behavior 必须通过 default wiring 或 production-compatible deterministic sandbox 覆盖该路径。
      - auth、security、privacy、entitlement、asset access 或 sensitive data behavior 必须在相关时包含 negative/unauthorized、redaction、audit 或 privacy evidence。
      - failure、edge、disabled、loading 或 empty behavior 必须覆盖 failing branch 和 recovery/retry path。

      Final check：
      - 确认每个 `SI-###` 在 proposal、specs、design、AC sections、task overrides 与 coverage tables 中一致或有明确 handoff 理由。
      - 确认每个 in-scope requirement scenario 映射到 AC section。
      - 确认每个 material design decision 映射到 AC section。
      - 确认 `Runtime Acceptance Index` 中每个 owning row 都能解析到 AC-local `Runtime Rows Owned:`、`Test IDs:`、checkbox `Runtime Rows:` / `Test IDs:` 和 `Verification Appendix` detail matrix rows。
      - 确认 AC section 输出顺序是 runtime provision graph 的拓扑序。
      - 确认每个 required behavior、preserve boundary 和 proof-only guard 都在 `Test Layer Plan` 中有测试层选择；省略 unit/component/API/DB/browser/security/config 等适用层时必须有 scope-backed 理由，且理由不能只是“已有 smoke 覆盖”。
      - 确认 `Required Layers` 中每个适用层都有独立 Test ID，且没有同一 Test ID 被登记为多个 required layer 或组合 `Layer`。若只有 smoke/browser Test ID 覆盖多个可低层断言，tasks 不可 final。
      - 确认每个 Test ID 有 fixed command、canonical evidence directory、ledger file、local/CI runnable 标记，并出现在 owning AC 的 `Test IDs:` 和相关 checkbox trace 中。
      - 确认每个 required behavior Test ID 满足 `openspec/schemas/shared/tdd-regression-gates.md`：red command 先失败且失败原因正确，green command 后通过，或有 scope-backed `not-applicable` / `blocked` reason；不得把立即通过的测试登记为新增/变更行为的 success proof。
      - 确认每个 required behavior Test ID 在 `Regression Test Deposit` 中有永久回归沉淀或 scope-backed `not-applicable` 理由。
      - 确认每个 required behavior 的 `Regression Test Deposit` 在完成时为 `deposited`，或有明确 `blocked` / `not-applicable` 理由；不得以 `required` 作为完成状态。
      - 确认每个永久回归命令能从仓库根目录稳定执行，并且可通过 root/package script、CI job、稳定 test file/filter 或登记的 smoke/e2e/ops script 触达；未接入常规回归入口的测试只能作为临时 evidence，不得作为 deposited。
      - 确认每个已完成 Test ID 的 canonical evidence directory 中至少有 `command.log` 和 `ledger.json`，且 ledger 记录的 fixed/green/regression command、exit code、result、artifacts 和 fixture/default-path facts 与 `Test Evidence Matrix` 一致。
      - 确认没有 implementation-detail tests 被登记为 primary proof 或永久回归沉淀。
      - 确认每个 coverage table task ID 解析到 checkbox task，且每个 AC 有 final verification/acceptance checkbox。
      - 本生产 schema 的 runtime 必须提供 `openspec/agent-runtime/scripts/validate_tasks_quality.py`。finalizing `tasks.md` 后必须运行 `python3 openspec/agent-runtime/scripts/validate_tasks_quality.py openspec/changes/<change-slug>/tasks.md` 并修复所有 error；若脚本缺失，先同步 bundled schema/runtime，脚本缺失本身是 schema sync blocker。该 helper 是 Testing Quality Core 的结构自查，不替代人工 proposal/spec/design 审查。
    requires:
      - proposal
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    编码前读取 proposal、specs、design 和 tasks。

    实现前建立 apply preflight index：
    - Proposal `Change Scope Coverage` rows、scope items、guard/context rows、artifact handling 和 baseline/input references。
    - Spec requirements/scenarios 及其 `SI-###` references。
    - Design decisions 及其 `SI-###` references。
    - AC sections、AC-local execution contract fields、checkbox task IDs、trace inheritance / overrides、coverage table rows、AC-owned Test IDs、Prerequisites/Provides/Consumes/Start Gate 和 proof/evidence requirements。
    - `Runtime Acceptance Index`：每个 AC 的 scope basis、runtime surface rows、operation rows、state/branch rows、async/realtime rows、Test IDs、Provides Rows、Consumes Rows、Depends On AC IDs、Prerequisite Test IDs、Start Gate、scope role、no-scope-expansion check 和 detail matrix row references。
    - `Verification Appendix`：`Runtime Surface Inventory`、`Operation Coverage Matrix`、`State / Branch Coverage Matrix`、`Async / Realtime Chain Matrix`、`Test Layer Plan`、`Test Evidence Matrix` 的全部 row IDs、scope basis、scope role、provider/consumer ownership、AC ID、Requires Tests Passed、Test IDs 和 no-scope-expansion checks。
    - `Test Layer Plan`：每个 AC/behavior 的 required test layers、Test IDs by layer、omitted layers / reason、primary proof layer 和 regression entry。Testing Quality Core 不可选；runtime detail matrices 只在确实无对应 runtime 行为时允许最小 `Not applicable` 行。
    - Test evidence matrix：每个 Test ID、owning AC ID、fixed command、test file/name、layer、covered row IDs、default path 标记、fixture boundary、must-fail-before-implementation、red command、expected red failure、observed red failure、green command、TDD status、requires tests passed、canonical evidence directory、ledger file、CI runnable 标记和 evidence produced。
    - Regression test deposit：每个 AC/Test ID 的永久测试文件、最小回归命令、behavior contract、assertion oracle、fixture boundary、CI tier、Not Testing 边界和 deposit status。

    若 preflight index 发现 missing scope item coverage、unresolved task IDs、runtime index 缺失或与 AC-local contract 不一致、mandatory runtime row 缺少 scope basis / provider / consumer / AC ID / Test ID、缺少 `Test Layer Plan`、Test Layer Plan 未覆盖 required behavior / preserve boundary / proof-only guard、省略适用测试层但没有 scope-backed 理由、`Required Layers` 多层却复用同一 Test ID、同一 Test ID 被登记到多个 required layer、Test Evidence row 的 `Layer` 是组合层、smoke/browser/ops/final summary Test ID 被登记为 unit/component/API/DB/security primary proof、Omitted Layers reason 只是“已有 smoke 覆盖”或泛泛“需要真实 readback”、Test ID 不匹配 exact `T-[0-9]{3}`、同一 Test ID 出现在多个 AC-local contracts、缺少 fixed command、缺少 canonical evidence directory、required behavior Test ID 缺少 `Red Command` / `Expected Red Failure` / `Observed Red Failure` / `Green Command` / `TDD Status` 且没有 scope-backed not-applicable reason、red run 直接通过却被登记为新增/变更行为 proof、red failure 是语法/fixture/环境/测试自身错误、required behavior Test ID 缺少 `Regression Test Deposit` 行、Regression Deposit 只停留在 `required` 且被当作完成、Regression Deposit 用 smoke/evidence-only 文件代表可低层稳定断言、永久回归命令不能从仓库根目录稳定执行、CI Runnable 缺少 root/package/CI 入口说明、AC consumes 后置 AC 才提供的 runtime row、Depends On AC IDs 形成循环、checkbox trace 字段缺失、缺少 final verification task、英文主导 task descriptions、用户可见操作只有 presence-only/static proof，或 proof 弱于 proposal/spec/design，暂停并更新 artifacts 后再编辑代码。

    Implementation 和 acceptance 在本 schema 中是同一个 workflow：
    - 按依赖顺序处理 AC sections。
    - 编辑任何 task 前，先读取当前 AC 的 AC-local execution contract：`Acceptance:`、`Scope Items:`、`Artifact Handling:`、`Spec:`、`Design:`、`Runtime Rows Owned:`、`Test IDs:`、`Prerequisites:`、`Provides:`、`Consumes:`、`Start Gate:`、`No-Scope Boundary:`、`Primary Proof:`、`Required Evidence:`、`Mock / Fixture Boundary:` 和 `Mock Policy:`。
    - 编辑任何 task 前，确认当前 AC 的 `Prerequisites:`、`Depends On AC IDs` 和 `Prerequisite Test IDs` 已完成且证据存在；若未满足，必须先处理前置 AC 或修订 tasks。
    - 编辑任何 task 前，读取该 task 的 `Trace:`、`Runtime Rows:`、`Test IDs:`、`Acceptance:`、`Proof:` 和 `Overrides:` 字段。`Trace: inherits AC-###` 表示 task 继承 AC-level scope/spec/design/no-scope/mock policy。
    - 不实现无法追溯到 proposal、specs、design 或现有 baseline 的行为。
    - 优先建立或补齐该 AC-local `Test IDs:` 和 task `Test IDs:` 对应的自动测试，并同时落实 `Regression Test Deposit` 中的永久回归测试。写 required behavior production code 前，按 `openspec/schemas/shared/tdd-regression-gates.md` 执行 red command 并确认失败原因匹配 behavior gap；实现完成后用同一 Test ID 的 green command 证明通过。实现完成前，`Test Layer Plan` 中每个 required layer 对应的独立 Test ID 必须存在或有 blocked/not-applicable 理由；实现后相关 Test IDs、最小 regression commands 和 evidence ledger 必须通过或记录 blocker。
    - 写 production code 前，先为每个 required layer 创建或补齐对应测试代码。若实现过程中发现组件状态、DTO/route contract、DB invariant、security/privacy boundary 或纯规则可低层稳定测试，必须新增对应 Test ID、Evidence row 和 Regression Deposit 行；不得把新低层责任塞进既有 smoke/browser Test ID。
    - 如果 red command 直接通过、失败原因不符合预期、或只证明 mock/fixture/实现细节存在，先修测试或修订 artifacts，不得进入 production implementation。Green 阶段失败时修实现，不得削弱测试 oracle。
    - 如果某个 behavior 只由 smoke/browser E2E 覆盖，而该 behavior 存在可低层稳定断言的 rule、DTO、component state、API contract、DB invariant 或 security boundary，必须先补齐对应低层测试或更新 artifacts 写明不适用理由；不得用单一 smoke 脚本替代分层测试体系。
    - 除非 task 的 `Proof:` 已执行且 linked acceptance slice 达到所需 fidelity，否则不得标记 task complete。
    - 如果实现新增或发现新的 operation、state、branch、terminal outcome、async step、event、job、provider branch、storage branch、auth/security branch 或 responsive variant，先更新 `Verification Appendix`、`Runtime Acceptance Index`、owning AC-local contract、AC tasks 和 Test Evidence Matrix，再继续实现或勾选。
    - 对用户可见的 mutating/selection/action control，勾选相关 task 前必须通过实际 runtime surface 执行 user-equivalent interaction，并断言 handler/API 被触发、响应或持久化数据正确、rendered UI 更新且 reload/readback 后仍成立。
    - 测试相关 evidence 必须由固定命令自动生成或由 final verification task 复制到 `test-results/<change-slug>/<AC-ID>/<Test-ID>/`，其中 `<Test-ID>` 必须匹配 `T-[0-9]{3}`。
    - 工作时维护 AC/Test-local evidence ledger：没有当前 worktree 的命令输出、exit code、`command.log` 和 `ledger.json`，不得勾选依赖该 Test ID 的 task。
    - 本生产 schema 的 runtime 必须提供 `openspec/agent-runtime/scripts/validate_tasks_quality.py`。实现前和最终 audit 前都必须运行 `python3 openspec/agent-runtime/scripts/validate_tasks_quality.py openspec/changes/<change-slug>/tasks.md`；最终 audit 必须加 `--final`，使 `Regression Test Deposit` 停留 `required`、TDD final 状态不完整、ledger 路径不 canonical 等问题成为 blocker。若脚本缺失，先同步 bundled schema/runtime，不得跳过。
    - 所有 tasks 勾选后，对三张 `Acceptance-Driven Coverage` 表、`Runtime Acceptance Index`、每个 AC-local contract、`Verification Appendix` 六张矩阵、`Regression Test Deposit` 和 `openspec/schemas/shared/tdd-regression-gates.md` 的 red/green/anti-pattern gates 做最终 audit。只有 audit 通过后，change 才 ready for archive。
