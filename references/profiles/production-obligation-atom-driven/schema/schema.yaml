name: production-obligation-atom-driven
version: 6
description: 面向生产实现的 obligation atom 工作流：proposal -> specs -> design -> acceptance-driven tasks，直接消费 openspec/orchestrate 的 canonical change packets，并按 artifact projection 区分 spec requirement、spec guard、design obligation、verification obligation 与 contextual-only atom，同时要求 source-backed behavior 沉淀为有意义的永久回归测试
artifacts:
  - id: proposal
    generates: proposal.md
    description: 带 final change obligation atom 覆盖登记表的初始 proposal
    template: proposal.md
    instruction: |
      创建 proposal，说明 WHY 此 production change 必要、WHAT production capability boundary 由它负责、WHICH final obligation atoms 必须被后续 artifacts 覆盖，以及每个 atom 应投射到 specs、design、tasks/proof 还是 guard/context。

      核心规则：
      - 本 schema 直接消费当前已存在的 `openspec/orchestrate/change-capability-anchors/` canonical change packets 与 `obligation-atom-index.md`。proposal 阶段只允许使用这些最小权威读集，不得创建或要求任何新的 proposal 前置 source artifact。
      - 当前 Phase 4 final change packet：`openspec/orchestrate/change-capability-anchors/<change-slug>/<change-slug>.md` 是唯一 canonical change contract。它独占定义本 change 的 direct scope、capability 归属、artifact projection、contextual/preserve/non-goal guard、upstream realized baseline、downstream constraints、evidence burden 和 blockers。
      - `openspec/orchestrate/change-capability-anchors/obligation-atom-index.md` 只作为 GA lookup table，用于校验 `GA-####` 存在并补齐 `Source Document`、`Lines`、`Atom Type`、`Source Fact`、`Normativity`、`Coverage Status`、`Artifact Projection`、`Source Atom Origins`、`Propose Use` 和 `Evidence Need`。它不得覆盖当前 final change packet 的 direct scope、artifact projection 或 capability 归属。
      - `openspec/orchestrate/change-capability-anchors/index.md` 只用于 packet discovery。`change-plan.md` 只在自动推断 change slug 或核对 roadmap 顺序时读取，不得覆盖 final change packet。
      - 除 canonical change packet、global atom index 和必要 capability views 外，其他 orchestrate/review/report 产物都不是 proposal 门禁或内容权威。proposal 不得从这些文件新增、删除、移动、重判 direct atom，也不得用它们扩展 final packet 之外的 scope。
      - 不得创建或依赖 `source-truth.md`、`acceptance.md`、旧版 source coverage artifact、`change-source-map.md` 或任何新的 proposal 前置 source artifact。
      - Proposal 必须包含 `Change Atom Coverage Register`，对当前 packet 的每个 `Direct Owning Atoms` 行引用 exact Global Atom ID（`GA-0001` 这种格式），并记录 `Artifact Projection` 和 `Projection Source`。下游 artifacts 必须引用 exact `GA-####`，不得使用 ranges。
      - Proposal 可以将 obligation atoms 组织为简洁的产品或技术范围，但不得遗漏、弱化或窄化 packet/global index 记录的任何 direct source-backed behavior、preserve boundary、explicit non-goal、dependency、failure path、verification obligation、artifact projection 或 proposal-level implementation gap。
      - Proposal 必须证明每个 direct atom 都已通过 global index 中的 `Source Document` + `Lines` 定点重读原文。对 contextual、contextual-preserve、explicit-non-goal、prototype-only-not-production 等 non-direct atoms，在需要保留边界或避免误扩 scope 时定点重读。

      写入前：
      - 读取 `openspec/orchestrate/change-capability-anchors/index.md`，定位 exact planned change 和 packet path；change slug 必须来自该 final packet index。
      - 如果用户未提供明确 change，或需要核对 dependency/roadmap 顺序，再读取 `openspec/orchestrate/change-plan.md`；读取目的只限自动推断，不得覆盖 final packet。
      - 读取当前 final change packet：`openspec/orchestrate/change-capability-anchors/<change-slug>/<change-slug>.md`。proposal 的 direct scope、capability 归属、artifact projection、contextual/preserve/non-goal guard、upstream baseline、downstream constraints、evidence burden 和 blockers 均以该 packet 为准。
      - 读取 `openspec/orchestrate/change-capability-anchors/obligation-atom-index.md`。
      - 只有当 packet 中某个 capability increment 需要拆分 spec file 或 packet 明确要求读取 capability view 时，才读取对应 `openspec/orchestrate/change-capability-anchors/<change-slug>/capability-anchors/<capability>.md`；这些 view 只能辅助分组，不得覆盖 final packet。
      - 检查 `openspec/specs/` 只用于判断 proposal capabilities 是新增还是修改；existing specs 不得窄化或替代 final packet/global index。
      - 对每个 direct `GA-####`，按 global index 中的 source path 和 line range 定点重读原始 source window；不得重新做全量 source discovery。
      - 记录 `Source Window Read Set`，列出每个 direct atom 的重读 source window；non-direct atom 只在需要边界确认时列入。

      阻断条件：
      - change 不存在于 final packet index；用户指定的 change 不在 final packet index 中时，不得用 `change-plan.md` 或旧 packet 猜测替代。
      - 当前 change packet 缺失、没有 `Direct Owning Atoms` 表、direct atom 缺失 artifact projection 且无法按 legacy inference 保守推断，或记录影响本 change 的 blocker。
      - packet 中 direct atom 在 `obligation-atom-index.md` 中不存在，或 final packet 内部的 direct atom、capability、evidence burden、blocker 信息无法自洽。
      - packet 明确要求的 capability view file 缺失，且没有记录明确的非阻断 capability gap。
      - direct atom 指向的 source document、line range 或 source window 无法定点重读。
      - 用户请求扩展到 planned change boundary 之外。此时停止并报告请求超出当前 canonical change contract；不得在 proposal 内扩 scope，也不得创建或要求 proposal 前置 source artifact。

      Global Atom ID 规则：
      - 直接使用 global atom registry 中的 `GA-####`，不得在 proposal 中重新编号为任何局部 source ID。
      - 每个 packet direct atom 在 proposal register 中必须正好有一行。
      - 保留 global atom / packet row 的 `Source Document`、`Lines`、`Atom Type`、`Source Fact`、`Normativity`、`Coverage Status`、`Artifact Projection`、final packet `Capability`、`Propose Use`、`Evidence Need`。
      - `direct` atoms 是 implementation candidates。`contextual`、`contextual-preserve`、`explicit-non-goal`、`prototype-only-not-production`、`non-production`、`blocked` 等 rows 是边界、guardrail 或 verification context；除非 packet/global index 明确要求，不得把它们转成新增实现 scope。
      - `Artifact Projection` 允许值为 `spec-requirement`、`spec-guard`、`design-obligation`、`verification-obligation`、`contextual-only`。Proposal direct register rows 不得使用 `contextual-only`；`contextual-only` 只可用于非 direct context/boundary rows。`blocked` 只可用于无法安全消费的 row。
      - 若旧版 final packet/global index 缺少 artifact projection，proposal 必须保守推断并在 register 的 `Projection Source` 写 `inferred-from-legacy-packet`：用户/系统行为、API/data/auth/security contract -> `spec-requirement`；preserve-boundary、explicit non-goal、must-not scope -> `spec-guard`；architecture/runtime/package/schema/provider/deployment shape -> `design-obligation`；test/fixture/visual/smoke/evidence -> `verification-obligation`；非 direct context -> `contextual-only`。无法安全推断时记录 blocker。
      - 每个 direct atom 必须有非空 downstream coverage expectation，且 downstream coverage 必须匹配 artifact projection：`spec-requirement` 进入 specs requirement/scenario；`spec-guard` 进入 specs guard/gate 或 non-goal；`design-obligation` 必须进入 design artifact；`verification-obligation` 必须进入 tasks/proof；非 direct `contextual-only` 只作为 context/guard。若 final packet 的 direct row 使用 `contextual-only`，必须改入 context/non-direct handling 或记录 blocker；不得留下 orphan `GA-####`。
      - Proposal 不得因为 atom 是 direct 就自动要求 specs 生成 requirement/scenario。

      Proposal-specific constraints：
      - `What Changes` 必须引用 exact `GA-####`，并在 source-backed 时命名相关 product surfaces、routes、domain commands、APIs、database entities/migrations、worker jobs、events/SSE streams、storage/assets、auth/security rules、billing/entitlement rules、observability/ops surfaces、deployment constraints 和 verification surfaces。
      - 当 direct atom 描述用户可见操作或控件能力（例如新增、编辑、删除、保存、选择、重试、返回、提交、关闭、取消、上传、下载）时，proposal 必须保留每个 operation verb 及其可观察结果：触发入口、作用对象、相关 API/data mutation、成功后的页面或持久化变化，以及 disabled/failure/recovery 边界。不得只写“支持编辑”“支持操作”而不列出具体操作和结果。
      - `Capabilities` 必须匹配 final packet 的 capability atom views，除非 packet 记录 source-backed conflict 或 blocker。
      - `Production Source Coverage` 必须列出 proposal register 中 exact source files、line ranges 和 `GA-####`。不得新增宽泛整篇文档读取义务。
      - `Source Window Read Set` 必须列出每个重读 source window、匹配 `GA-####`，以及重读是否改变或确认 proposal interpretation。
      - `Non-Goals` 必须包含 explicit non-goal、later-change、preserve、prototype-only、superseded 或其他明确边界 atoms 对本 change 的约束。
      - Proposal 必须把 source 只留给 propose/design 的实现细节（例如 API route 命名或最小 schema 选择）保留为 open design decisions，而不是伪装成 source-defined。

      必需章节：
      - **Obligation Atom Preconditions**
      - **Why**
      - **Change Plan Boundary**
      - **What Changes**
      - **Capabilities**
      - **Change Atom Coverage Register**
      - **Production Source Coverage**
      - **Source Window Read Set**
      - **Non-Goals**
      - **Impact**
      - **Rollout / Readiness**
      - **Proposal Alignment Gate**
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: 从 proposal obligation atoms 派生的详细规格
    template: spec.md
    instruction: |
      创建 specification files，定义 production system 应该做什么。

      写入前：
      - 先读取 `proposal.md`。把其中的 `Change Atom Coverage Register` 作为本 change 的 mandatory source-reading interface，并读取每行 `Artifact Projection`。
      - 对 proposal 中列出的每个 capability，读取当前 change 的 capability atom view file：`openspec/orchestrate/change-capability-anchors/<change-slug>/capability-anchors/<capability>.md`。随后先判定该 capability 是否有 `spec-requirement` 或 `spec-guard` delta；没有 spec-level delta 的 capability 不创建 spec file。
      - 对每个选中 `GA-####`，仅在需要保留 exact behavior、identifiers、failure paths 或 verification expectations 时，按 proposal register 的 `Source Document` + `Lines` 定点重读原始 source window。
      - 起草前建立 capability-to-atom map 和 artifact-projection map。每个 proposal direct `GA-####` 必须按 projection 映射到 requirement/scenario、spec guard、已有 delta spec 的 Artifact Projection Notes、或明确记录为 design/tasks handoff。
      - 如果修改 existing capability，起草 delta spec 前读取 `openspec/specs/<capability>/spec.md`。

      Obligation Atom closure：
      - Specs 必须把 capability 相关且 `Artifact Projection: spec-requirement` 的每个 direct obligation atom 转成规范性 requirements 和 scenarios，或在 proposal register 支持时明确捕获为 preserve/deferred/non-goal guard。
      - `Artifact Projection: spec-guard` 的 atom 应作为 guard、must-not、non-goal 或 Production Alignment Gate 约束表示，不得膨胀成新的正向行为。
      - `Artifact Projection: design-obligation` 的 atom 不得强行写成用户/系统行为 scenario。若同一 capability 已因 spec-level delta 创建 spec file，可在 `## Artifact Projection Notes` 中点名 exact `GA-####` 并声明 design artifact 的强制消费位置；若该 capability 只有 design-obligation，不得创建空 spec，必须在 `design.md` 和 `tasks.md` coverage 中消费。后续 `design.md` 必须实际落到 design obligation、implementation boundary 或 blocker。
      - `Artifact Projection: verification-obligation` 的 atom 应记录 proof expectation。若同一 capability 已因 spec-level delta 创建 spec file，可在 `## Artifact Projection Notes` 中声明 tasks/proof 的强制消费位置；若该 capability 只有 verification-obligation，不得创建空 spec，必须在 `tasks.md` proof/coverage 中消费。除非它也定义 normative behavior，不得伪造成 requirement。
      - `Artifact Projection: contextual-only` 不成为新增 requirement；它只允许用于非 direct context/boundary rows，并只在已有 delta spec 的 gate/notes、proposal non-goal、design 或 tasks 中保留必要边界。
      - 每个 requirement 必须在 `Source Atoms:` 下引用 exact `GA-####`。
      - Global Atom references 必须枚举 exact IDs，例如 `GA-0001, GA-0002, GA-0003`。禁止 `GA-0001-GA-0010`、`GA-0001..GA-0010`、`GA-0001 through GA-0010` 等 ranges。
      - Requirements 和 scenarios 必须保留 `spec-requirement` obligation atoms 中 implementation-relevant edge cases、failure states、disabled states、data/API contracts、auth/security rules 和 operational constraints；verification/design atoms 不强制写入 scenario，也不得为了 handoff 生成空 spec，但后续 design/tasks artifacts 必须按 projection 实际消费。
      - Specs 后不得留下 spec-level orphan direct atom。若某 direct atom 不产生 requirement/scenario 且同 capability 已有 delta spec，spec 可点名 exact `GA-####`，解释 source-backed boundary status、artifact projection、design/tasks handoff。若某 capability 没有任何 spec-level delta，则不创建 spec file；该 capability 的 direct atoms 必须在 proposal register、design atom matrix、tasks coverage 中闭环。

      只为有 OpenSpec delta 的 capability 创建 spec file：
      - New capabilities: 仅当至少有一个 `spec-requirement` 或 `spec-guard` 需要新增 requirement/guard 时，使用 exact kebab-case capability name（`specs/<capability>/spec.md`）。
      - Modified capabilities: 仅当 existing requirement 需要 ADDED/MODIFIED/REMOVED/RENAMED delta 时，使用 `openspec/specs/<capability>/` 中已有 spec folder name。
      - 禁止创建只包含 `## Artifact Projection Notes`、只写“无”、或没有 `### Requirement:` 的 `specs/<capability>/spec.md`；这类文件不是有效 delta spec，归档时会被 OpenSpec CLI 拒绝。

      Delta operations：
      - 新行为使用 `## ADDED Requirements`。
      - 变化行为使用 `## MODIFIED Requirements`，修改前必须复制完整 existing requirement block。
      - 删除行为只在有 **Reason** 和 **Migration** 时使用 `## REMOVED Requirements`。
      - 重命名只在有 `FROM:` / `TO:` 时使用 `## RENAMED Requirements`。

      Format requirements：
      - 每个 requirement：`### Requirement: <name>` 后跟 normative behavior。
      - Requirement names 和 scenario names 由 agent 拟定时应优先中文。只有 exact source-native names、existing requirement names、API/DB/package identifiers 或稳定技术术语才保留英文。
      - 使用 SHALL/MUST/MUST NOT 写规范行为。
      - 每个 requirement 必须包含 `Source Atoms:` bullets，列出 exact `GA-####` 和简短 obligation 摘要。
      - 每个 requirement 必须包含 `Source Trace:` bullets，列出 concrete source paths、line ranges、product workflows、architecture sections、routes、domain commands、DTOs、tables、migrations、events、jobs、queues、storage assets、auth rules、entitlement rules、prototype scenes、object states、fixture slices、responsive rules、ops processes、deployment environments 或 verification rows。
      - 每个 scenario 使用 `#### Scenario: <name>`，且必须使用 exactly 4 hashtags。
      - 每个 requirement 必须至少有一个 scenario。
      - 若 source-backed requirement 包含多个用户可见操作（例如新增、编辑、删除、选择和提交），scenario 必须逐项枚举这些操作或拆成多个 scenario；每个操作都要定义用户触发、预期 UI 变化、API/data 后果、持久化或 reload 后结果，以及适用的 disabled/failure/recovery 行为。只证明控件、data attribute、截图或静态 markup 存在，不足以表达“支持该操作”。

      Final alignment gate：
      - 每个 spec file 必须以 `## Production Alignment Gate` 结束。
      - 若已存在的 spec file 覆盖任何非 `spec-requirement` direct atom，必须在 gate 前包含 `## Artifact Projection Notes`，列出 `Global Atom ID`、`Artifact Projection`、`Spec Handling` 和 `Design / Tasks Handoff`。不得为了这张表单独创建 spec file。
      - Gate 必须列出 covered Global Atom IDs、artifact projection coverage、source docs and line ranges read、capability atom view file consumed、product workflow coverage、prototype route/object/responsive coverage（相关时）、architecture/module coverage、data/API/backend coverage、auth/security/privacy coverage、async/realtime/worker coverage、storage/asset coverage、observability/ops/deployment coverage、verification coverage 和明确边界/负向行为 coverage。
      - Gate 必须包含 `Orphan direct atoms: none` 或列出 blockers，并列出用于 exact behavior 的 focused source windows。
      - 如果任何 spec-level relevant direct atom 未被 requirement/scenario、已有 spec file 的 Artifact Projection Notes 或 gate 表示，停止并修订 proposal/specs 后再继续。纯 design/verification-only capability 的 closure 在 design/tasks 阶段检查。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: 由 obligation atoms 支撑实现细节的技术设计文档
    template: design.md
    instruction: |
      创建设计文档，说明 HOW to implement the production change。

      写入前：
      - 读取 proposal 和所有实际生成的 delta specs；不要期待纯 design/verification-only capability 有 spec file。
      - 使用 proposal 的 `Change Atom Coverage Register`、`Artifact Projection`、spec `Source Atoms`、spec `Source Trace` 和存在时的 spec `Artifact Projection Notes` 作为 source-reading interface。
      - 当 design 需要 exact product behavior、architecture/module boundaries、data/API shape、auth/security constraints、async/worker behavior、UI/prototype fidelity、observability、deployment 或 verification detail 时，只通过 registered `GA-####` 的 focused `Source Document` + `Lines` window 定点重读原始 source。
      - 不重新发现 source truth。如果 design 需要 proposal/spec atoms 无法到达的 source detail，修订 proposal/specs 或报告 blocker。
      - 起草前建立 design atom matrix。每个 `design-obligation` direct `GA-####`、每个需要 design placement 的 `spec-requirement`、每个 `spec-guard`，以及每个 in-scope spec scenario 必须映射到至少一个 design obligation、guard handling 或 explicit blocker。

      Design-specific constraints：
      - Design 必须 source-backed。无法追溯到 Global Atoms、proposal/specs 或 focused original source lines 的设计选择必须删除或记录为 open question。
      - Design 必须为每个 spec requirement、每个 `design-obligation` atom、以及每个需要 implementation placement 的 direct atom 提供 implementation approach。
      - Design 必须说明 change 如何消费并保持 source-defined architecture、runtime、package/module boundaries、routing/navigation、data ownership、transactions、auth、async processing、realtime streams、storage、provider boundaries、rendering chain、deployment 和 verification strategy。
      - 当 obligation atoms 定义行为但未定义 exact implementation shape 时，design 必须选择最小 source-compatible technical shape，并标记为 source-backed implementation decision。不得增加产品 scope、新 capability、新 provider、新 persistent domain concept 或新的 user-visible workflow。
      - Design 不得把 source-backed production behavior 替换成 placeholder、diagnostic、mock-only、static-only、fixture-only、registry-only 或 sandbox-only 行为，除非相关 atom 明确是 deferred、non-goal、contextual、reference-only 或 prototype-only-not-production。
      - 每个 source-backed implementation decision 必须记录：它解决的 source gap、选择的最小技术形态、满足的 `GA-####`，以及为避免 scope expansion 而拒绝的更大替代方案。
      - `design-obligation` atom 必须在适用 domain 上有 module/data/API/auth/worker/frontend/ops/deployment placement；`verification-obligation` atom 必须交给 Verification Design 或 tasks proof；`spec-guard` atom 必须体现为稳定 MUST NOT、preserve 或 non-goal guard。无法 placement 时记录 blocker，不得留给 implementer 猜测。

      Section depth requirements：
      - Architecture / Module Boundary Design 必须列出 package ownership、import direction、exported entry points、forbidden imports 和 cross-package contract locations。
      - Domain / Data / Migration Design 必须定义 table/entity shape、constraints、indexes、migration ownership、transaction boundaries、idempotency strategy、repository function contracts 和 forbidden columns/entities（适用时）。
      - API / Auth / Security Design 必须定义 route/handler responsibilities、DTO validation、session/cookie handling、actor resolution、authorization entry points、return target sanitization 和 sensitive-data redaction。
      - Async / Realtime / AI / Worker Design 必须定义 job/event/stream/provider contracts、payloads、ownership、locking/idempotency/retry behavior、sandbox/test-double boundary 和 explicit deferred boundaries。
      - Frontend / UX / Prototype Fidelity Design 必须定义 route/component responsibilities、props/events/state model、state transitions、disabled/failure/retry behavior、responsive variants 和 local-versus-persisted state。
      - 对每个会改变数据、状态、route 或用户可见结果的 UI control，Frontend / UX / Prototype Fidelity Design 必须定义 owner component、runtime/client-server boundary、event trigger、handler/action/API route、request payload、response merge 或 reload persistence、submitting/disabled/error/retry behavior。若框架需要浏览器端 runtime、hydration 或 client component 才能绑定事件，design 必须明确该边界；server/static markup 不能单独视为 mutating control 的完整设计。
      - Observability / Ops / Deployment Design 必须定义 log/event categories、allowed and forbidden fields、config keys or categories、environment differences、migration ordering、staging smoke expectations 和 rollback constraints。
      - Verification Design 必须把每个主要行为映射到 concrete proof：unit、DB integration、route/API、worker/job、SSE/outbox、provider sandbox、storage/asset、component、E2E、responsive visual/DOM check、明确负向边界检查、config validation、log redaction assertion 或 staging smoke。
      - 对用户可见的 mutating/selection/action control，Verification Design 必须映射到 positive interaction proof：通过实际点击、输入、选择、blur/submit 或键盘操作触发，并断言 API/data 结果和 rendered UI 更新。静态 DOM、截图、`data-testid`、enabled/disabled 断言或 SSR/static render 只能作为补充，不能单独证明交互能力。

      必需章节：
      - **Context**
      - **Goals / Non-Goals**
      - **Production Source Map**
      - **Decisions**
      - **Architecture / Module Boundary Design**
      - **Domain / Data / Migration Design**
      - **API / Auth / Security Design**
      - **Async / Realtime / AI / Worker Design**
      - **Frontend / UX / Prototype Fidelity Design**
      - **Observability / Ops / Deployment Design**
      - **Verification Design**
      - **Rollout / Compatibility**
      - **Production Alignment Gate**
      - **Risks / Trade-offs**
      - **Open Questions**

      `Production Alignment Gate` 必须回答：
      - 哪些 Global Atom IDs 被 implemented、preserved、deferred 或作为明确边界/负向 guard。
      - 每个 artifact projection 是否被正确消费，尤其是 `design-obligation`、`verification-obligation` 和 `spec-guard` 是否没有被伪装成 spec requirement。
      - 每个 spec scenario 是否有 design 中对应的 implementation contract。
      - 每个 direct atom 是否有 design obligation 或 explicit blocker。
      - 每个 source-backed implementation decision 是否最小化，并记录 rejected scope-expanding alternatives。
      - 每个 data mutation 是否在适用时有 table/column/constraint/transaction/idempotency details。
      - 每个 route/API/auth path 是否在适用时有 request/session/response/error handling details。
      - 每个 UI state 是否在适用时有 owner component、transition trigger、disabled/failure/recovery behavior 和 responsive handling。
      - 每个 observability requirement 是否在适用时有 allowed fields、forbidden fields 和 failure classes/event categories。
      - 是否仍有需要 implementer 从 atoms、specs 或 design 外部推断的行为。
    requires:
      - proposal
      - specs

  - id: tasks
    generates: tasks.md
    description: 带 obligation atom traceability 和 proof 的验收驱动实现清单
    template: tasks.md
    instruction: |
      创建 task list，将 production implementation work 拆成以 acceptance 为完成标准的执行清单。

      目的：
      - 本 schema 没有独立 `acceptance.md`。`tasks.md` 是 apply-ready execution and acceptance contract。
      - Tasks 必须按 acceptance slices 分组。每个 acceptance slice 描述 user/system-observable behavior、它证明的 exact Global Atoms，以及所需 primary evidence。
      - 一个 slice 可以包含多个 implementation tasks，并且必须至少包含一个 verification 或 acceptance task，其 proof 强度足以验收该 slice。
      - 所有 tasks 完成表示 AC-local implementation 和 acceptance proof 已由 worker 完成；apply 收口仍必须经过一次 change-stabilizer 全局收敛和只读 final-reviewer 复核。不得把最终验收延后到独立 artifact。

      写入前：
      - 读取 proposal、所有实际生成的 delta specs 和 design；不要期待纯 design/verification-only capability 有 spec file。
      - 使用 proposal 的 `Change Atom Coverage Register`、`Artifact Projection`、spec `Source Atoms`、存在时的 spec `Artifact Projection Notes` 和 design `Production Source Map` 作为 source-reading interface。
      - 仅在需要让 task proof 达到 source-equivalent 时，通过 relevant `GA-####` 的 focused `Source Document` + `Lines` windows 定点重读原始 source。
      - 将 missing 或 failed proposal/spec/design alignment gates 视为 blockers。
      - Finalizing tasks 前建立 proposal `GA-####` rows、artifact projection map、spec scenarios、design obligations、AC sections、checkbox task IDs、coverage table references、Runtime Appendix rows 和 Test Evidence rows 的索引。每个 coverage table task ID 必须解析到实际 checkbox task。
      - Finalizing tasks 前必须先建立 runtime acceptance model，再把该模型分层写入 `Runtime Acceptance Index`、AC-local execution contracts、checkbox tasks 和 `Verification Appendix`；不得先粗分 AC 再用 broad proof 补洞。
      - Finalizing tasks 前必须建立 runtime provision graph：列出每个 runtime surface / operation / state / branch / chain / Test ID 由 baseline、current-change AC、future change 还是 explicit negative boundary 提供，并区分每个 AC 的 `provides`、`consumes`、`depends-on` 和 `start-gate`。AC sections 必须按该 graph 的拓扑顺序生成。
      - Finalizing tasks 前必须建立 ownership resolution map：区分 `Artifact/Spec Owner AC`（负责 source/spec/design projection 覆盖）与 `Runtime/Test Evidence Owner AC`（负责 runtime rows、Test Evidence row、fixed command 和 execution evidence）。两者冲突时，AC-local `Runtime Rows Owned:`、`Test IDs:` 和 checkbox `Runtime Rows:` / `Test IDs:` 一律以 `Runtime Acceptance Index` / `Test Evidence Matrix.AC ID` 为准；coverage tables 只能记录 handoff，不得把非 owning AC 的 Test ID 塞进 artifact/spec owner AC。
      - 若某个 AC 的 primary proof、fixed command 或 Required Evidence 消费 current-change 内尚未由 baseline 或 earlier AC 提供的 API、DB、repository、auth、route、worker、queue、provider、storage、config 或 runtime state，必须在生成阶段重排、合并 AC、把 provider work 内联到该 AC，或生成更早的 provider AC；不得把问题留到 apply 阶段。
      - 写入时必须明确 artifact information ownership：coverage tables 只负责 source/spec/design coverage；`Runtime Acceptance Index` 只负责 AC 到 row/Test ID 的路由；AC section 是人工审阅和 worker 执行主入口；`Verification Appendix` 是 runtime row 详情、fixed commands、evidence directories、fixture boundaries 和 CI runnable 状态的唯一事实来源；`Regression Test Deposit` 是永久回归测试文件、常规回归命令、行为断言 oracle 和“不测实现细节”边界的唯一事实来源。
      - 如果某个 obligation/scenario/design item 的 artifact/spec 覆盖 AC 与 runtime proof AC 不同，必须在 coverage row 的 `Acceptance Slice IDs` / `Acceptance Proof` 中写明 handoff；`Implementation Task IDs` 可以指向 artifact/spec owner 的实现任务，`Verification Task IDs` 必须指向 runtime/Test Evidence owner AC 的 final verification task。不要为了让 coverage row 看起来同 AC 而创建引用外部 Test ID 的伪 task。
      - Testing Quality Core 不可选：每个 change 的 `tasks.md` 都必须包含 `Test Layer Plan`、`Test Evidence Matrix`、verification evidence plan fields 和 `Regression Test Deposit`。complexity gate 只能决定 runtime detail matrices 的展开深度，不能关闭分层测试、固定证据、verification plan或永久回归沉淀计划。
      - 写入时必须先建立 `Test Layer Plan`，再写 `Test Evidence Matrix`。`Test Layer Plan` 必须按 AC/behavior 列出需要的 unit、component、route/API contract、DB/integration、browser E2E、security/negative、config/ops/check 等测试层；每个被省略的适用层都必须有 source-backed 不适用理由。
      - `Test Layer Plan` 是不可降级的分层测试契约。`Required Layers` 中每个适用层都必须映射到独立 exact `T-###`；同一 `T-###` 不得同时代表 unit、component、route/API contract、DB/integration、browser E2E、security/negative 或 config/ops/check 等多个 required layer。
      - 一个 `Test ID` 的 `Layer` 只能是单一稳定类别。若一个物理测试文件覆盖多个层，必须在 `Test Evidence Matrix` 中拆成多个 Test ID、稳定 test name/filter、固定命令和 evidence row；不得用一个 broad smoke/e2e script 同时登记为 unit/component/API/DB/security 的 primary proof。
      - smoke、browser E2E、staging smoke、ops check 或 final summary 只能登记其真实层级，可作为 supplemental/default-path proof；不得填入 unit/component/route/API/DB/security 层来替代可低层稳定断言。只有 source-backed 行为确实没有稳定低层 contract boundary 时才可省略低层，并且理由必须解释为什么该层不适用，不能写“已有 smoke 覆盖”或泛泛的“需要真实 readback”。
      - 写入或更新 `Test Evidence Matrix` 与 `Regression Test Deposit` 前，必须读取并遵守 `openspec/schemas/shared/verification-regression-gates.md`。required behavior 的测试计划必须定义可重跑验证命令、证据目录、行为 oracle 和永久回归沉淀计划；不得把尚未执行的验证当作验收证据。
      - 生成 `Test Evidence Matrix` 时必须把每个 `T-###` 的计划执行闭环写清楚：root-relative fixed command、canonical evidence directory、预期 `command.log` 或 runner/CI result/report 类型、CI/root/package 入口，以及最终 audit 可重跑的最小 regression command。tasks 阶段不得声称新 required behavior 已 passed/deposited；实际执行结果、`Evidence Produced` 实际路径和 deposit 状态由 apply 阶段更新。
      - canonical evidence path、`command.log` 或 runner/CI result/report 是本地 apply 的必需执行证据。
      - `Fixed Command` 和 `Regression Command` 必须是真正能定位该 Test ID 的最小命令。不得使用 `pnpm test -- <file> -t <name>`、`pnpm test:e2e -- <file> -t <name>` 或任何 `pnpm test* -- ...` 透传 file/filter 的形式作为单个 Test ID 的固定命令；这类参数容易被 runner 当作 `--` 后的 positional args 而导致整包/整目录测试被运行。需要 file/name filter 时，使用 `pnpm exec vitest run ... <file> -t <name>`、`pnpm exec playwright test ... --grep ...`、或为该 Test ID 建立专用 package/root script。

      Runtime acceptance model 原则：
      - Runtime acceptance model 是 source-backed obligations 的验证投影，不是新的产品需求来源。每个 runtime row 必须回链到 proposal register row、spec requirement/scenario、design obligation、spec guard 或 verification obligation。
      - 每个 runtime row 必须包含 source basis：exact `GA-####`、spec scenario 名称、design section/obligation 或明确的 verification-obligation。无法回链的 row 只能作为非阻断工程辅助，不得成为 AC scope、产品行为或完成门禁。
      - 通用 web 最佳实践只能用于选择 proof 形态、测试层级和 evidence 强度，不能产生 source 外的 route、control、state、API、job、event、provider、storage、retry、offline、toast 或 lifecycle 行为。
      - 如果 proposal/spec/design 中出现 operation verbs、status enum、stage、terminal state、failure branch、disabled/loading/empty/retry/recovery branch、async queue/worker/provider/SSE/storage chain、auth/security branch 或 responsive variant，tasks 必须把它们抽取成 runtime acceptance model rows。
      - runtime detail matrices 可按实际 runtime 触达面最小化，但不能删除。若 change 确实不触及 route/control/API/data mutation/auth/DB/worker/SSE/storage/provider/state/branch，对应 `Runtime Surface Inventory`、`Operation Coverage Matrix`、`State / Branch Coverage Matrix`、`Async / Realtime Chain Matrix` 可以只保留最小 `Not applicable` 行，并必须写明 source-backed 理由。只要 proposal/spec/design/tasks 任一处出现对应 runtime 行为，就必须展开对应矩阵行。
      - Runtime acceptance model 必须同时抽取 provision relationship：`baseline-provided` 表示来自已归档 dependency 或现有代码，`provided-by-current-ac` 表示本 change 某个 AC 创建或证明，`consumed-by-current-ac` 表示某 AC 的 proof 依赖该 row，`future-change-only` 表示不得纳入当前 AC，`explicit-negative-boundary` 表示只能用于 preserve/negative proof。
      - Provider AC 可以是 backend/data/API/security contract AC，也可以是 vertical user-visible AC；判断标准不是 layer 名称，而是它是否拥有可独立验收的 source-backed contract、negative path、security/privacy/idempotency 或 migration proof。没有独立 source-backed contract 的 setup work 应内联到消费它的 vertical AC。
      - Runtime acceptance model 的完整细节用于主 agent preflight 和最终 audit；每个 worker 的主要输入必须是当前 AC-local execution contract 以及该 AC 引用的 Appendix rows，不得要求 worker 从完整全局矩阵自行推断当前责任。
      - 如果实现过程中发现新的 runtime state、branch、operation、event、job、API 或 terminal outcome，必须先更新 tasks 的 runtime acceptance model、AC-local execution contract 和 AC proof，再实现或勾选任务；不得让实现悄悄扩大状态空间。

      测试计划契约原则：
      - 测试计划必须从 source-backed behavior contract 反推，而不是从实现代码结构、私有 helper、当前组件层级、className、调用次数或临时实现分支反推。
      - 每个 `Scope Role = required behavior` 的 Test ID 默认必须遵守 `openspec/schemas/shared/verification-regression-gates.md` 的 Verification Gate、Execution Gate、Behavior Oracle 和 Mock Policy。若执行验证不适用，必须在 `Test Evidence Matrix` 的 `Evidence Status` 和 `Regression Test Deposit` 中写明 source-backed reason。
      - 每个 required behavior Test ID 都必须优先选择最小充分测试层：纯规则/解析/校验/映射/脱敏/状态机用 unit；组件状态、表单、编辑器、权限态和错误态用 component；route/DTO/auth/response contract 用 route/API contract；事务、幂等、索引、迁移和持久化 invariant 用 DB/integration；queue/worker/retry/补偿用 worker/job integration；跨页面真实用户路径用 browser E2E；明确 MUST NOT、未授权、敏感字段等稳定负向契约用 security/negative 或 config/ops/check。最小充分层拥有 primary proof ownership，不得被更高层 smoke/browser Test ID 替代。
      - 测试层级代码要求属于 `openspec/schemas/shared/verification-regression-gates.md` 和 apply/stabilizer/final-review gate。tasks 阶段只登记预期 `Layer`、`Default Path Level`、`Test File / Name`、covered rows、fixture/mock boundary、omitted-layer reason 和预期 evidence 类型；不得声称测试代码已满足 harness/runtime。
      - 写入 `Test Evidence Matrix.Layer` 时，只使用稳定类别：unit、component、route/API contract、DB/integration、worker/job integration、realtime/SSE integration、browser E2E、visual/responsive、security/negative、config/ops/check。具体适用性按 `Test Layer Plan` 的最小充分层原则和 shared gate 判定；目录名、文件名、脚本名、截图或 agent 口述不能提升层级。
      - 若某 behavior 需要真实 component/browser/API/DB/worker/SSE/visual/security/config proof，tasks 只把该需要登记为独立 Test ID、default-path expectation 和 omitted-layer reason；实际 harness/runtime 证明由 apply/stabilizer/final-review gate 完成。
      - 不得为“防止未来新增能力”生成全仓结构冻结式 guard 测试或默认门禁，例如完整 route/file/table allowlist、禁止未来 package/API route/DB table、或按当前源码清单断言必须完全相等。只有当用户显式要求架构冻结，且该冻结本身是稳定产品/安全契约时，才可生成这类检查；否则应把边界拆到对应 production owner 的稳定负向行为测试，或在 design/tasks 中作为非阻断说明记录。
      - 不得为了提高测试数量而生成 implementation-detail tests。以下测试只能作为补充，不能作为 required behavior 的 primary proof 或永久回归沉淀：只断言函数被调用、mock 被调用次数、私有方法返回、非契约 DOM 层级、快照全文、className、data-testid 存在、按钮 enabled、静态 markup 或截图存在。
      - required behavior 的 Test Evidence row 必须给出唯一 `Fixed Command`、`Verification Expectation` 和计划态 `Evidence Status`。`Verification Expectation` 必须匹配 source/spec/design/runtime row 行为契约，不能计划为语法、fixture、环境或测试自身错误。
      - 如果某个 baseline/preserve/proof-only Test ID 不需要执行验证，tasks 阶段必须把该 Test ID 明确登记为 preserve/baseline/not-applicable proof 并记录 source-backed reason；新增或变更行为默认保持 `planned`，直到 apply 阶段产出 execution evidence。
      - `Fixed Command` 是计划态固定命令；tasks 阶段不得声称 Verification 阶段已通过，也不得把 planned oracle 改成匹配当前实现输出。
      - Mock 只能隔离外部、慢速或非确定性边界；不得断言 mock 行为本身，不得为了测试向 production code 增加 test-only API。每个 mock/fixture 必须说明被替代的真实 side effects 以及由哪个 default-path proof 覆盖。
      - Fixture 只能提供输入、凭证/claims、外部返回或确定性环境，不能替代被测 runtime boundary 的默认实现。若 Test ID 涉及 route/auth/session/provider/storage/queue/worker/env/config default path，`Fixture Boundary` 必须区分 fixture data 与 production-compatible default export/dependency/config proof，且不得只在 test-only resolver 或 `NODE_ENV=test` 下成立。
      - 每个永久回归测试必须写明 assertion oracle：断言依据来自 GA/source、spec scenario、design obligation、API/DB invariant、security/privacy boundary 或用户可观察结果；不得写“匹配当前实现输出”这类循环证明。
      - 每个 required behavior 的测试应满足重构稳定性：只要外部契约不变，重命名私有函数、重排内部组件、拆分 service 或替换实现算法时测试不应失败。
      - 每个 required behavior Test ID 在 tasks 阶段必须有 fixed command、canonical evidence directory、预期执行证据类型和 `Regression Test Deposit` 计划行；执行证据由 apply/stabilizer/final-review gate 产出和检查。
      - `proof-only`、`preserve boundary`、`config/ops/check`、一次性 migration readiness、部署 smoke 或 staging-only 证据可以计划为不沉淀低层永久测试，但必须在 `Regression Test Deposit` 中写明 source-backed 不适用理由和保留的常规命令或人工/环境 gate。
      - 对用户可见状态、route/API/DTO/auth、data mutation/persistence/security、worker/SSE 或其它跨边界 behavior，tasks 只负责在 `Test Layer Plan` 中登记 required/supplemental/omitted layers、独立 Test ID、primary proof layer 和 omitted-layer reason；不得展开 runtime proof 实现方式。
      - 若只计划 smoke/browser/default-path proof，tasks 必须记录为什么可低层稳定断言不适用，并把该理由同步到 `Regression Test Deposit`。具体 proof 是否满足低层责任由 apply/shared gate 检查。
      - `Regression Test Deposit` 的 `Deposit Status` 为 `required` 只表示计划，不表示已沉淀。tasks 生成阶段新增/变更 required behavior 默认必须保持 `required`，或以 `blocked` / `not-applicable` 记录 source-backed 理由和后续 gate；不得在 `required` 状态下宣称 implementation 已完成或 ready。
      - 永久回归测试必须计划为可被常规回归入口触达：优先使用 package/root test script、稳定 Playwright/Vitest file/filter、或已登记的 smoke/e2e/ops script。若 `Regression Command` 不能从仓库根目录稳定执行，或 `CI Runnable?` 只是口头 yes 而无 root/package/CI 入口说明，该 Test ID 不得计划为已完成。
      - `deposited` 是 apply/final 状态；完整 evidence 条件由 apply/stabilizer/final-review gate 判定。tasks 生成阶段不得把新增/变更 required behavior 写成 `deposited`；若引用已有 baseline/preserve evidence，必须写明 reason 和证据来源。

      Task-writing constraints：
      - 严格遵循 checkbox format。Apply phase 解析 `- [ ]` leaf tasks。
      - 按 `## AC-### <short acceptance slice name>` headings 分组。short acceptance slice name 应优先中文，除非它是 exact source-native identifier。
      - 每个 AC section 必须包含 non-checkbox fields：`Acceptance:`、`Source Atoms:`、`Projection:`、`Spec:`、`Design:`、`Runtime Rows Owned:`、`Test IDs:`、`Prerequisites:`、`Provides:`、`Consumes:`、`Start Gate:`、`No-Scope Boundary:`、`Primary Proof:`、`Required Evidence:`、`Mock / Fixture Boundary:`、`Mock Policy:`。
      - AC section 只保存人工可读的验收行为、scope/no-scope、runtime row IDs、Test IDs、prerequisite/provision 摘要、proof 摘要和 default-path/mock 原则；不得重复 `Verification Appendix` 中的 runtime row 详情、fixed commands、test file/name、canonical evidence directory、fixture boundary 或 CI runnable 状态。
      - `Prerequisites:` 必须列出本 AC 启动前必须完成的 AC IDs、Test IDs 或 baseline facts；没有依赖时写 `None` 并说明只依赖 baseline / earlier completed AC。禁止引用后置 AC、future change 或未登记的隐式环境。
      - `Provides:` 必须列出本 AC 完成后为后续 AC 提供的 runtime surfaces、operations、states、branches、chains、contracts 或 proof facts；没有提供给其他 AC 的内容时写 `None`。
      - `Consumes:` 必须列出本 AC proof 需要消费的 baseline 或 earlier AC 提供的 runtime rows / contracts / facts；如果消费 current-change 内的 row，必须能在 `Prerequisites:` 中找到对应 provider AC。
      - `Start Gate:` 必须用中文说明进入本 AC 的可执行门禁，例如“`AC-003.3` 和 `T-005` 已完成，`RS-003`/`RS-004` 已由 earlier AC 提供”；无前置依赖时写“可在 change 开始后执行”或等价中文说明。
      - 每个 executable task 必须是 checkbox：`- [ ] AC-###.N Task description`。
      - Checkbox task descriptions 必须中文，除非 description 完全由固定 ID、commands、paths、code identifiers 或 source-native terms 构成。技术名词可以混入中文句子。
      - 每个 checkbox 后必须跟随 indented trace block，字段为 `Trace:`、`Runtime Rows:`、`Test IDs:`、`Acceptance:`、`Proof:`、`Overrides:`。
      - 每个 task block 必须与下一个 checkbox task block 之间保留一个空行。同一个 task block 的 trace fields 之间不要插入空行。
      - `Trace:` 默认写 `inherits AC-###`。只有当该 task 的 source atoms、projection、spec/design、no-scope 或 mock 边界比 owning AC 更窄或有例外时，才在 `Trace:` 或 `Overrides:` 中展开 exact override。不要在每个 task 中机械重复 AC-level Source Atoms / Projection / Spec / Design。
      - `Runtime Rows:` 必须列出该 task 负责的 Runtime Surface、Operation、State / Branch、Async / Realtime row IDs；若 task 是无 runtime 行为的 source-backed setup task，必须写 `Not applicable` 并给出理由。
      - `Test IDs:` 必须列出该 task 建立、维护或由 final verification 执行的 Test Evidence row IDs；不得重复 fixed command、test path 或 evidence directory。每个 Test ID 只能归属一个 AC，task 只能引用 owning AC 的 Test IDs；禁止同一 Test ID 出现在多个 AC section。
      - AC section 的 `Test IDs:` 和 checkbox `Test IDs:` 只能由 `Test Evidence Matrix.AC ID` 反推，不能由 capability/spec/design ownership、coverage row 或 artifact projection ownership 反推。若当前 AC 只承担 artifact/spec 覆盖而 runtime proof 属于另一个 AC，则当前 AC 写 handoff summary，不列对方 Test ID。
      - Test ID 标准命名必须是 exact `T-###`（三位数字，例如 `T-001`，可使用 `T-000` 表示 repository/runtime support）。禁止在 Test ID 中嵌入 AC 编号、测试名称、slug、字母后缀或描述性文本，例如 `T-005B`、`T-AC005-TRIAL-RESPONSIVE`、`T-001-smoke` 都不合法。Test ID 在整个 change 内必须唯一；需要区分同一物理 test file/name 的多个场景时，使用多个连续数字 Test ID，并把语义写入 `Test File / Name`、`Layer` 或 `Evidence Produced`，不要写入 Test ID。
      - AC sections、task overrides 和 coverage tables 中的 Global Atom references 必须枚举 exact IDs。禁止 ranges。
      - `Acceptance:` 必须描述 task 贡献证明的具体行为，而不是 file-edit summary。
      - `Proof:` 必须说明可观察证据，证明 linked Global Atoms、spec scenarios、design obligations 和 preserve constraints 达到 source-equivalent fidelity。
      - `Overrides:` 必须写 `None` 或列出该 task 相对 AC-level source/no-scope/mock boundary 的 exact override；不得把 Appendix 已定义的命令、目录或 fixture 明细复制到这里。
      - 每个 AC section 必须至少包含一个 final verification 或 acceptance checkbox，其 task ID 出现在 section 的 `Primary Proof` / `Required Evidence` 和所有相关 coverage table verification columns。
      - Checkbox task IDs 必须唯一、稳定，并匹配 owning AC prefix。Coverage tables 不得引用不存在的 task IDs。
      - 每个 AC 必须有至少一个 final verification Test ID。`Test IDs:` 只列 ID；Test ID 的固定可重跑命令、canonical evidence directory、execution evidence 和 local/CI runnable 状态只在 `Test Evidence Matrix` 中定义。
      - 每个 Test ID 必须有固定命令，例如 `pnpm test:e2e tests/e2e/pre-v1-failure-recovery.spec.ts` 或带稳定 test name/filter 的等价命令。命令必须能由审阅者在本地或 CI 直接重跑，不得依赖 agent 当场点击、临时 REPL、手工浏览器操作或口述步骤作为 primary proof。
      - Broad workspace commands 只能作为补充 proof；primary proof 必须绑定 AC-owned Test ID、Appendix row IDs、fixed command 和 canonical evidence directory。
      - 对用户可见的 mutating/selection/action requirement，AC 的 `Primary Proof`、`Required Evidence`、final verification checkbox 和 coverage table `Acceptance Proof` 只写人类可读摘要并引用 Operation/State rows；trigger、request/action、expected rendered UI update、API/data assertion、reload/persistence assertion、disabled/failure/recovery branch 只在 `Operation Coverage Matrix` / `State / Branch Coverage Matrix` 中定义。
      - 如果 scenario 或 atom 使用“支持 A、B、C、D”这种多个操作的表述，tasks 不得只用一个 broad “component/browser proof” 覆盖；必须在 final verification task 中逐项执行 A、B、C、D，除非记录 blocker 并回到 specs/design 修订。

      Acceptance-driven coverage gate：
      - `tasks.md` 必须以 non-checkbox `## Acceptance-Driven Coverage` section 开头。
      - 该 section 必须按顺序包含三张非 checkbox coverage tables：`### Obligation Atom Coverage`、`### Requirement / Scenario Coverage`、`### Design Obligation Coverage`。
      - `Obligation Atom Coverage` columns：`Global Atom ID`、`Artifact Projection`、`Atom Summary`、`Acceptance Slice IDs`、`Implementation Task IDs`、`Verification Task IDs`、`Acceptance Proof`。
      - `Obligation Atom Coverage` 必须为 `tasks.md` 任意位置引用的每个 Global Atom ID 建一行，并包含 proposal 中每个 direct atom，即使它只作为 preserve 或 verification context 出现。
      - `Obligation Atom Coverage` 每行只能有一个 `GA-####`。禁止 aggregate rows、ranges 或 multi-ID cells。
      - `Requirement / Scenario Coverage` columns：`Capability`、`Requirement`、`Scenario`、`Global Atom IDs`、`Artifact Projection Handling`、`Acceptance Slice IDs`、`Implementation Task IDs`、`Verification Task IDs`、`Acceptance Proof`。
      - `Requirement / Scenario Coverage` 必须为每个 in-scope requirement scenario 建一行。不得为纯 `design-obligation` 或 `verification-obligation` atom 伪造 requirement/scenario。
      - `Design Obligation Coverage` columns：`Design Section`、`Design Obligation`、`Global Atom IDs`、`Artifact Projection Handling`、`Acceptance Slice IDs`、`Implementation Task IDs`、`Verification Task IDs`、`Acceptance Proof`。
      - `Design Obligation Coverage` 必须为每个影响 implementation、preservation 或 verification 的 material design obligation 建一行。
      - 每个 coverage row 必须映射到至少一个 acceptance slice、concrete task IDs 和 source-equivalent proof。
      - 三张表中所有 `Implementation Task IDs` 和 `Verification Task IDs` 都必须解析到实际 checkbox task。若某 row 只有 AC-level proof，则创建 explicit verification checkbox，而不是只引用 AC heading。
      - Coverage table 中的 task IDs 可以跨 AC 引用，但只表示 source/spec/design 覆盖关系，不改变 task 或 Test ID ownership。跨 AC 时 `Acceptance Proof` 必须说明 artifact/spec owner 与 runtime/Test Evidence owner 的 handoff；任一 referenced checkbox 的 `Test IDs:` 仍只能列它所在 AC 拥有的 Test IDs。
      - Finalizing 前比较：proposal direct `GA-####` set、artifact projection map、specs/design/tasks 中所有 `GA-####` references、`Obligation Atom Coverage` rows、checkbox trace blocks 和 AC `Source Atoms`。任何 missing、extra、status-mismatched 或 projection-mismatched ID 都是 blocker，除非明确解释为 proposal 支持的 guard/deferred/non-goal row。

      Runtime acceptance index and verification appendix gate：
      - `Acceptance-Driven Coverage` section 之后、任何 `## AC-###` section 之前，`tasks.md` 必须包含 non-checkbox `## Runtime Acceptance Index` section。若 change 不触及 web/runtime behavior，也必须写明 `Not applicable` 和 source-backed 理由。
      - `Runtime Acceptance Index` 是给主 agent preflight 使用的轻量路由表，不是 worker 的主要执行说明，也不是 runtime/test 详情来源。它必须包含 `### AC Runtime Ownership Index` table，columns 至少为：`AC ID`、`Source Basis`、`Runtime Surface Rows`、`Operation Rows`、`State / Branch Rows`、`Async / Realtime Rows`、`Test IDs`、`Provides Rows`、`Consumes Rows`、`Depends On AC IDs`、`Prerequisite Test IDs`、`Start Gate`、`Scope Role`、`No-Scope-Expansion Check`、`Detail Matrix Rows`。
      - 每个 AC section 必须把 `AC Runtime Ownership Index` 中属于自己的 rows 编译为本 section 的 `Runtime Rows Owned:`、`Test IDs:`、`Prerequisites:`、`Provides:`、`Consumes:`、`Start Gate:`、`Required Evidence:`、`Mock / Fixture Boundary:` 摘要和 final verification checkbox；worker 不需要从完整全局矩阵自行搜索当前 AC 责任。
      - 当 `AC Runtime Ownership Index` / detail matrices 的 owning AC 与 coverage tables 的 artifact/spec AC 不一致时，runtime/Test Evidence owner 是 executable contract 的唯一归属。必须把 Test ID、Evidence Directory、Regression Deposit 和 final verification checkbox 留在 runtime owner AC；artifact/spec owner AC 只能通过 coverage row 或 AC text 引用 handoff summary。
      - 所有 AC sections 之后，`tasks.md` 必须包含 non-checkbox `## Verification Appendix` section，并按顺序包含六张详细矩阵：`### Runtime Surface Inventory`、`### Operation Coverage Matrix`、`### State / Branch Coverage Matrix`、`### Async / Realtime Chain Matrix`、`### Test Layer Plan`、`### Test Evidence Matrix`，随后包含 `### Regression Test Deposit` 表。这六张矩阵是 runtime/test 明细唯一事实来源；`Regression Test Deposit` 是永久回归沉淀和 anti-implementation-detail testing 的事实来源；它们用于生成质量、主 agent preflight 和最终 audit，不属于 executable work section。
      - `Test Layer Plan`、`Test Evidence Matrix` 和 `Regression Test Deposit` 是强制 Testing Quality Core，不得用 `Not applicable` 整表跳过。只允许对单个 Test ID、单个测试层或单个 deposit 行写 source-backed `not-applicable` / `blocked` 理由。
      - runtime detail matrices 可以按需最小化：无对应 runtime 行为时保留最小 `Not applicable` 行；有 route/control/API/data mutation/auth/DB/worker/SSE/storage/provider/state/branch 时必须展开对应 row，不得用 broad proof 或 Test Layer Plan 替代 runtime row。
      - detailed runtime matrices（除 `Test Evidence Matrix` 和 `Regression Test Deposit` 外）必须包含 `Source Basis`、`Projection Type`、`Scope Role`、`Provider AC ID`、`Consumer AC IDs`、`AC IDs`、`Test IDs`、`No-Scope-Expansion Check` columns。`Test Evidence Matrix` 必须包含 `Test ID`，并包含单数 `AC ID`、`Fixed Command`、`Default Path Level`、`Verification Expectation`、`Evidence Status`、`Evidence Directory`、`CI Runnable?`、`Requires Tests Passed`、`Source Basis`、`Projection Type`、`Scope Role`、`No-Scope-Expansion Check` columns。`Default Path Level` 只能使用 `http-app`、`route-handler-real-service`、`component-user-flow`、`db-integration`、`service-contract`、`controller-contract`、`browser-e2e`、`static-analysis`；route/auth/query/tenant/DI 行为的 `controller-contract` 只能作为 supplemental proof，必须配对 `http-app` 或 `route-handler-real-service`。`Source Basis` 必须列 exact `GA-####` 或 spec/design/verification obligation；`Scope Role` 只能是 `required behavior`、`preserve boundary`、`proof-only` 或 `not applicable`。
      - `Runtime Surface Inventory` columns 至少包含：`Surface ID`、`Surface Type`、`Owner`、`Entry Point`、`Default Path Required`、`External Boundary`、`Source Basis`、`Projection Type`、`Scope Role`、`Provider AC ID`、`Consumer AC IDs`、`AC IDs`、`Test IDs`、`No-Scope-Expansion Check`。Surface type 覆盖适用的 UI route、client component、server action、route handler/API、DB/repository、worker/job、queue、SSE/event stream、webhook、storage/asset、auth/session、config/deployment。
      - `Operation Coverage Matrix` columns 至少包含：`Operation ID`、`Trigger`、`Control / Route`、`Request / Action`、`Expected Rendered UI Update`、`API/Data Assertion`、`Reload/Persistence Assertion`、`Disabled/Failure/Recovery Branches`、`Source Basis`、`Projection Type`、`Scope Role`、`AC IDs`、`Test IDs`、`No-Scope-Expansion Check`。
      - `State / Branch Coverage Matrix` columns 至少包含：`State ID`、`State / Branch`、`Trigger Into`、`Observable UI / API Outcome`、`Data/Event Facts`、`Allowed Next States`、`Terminal?`、`Source Basis`、`Projection Type`、`Scope Role`、`AC IDs`、`Test IDs`、`No-Scope-Expansion Check`。
      - `Async / Realtime Chain Matrix` columns 至少包含：`Chain ID`、`User/System Entry`、`Enqueue / Dispatch Fact`、`Worker / Consumer Fact`、`Domain Mutation`、`Event / Outbox Fact`、`Client Subscription / Readback`、`Rendered Terminal State`、`Failure Variant`、`Source Basis`、`Projection Type`、`Scope Role`、`AC IDs`、`Test IDs`、`No-Scope-Expansion Check`。
      - `Test Layer Plan` columns 至少包含：`AC ID`、`Behavior / Boundary`、`Source Basis`、`Projection Type`、`Required Layers`、`Test IDs By Layer`、`Omitted Layers / Reason`、`Primary Proof Layer`、`Regression Entry`、`No-Scope-Expansion Check`。它必须解释为什么某个 source-backed behavior 只用 smoke/browser 或只用低层测试仍足够；不得留空。
      - `Test IDs By Layer` 必须对 `Required Layers` 中每个适用层使用不同 exact `T-###`。同一 Test ID 不得出现在多个 required layer 下；若某层只是 supplemental 或 not-applicable，必须在该层 cell 中标明并指出唯一 primary layer。
      - `Test Evidence Matrix` 的 `Layer` 必须是单一层级，禁止写 `browser E2E + route/API + DB integration` 这类组合层；组合 proof 必须拆成多行、多 Test ID、多固定命令或稳定 filter。
      - `Regression Test Deposit` 一行可以列同一 AC 的多个 Test ID，但每个 Test ID 必须已有独立 Evidence row。不得把多个测试层折叠到同一个 smoke/evidence-only 文件，除非该文件内存在可由稳定 test name/filter 区分的长期测试，并且每层都有独立 regression command。
      - `Regression Test Deposit.Permanent Test File` 在 tasks 阶段只登记 production owner-local 长期测试文件或稳定 runner entry；不得登记 change-scoped、evidence-only 或 `openspec-results/**` / `test-results/**` path 作为永久测试代码。具体 owner placement 是否匹配测试层由 apply/shared gate 检查。
      - `Test Evidence Matrix` columns 至少包含：`Test ID`、`AC ID`、`Fixed Command`、`Test File / Name`、`Layer`、`Covers Rows`、`Default Path Level`、`Fixture Boundary`、`Verification Expectation`、`Evidence Status`、`Requires Tests Passed`、`Evidence Directory`、`Evidence Produced`、`CI Runnable?`、`Source Basis`、`Projection Type`、`Scope Role`、`No-Scope-Expansion Check`。Layer 应使用 unit、component、route/API contract、DB/integration、worker/job integration、realtime/SSE integration、browser E2E、visual/responsive、security/negative、config/ops/check 等稳定类别。`Test File / Name` 必须引用按 production owner 放置的长期 test/spec 文件或稳定 runner entry，不得引用 change-scoped 聚合目录。tasks 阶段 required behavior 可停留 `planned`；apply/final 完成时只能是 `passed`、`not-applicable` 或 evidence-level `blocked`，其中只有 `passed` 可作为 success proof 或 deposited regression。
      - `Regression Test Deposit` columns 至少包含：`AC ID`、`Test IDs`、`Permanent Test File`、`Regression Command`、`Behavior Contract`、`Assertion Oracle`、`Fixture Boundary`、`CI Tier`、`Not Testing`、`Deposit Status`。每行必须只服务一个 AC；`Test IDs` 可列该 AC 的一个或多个 exact `T-###`；`Deposit Status` 只能是 `required`、`deposited`、`not-applicable` 或 `blocked`，且 `not-applicable` / `blocked` 必须写 source-backed reason。
      - 每个 operation/state/branch/async row 必须至少映射一个 Test ID、一个 AC ID，并出现在 owning AC 的 `Runtime Rows Owned:` 和至少一个 checkbox `Runtime Rows:` 中，除非 `Scope Role` 为 `preserve boundary` 或 `not applicable` 且说明不需要执行 proof 的 source-backed 理由。
      - 每个 Test ID 必须覆盖具体 matrix row IDs，并且 `AC ID` 只能是一个 exact `AC-###`。禁止 `AC ID` 单元格包含逗号、多个 AC、范围或 “shared”。若同一个物理 test file/name 服务多个 AC，必须拆成多个 Test ID；这些 Test ID 可以共享物理文件，但必须有 AC-local fixed command、test name/filter 和 evidence directory。
      - 每个 Test ID 必须匹配 exact `T-[0-9]{3}`，例如 `T-001`。禁止 `T-005B`、`T-AC005-TRIAL-RESPONSIVE`、`T-001-smoke` 或任何带名称、AC 编号、slug、字母后缀的 Test ID；测试语义只能写入 `Test File / Name`、`Layer`、`Covers Rows` 或 `Evidence Produced`。
      - 每个 Test ID 必须出现在 owning AC 的 `Test IDs:` 和相关 checkbox `Test IDs:` 中，不得出现在其他 AC section。Broad command 可作为补充 evidence produced，但 primary proof 必须绑定 AC-owned Test ID、fixed command、row IDs 和 canonical evidence directory。
      - `Requires Tests Passed` 必须列出该 Test ID 可执行前必须已通过的 earlier AC Test IDs；没有前置测试时写 `None`。如果某 Test ID 的 fixed command 需要 API/DB/schema/provider 等 current-change surface，必须把提供该 surface 的 earlier AC Test IDs 写入该列，或把 provider work 内联到 owning AC。
      - `Evidence Directory` 必须计划为 `openspec-results/<change-slug>/<AC-ID>/<Test-ID>/`，其中 `<Test-ID>` 必须匹配 `T-[0-9]{3}`。tasks 阶段只登记 canonical directory；实际 evidence 保存、复制和 curated artifacts 由 apply/stabilizer/final-review gate 检查。需要产出截图、trace 或 machine-readable facts 时，使用 runner artifact/attachment、测试框架 output directory 或 worker、change-stabilizer 或 automation 配置的临时 artifact directory。
      - 每个 Test ID 的 `Evidence Produced` 必须列出预期 artifact categories，例如 `command.log`、runner/CI result/report、screenshot、trace、DOM snapshot、API facts、DB facts、job/event facts、log/audit facts 或 failure trace。实际文件存在性和内容一致性由 apply/stabilizer/final-review gate 检查。
      - Fixture/mock 边界必须在 `Test Evidence Matrix` 的 `Fixture Boundary` 中逐 Test ID 声明：允许 mock/sandbox 的段、不能 mock 的 default path、以及另一个测试如何覆盖被 fixture 替换的 production path。AC 的 `Mock / Fixture Boundary:` 只保留人类可读摘要。fixture-only、static 或 isolated proof 不得计划为 async/realtime/browser terminal state 的唯一 primary proof。
      - 对 async/realtime chain、user-visible operation、API/data/persistence mutation 等行为，tasks 只登记 required rows、paired Test IDs、default-path expectation 和 source-backed omitted-layer reason；实际 runtime/readback proof 由 apply/stabilizer/final-review gate 检查。
      - 每个 `Scope Role = required behavior` 的 Test ID 必须在 `Regression Test Deposit` 中有 `required` 或 `deposited` 行，指向永久测试文件和常规回归命令。若该 Test ID 只适合 browser E2E 或 staging smoke，仍必须写明为什么低层永久测试不适用，以及哪个稳定 E2E/ops 命令作为长期回归入口。
      - `Regression Test Deposit = deposited` 是 apply/final 完成状态。tasks 阶段新增/变更 required behavior 不得写成 `deposited`；若登记 baseline/preserve `deposited`，只允许引用已有测试入口并写明 evidence reason。新增/变更 behavior 的具体写入条件由 apply/stabilizer/final-review gate 负责。
      - `Regression Test Deposit` 的 `Permanent Test File` 不得只指向 `openspec-results/`、`test-results/`、agent 临时脚本、`openspec/changes/**`，或只为当前 change 存在的 evidence-only / change-scoped feature bucket。除 `not-applicable` 外，必须指向按 production owner 放置的可持续维护 test/spec 文件，或稳定 smoke/e2e/ops 测试入口；禁止用 `tests/<change-slug>/` 或 `tests/<change-slug-prefix>/` 承载 unit、domain、DB、API、component 等 owner-local 测试。
      - `Regression Command` 不得只写 broad workspace command；必须是最小可重跑命令，例如 package-level unit/component/integration 命令、稳定 test file/filter，或 source-backed 的 smoke/e2e command。Broad workspace command 可额外列为 CI tier，但不能替代 behavior-specific regression command。
      - `Behavior Contract` 必须用 source/spec/design 语言描述外部行为；`Assertion Oracle` 必须说明断言依据；`Not Testing` 必须列出刻意不测的实现细节，例如私有函数名、调用次数、DOM 层级、样式类名或快照全文。

      Proof strength planning：
      - tasks 阶段只登记 required proof categories 和 expected evidence types，不展开执行方式。用户可见、API/data、worker/SSE、auth/security/privacy、failure/recovery 等行为必须映射到相应 Test ID 和 detail rows。
      - 实际 browser/component/API/DB/worker/SSE/visual/security/config proof 的 runtime 执行、readback、artifact 和日志事实由 apply/stabilizer/final-review gate 检查。
      - Tasks 必须为每个 AC 定义 execution evidence expectation：AC section 描述 evidence fact categories，`Test Evidence Matrix` 定义 fixed commands、canonical `openspec-results/<change-slug>/<AC-ID>/<Test-ID>/` paths、`command.log` 或 runner/CI result/report expectation，以及不能被 mocks 替代的 default-production-path expectation。
      - 永久回归测试不能只证明 implementation artifact 存在。测试名称、fixture 和断言必须围绕 behavior contract、API/data invariant、security boundary 或 user-observable outcome。若测试在删除关键业务逻辑、反转 guard、漏写持久化、移除鉴权或破坏错误分支时不会失败，则 proof 不足。
      - 不要求为每一行代码、每个私有 helper 或每个临时分支写测试。测试数量不是 gate；source-backed behavior、重要边界、失败路径和可维护的 regression oracle 才是 gate。

      Recommended AC grouping：
      - AC sections 必须由 runtime acceptance model 反推生成，并在 `Runtime Acceptance Index` 中登记 ownership：按 externally meaningful user/system acceptance behavior、terminal state、failure/recovery branch 或 async chain segment 分组，不按文件分组。
      - 一个 AC 只拥有一个可验收行为闭环，或一个明确的异步 lifecycle 段。若一个行为包含多个 terminal states（如 success、failed、dispatch_failed、timeout、unauthorized），必须拆成多个 AC 或多个 final verification checkboxes，并在 State / Branch Coverage Matrix、`Runtime Rows Owned:` 和 checkbox `Runtime Rows:` 中逐行映射。
      - AC section 是 worker 的主要执行契约；全局三张 coverage 表只负责 source/spec/design 覆盖，`Runtime Acceptance Index` 只负责路由，`Verification Appendix` 负责 runtime/test 明细。
      - 生成 AC 时必须优先形成自闭环 vertical acceptance slice；如果一个用户可见 AC 的 proof 需要 DB/API/repository/auth 等基础，且这些基础没有独立 source-backed contract，则把基础实现作为该 AC 内的子任务。
      - 如果 DB/API/repository/auth/security/idempotency/migration 等基础本身有独立 source-backed contract、negative path、privacy/security proof 或多 AC 复用价值，则生成独立 provider AC，并把所有 consumer AC 排在它之后。
      - 如果 provider AC 和 consumer AC 无法各自形成可验收闭环，或 provider 只服务单一 consumer 且无独立 proof 价值，必须合并为一个 AC；不得生成一个只能被后置 AC 证明的空心 provider AC。
      - 如果多个 AC 消费同一个 current-change runtime surface，必须有且只有一个 earlier provider AC 或 baseline fact 拥有该 surface；consumer AC 不得重复实现 provider 行为，也不得用 mock/fixture 绕过 provider proof。
      - 需要体现实现顺序时，可在一个 AC 下使用多个较小 tasks；跨 AC 的顺序必须通过 runtime provision graph、`Prerequisites:`、`Provides:`、`Consumes:` 和 `Start Gate:` 显式表达，并通过拓扑排序体现在 AC section 输出顺序中。
      - 当 acceptance proof 跨层时，在每个 AC slice 内包含 final verification task。
      - Repository/runtime setup tasks 只有直接支撑 source-backed acceptance behavior 时才放入相关 AC；否则使用短 `AC-000 Repository / Runtime Support` section，并给出 concrete `Not applicable` justification。

      Final check：
      - 确认 AC names 和 checkbox task descriptions 在非 source-native identifier 时为中文。
      - 确认每个 direct atom 的 `Artifact Projection` 在 proposal、specs、design、AC sections、task overrides 与 coverage tables 中一致或有明确 handoff 理由。
      - 确认 artifact/spec owner 与 runtime/Test Evidence owner 已解析：若同一 `GA-####`、scenario 或 design obligation 的 implementation/proof 跨 AC，coverage row 必须写明 handoff，且所有 AC-local `Test IDs:` / checkbox `Test IDs:` 仍只引用本 AC 拥有的 Test IDs。
      - 确认每个 direct atom 按 `Artifact Projection` 获得对应执行覆盖：`spec-requirement` 需要 implementation task 和 verification/acceptance proof；`design-obligation` 需要 design placement、必要 implementation task 和 proof；`verification-obligation` 需要 explicit verification/acceptance proof，可不伪造实现任务；`spec-guard` 需要 guard/preserve/静态或负向 proof。除非该 atom 被 proposal 明确分类为 deferred/non-goal/reference-only/guard，否则不得缺少 projection 对应的覆盖。
      - 确认每个 in-scope requirement scenario 映射到 AC section。
      - 确认每个 material design obligation 映射到 AC section。
      - 确认 `Runtime Acceptance Index` 中每个 owning row 都能解析到 AC-local `Runtime Rows Owned:`、`Test IDs:`、checkbox `Runtime Rows:` / `Test IDs:` 和 `Verification Appendix` detail matrix rows。
      - 确认 `Runtime Acceptance Index` 中每个 AC 的 `Provides Rows`、`Consumes Rows`、`Depends On AC IDs`、`Prerequisite Test IDs` 和 `Start Gate` 与 AC-local `Prerequisites:`、`Provides:`、`Consumes:`、`Start Gate:` 一致；任一 consumer AC 不得消费后置 AC 才提供的 row。
      - 确认 `Verification Appendix` 中每个 mandatory row 都有 source basis、scope role、provider/consumer ownership、AC ID、Test ID 和 no-scope-expansion check，且没有 source-less mandatory AC 或没有 owning AC 的 runtime row。
      - 确认 AC section 输出顺序是 runtime provision graph 的拓扑序：每个 `Depends On AC IDs` 都排在当前 AC 之前；没有循环依赖；没有 future-change-only row 被作为当前 AC prerequisite；没有 hidden dependency 只出现在 proof 文本或 fixed command 中。
      - 确认 specs/design 中出现的 operation、state、branch、terminal outcome、async chain、failure/retry/recovery、auth/security branch、responsive variant 都已出现在相应 detail matrix、`Runtime Acceptance Index` 和 owning AC-local contract；若不适用，必须有 source-backed `Not applicable` 理由。
      - 确认每个 required behavior、preserve boundary 和 proof-only guard 都在 `Test Layer Plan` 中有测试层选择；省略 unit/component/API/DB/browser/security/config 等适用层时必须有 source-backed 理由，且理由不能只是“已有 smoke 覆盖”。
      - 确认 `Required Layers` 中每个适用层都有独立 Test ID，且没有同一 Test ID 被登记为多个 required layer 或组合 `Layer`。若只有 smoke/browser Test ID 覆盖多个可低层断言，tasks 不可 final。
      - 确认每个 `Test Evidence Matrix` row 绑定具体 operation/state/branch/async row IDs，并且只有一个 exact owning `AC ID`；任何多 AC Test ID、shared Test ID、范围 AC 或同一 Test ID 出现在多个 AC-local contracts 中都是 blocker。
      - 确认每个 checkbox task 的 `Test IDs:` 都能在 `Test Evidence Matrix` 中解析，且每个 Test ID 的 owning `AC ID` 等于 checkbox 所在 AC；任何 artifact/spec owner AC 引用 runtime owner AC Test ID 的情况都是 blocker，必须改为 coverage handoff、移动 task、拆分 Test ID 或调整 runtime ownership。
      - 确认每个 `Test Evidence Matrix` row 的 `Requires Tests Passed` 与 AC dependency graph 一致；如果 fixed command 会因后置 AC 尚未提供 runtime surface 而失败，必须重排、合并或内联 provider work，而不是保留一个不可执行的 AC。
      - 确认每个 Test ID 匹配 exact `T-[0-9]{3}`，有 fixed command、canonical evidence directory、预期 evidence produced 类型和 local/CI runnable 标记，并出现在 owning AC 的 `Test IDs:` 和相关 checkbox trace 中；每个 required row 至少有自动测试计划或明确 source-backed manual/staging gate。
      - 确认每个 required behavior Test ID 计划满足 `openspec/schemas/shared/verification-regression-gates.md`：有唯一 `Fixed Command`、来自 source/spec/design/runtime row 行为契约的 `Verification Expectation` 和计划态 `Evidence Status`；不得把尚未执行的验证登记为新增/变更行为的 success proof。
      - 确认每个 required behavior Test ID 在 `Regression Test Deposit` 中有永久回归沉淀计划或 source-backed `not-applicable` 理由；沉淀行必须包含按 production owner 放置的可维护 test file、最小回归命令、behavior contract、assertion oracle、fixture boundary、CI tier 和明确的 `Not Testing` 实现细节边界，不得把 unit/domain/DB/API/component 测试集中到 change-scoped `tests/<change-slug-prefix>/` 目录。
      - 确认新增/变更 required behavior 的 `Regression Test Deposit` 不被写成 `deposited`，除非引用已有 baseline/preserve evidence 并写明 reason；不得以 `required` 作为 implementation 完成状态。
      - 确认每个永久回归命令计划能从仓库根目录稳定执行，并且可通过 root/package script、CI job、稳定 test file/filter 或登记的 smoke/e2e/ops script 触达；未接入常规回归入口的测试只能计划为临时 evidence，不能计划为 deposited。
      - 确认没有 implementation-detail tests 被登记为 primary proof 或永久回归沉淀：不得把私有 helper、mock 调用次数、非契约 DOM 层级、className、快照全文、data-testid 存在或按钮 enabled 作为 required behavior 的 assertion oracle。
      - 确认 fixed command、evidence directory、fixture boundary 和 CI runnable 状态只在 `Test Evidence Matrix` 中定义，AC section 和 checkbox task 只能引用 Test ID 或描述 evidence category。
      - 确认每个 coverage table task ID 解析到 checkbox task，且每个 AC 有 final verification/acceptance checkbox。
      - 确认不存在 orphan direct atoms、aggregate Obligation Atom Coverage rows 或 GA ranges。
      - 确认 task 未要求 unplanned services、integrations、routes、scenes、pages、surfaces、objects、components、states、assets、APIs、tables、jobs、events、providers、deployment environments 或 source-out-of-scope behavior。
      - 确认每个 task 有 observable proof，而不只是 file-edit statement。
      - 确认没有任何 source-backed 用户可见操作只由 static DOM、screenshot、控件存在、API-only test 或 broad test command 覆盖；UI 操作、API/data mutation 和 persistence/readback 需要在同一 AC proof 中闭环，或明确拆成互相引用的 implementation 和 verification tasks。
      - finalizing `tasks.md` 后必须执行 Testing Quality Core plan audit，并修复所有测试计划、默认路径、Test ID ownership、fixed command、verification evidence fields 和 Regression Test Deposit 缺口。该 audit 是 Testing Quality Core 的结构自查，不替代人工 source/spec/design 审查，也不替代 apply 阶段的验证执行。
    requires:
      - proposal
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    编码前读取 proposal、specs、design 和 tasks。通过 linked Global Atom IDs 及其 registered source document + line ranges 消费 source documents。

    实现前建立 apply preflight index：
    - Proposal Change Atom register rows、direct atoms、boundary/guard atoms 和 source line ranges。
    - Proposal Artifact Projection map。
    - Spec requirements/scenarios 及其 `GA-####` references。
    - Design obligations 及其 `GA-####` references。
    - AC sections、AC-local execution contract fields、checkbox task IDs、trace inheritance / overrides、coverage table rows、AC-owned Test IDs、Prerequisites/Provides/Consumes/Start Gate 和 proof/evidence requirements。
    - `Runtime Acceptance Index`：每个 AC 的 source basis、runtime surface rows、operation rows、state/branch rows、async/realtime rows、Test IDs、Provides Rows、Consumes Rows、Depends On AC IDs、Prerequisite Test IDs、Start Gate、scope role、no-scope-expansion check 和 detail matrix row references。它只作为 routing index，不作为 row/test 详情来源。
    - `Verification Appendix`：`Runtime Surface Inventory`、`Operation Coverage Matrix`、`State / Branch Coverage Matrix`、`Async / Realtime Chain Matrix`、`Test Layer Plan`、`Test Evidence Matrix` 的全部 row IDs、source basis、scope role、runtime detail provider/consumer `AC IDs`、Test Evidence owning `AC ID`、Requires Tests Passed、Test IDs 和 no-scope-expansion checks。Appendix 是 runtime/test detail source of truth。
    - 从 specs/design/tasks 抽取的 user-visible operation matrix：每个 mutating/selection/action control 的 trigger、handler/action/API route、expected UI update、API/data assertion、reload/persistence assertion 和 disabled/failure/recovery branch。
    - 从 specs/design/tasks 抽取的 state/branch matrix：每个 status、stage、loading、empty、disabled、locked、success、failure、retry/recovery、terminal outcome、auth/security branch、responsive variant 及其 required tests。
    - 从 specs/design/tasks 抽取的 async/realtime chain matrix：每个 queue、worker、provider、webhook、outbox、SSE、polling、storage 或 readback path 的 success/failure terminal proof。
    - Test layer plan：每个 AC/behavior 的 required test layers、Test IDs by layer、omitted layers / reason、primary proof layer 和 regression entry。
    - Test evidence matrix：每个 Test ID、owning AC ID、fixed command、test file/name、layer、covered row IDs、default path 标记、fixture boundary、verification expectation、evidence status、requires tests passed、canonical evidence directory、evidence produced 和 CI runnable 标记。
    - 从 `Test Evidence Matrix` 汇总的 execution evidence targets：fixed commands、canonical `openspec-results/<change-slug>/<AC-ID>/<Test-ID>/` artifacts、`command.log` 或 runner/CI result/report、browser/rendered artifacts、API/DB/job/storage/log/audit facts 和 default-production-path proof。
    - Regression test deposit：每个 AC/Test ID 的永久测试文件、最小回归命令、behavior contract、assertion oracle、fixture boundary、CI tier、Not Testing 边界和 deposit status。
    - Language gate targets：checkbox task descriptions、AC-level no-scope/mock-policy explanations 和 task-level acceptance/proof/overrides explanations。

    若 preflight index 发现 GA ranges、orphan direct atoms、artifact projection mismatch、coverage tables 中 unresolved task IDs、coverage table 跨 AC proof 缺少 handoff 说明、`Runtime Acceptance Index` 缺失或与 AC-local contract 不一致、detail runtime matrix row 缺少 source basis、mandatory row 缺少 provider/consumer ownership、mandatory row 缺少 AC ID 或 Test ID、缺少 `Test Layer Plan`、Test Layer Plan 未覆盖 required behavior / preserve boundary / proof-only guard、省略适用测试层但没有 source-backed 理由、`Required Layers` 多层却复用同一 Test ID、同一 Test ID 被登记到多个 required layer、Test Evidence row 的 `Layer` 是组合层、smoke/browser/ops/final summary Test ID 被登记为 unit/component/API/DB/security primary proof、Omitted Layers reason 只是“已有 smoke 覆盖”或泛泛“需要真实 readback”、Test Evidence row 的 `Test ID` 不匹配 exact `T-[0-9]{3}`、Test Evidence row 未绑定具体 covered rows、Test Evidence row 归属多个 AC、同一 Test ID 出现在多个 AC-local contracts、checkbox 引用非 owning AC Test ID、缺少 fixed command、缺少 canonical evidence directory、evidence directory 不在 `openspec-results/<change-slug>/<AC-ID>/<Test-ID>/` 或其中 `<Test-ID>` 不匹配 `T-[0-9]{3}`、required behavior Test ID 缺少 `Verification Expectation` / `Evidence Status` 且没有 source-backed not-applicable reason、required behavior Test ID 缺少 `Regression Test Deposit` 行、deposit 行缺少永久测试文件/最小回归命令/behavior contract/assertion oracle/Not Testing 边界、deposit 把 implementation-detail tests 登记为 primary proof、Regression Deposit 只停留在 `required` 且被当作完成、Regression Deposit 用 smoke/evidence-only 文件代表可低层稳定断言、永久回归命令不能从仓库根目录稳定执行、CI Runnable 缺少 root/package/CI 入口说明、AC-local `Runtime Rows Owned:` / `Test IDs:` / `Prerequisites:` / `Provides:` / `Consumes:` / `Start Gate:` 无法解析到 detail matrices、AC consumes 后置 AC 才提供的 runtime row、Depends On AC IDs 形成循环或未按拓扑顺序排列、Test Evidence `Requires Tests Passed` 与 AC dependency graph 不一致、checkbox `Trace:` / `Runtime Rows:` / `Test IDs:` 缺失、缺少 final verification task 的 AC sections、missing trace inheritance/overrides、英文主导 task descriptions、用户可见操作只有 presence-only/static proof，或 proof 弱于 atom/source/design obligations，暂停并更新 artifacts 后再编辑代码。
    如果 specs/design 中出现的 operation、state、branch、terminal outcome、async chain、failure/retry/recovery、auth/security branch 或 responsive variant 没有进入 `Verification Appendix`、`Runtime Acceptance Index` 和 owning AC-local contract，必须先修订 tasks；不得通过实现或测试绕过缺失矩阵行。
    如果 AC section 或 checkbox task 重复定义 fixed command、evidence directory、fixture boundary、test file/name 或 CI runnable 状态，而不是只引用 Test ID 和 evidence category，必须先修订 tasks，保持这些明细只在 `Test Evidence Matrix` 中维护。永久回归测试文件、回归命令、behavior contract、assertion oracle 和不测实现细节边界只能在 `Regression Test Deposit` 中维护，AC section 和 checkbox task 只引用 Test ID 或描述测试意图。

    测试层级代码门禁：
    - apply 阶段必须以 `openspec/schemas/shared/verification-regression-gates.md` 的 `Test Layer Code Requirements` 和 `Mock Policy` 作为执行准则；tasks 中的 `Layer`、`Default Path Level`、预期 evidence 或目录命名只是计划，不足以证明测试代码满足层级。
    - apply 前必须按 `Test Evidence Matrix.Layer` 打开或创建对应测试文件，确认实际 harness/runtime 与登记层级一致；若层级与代码 harness/runtime 不匹配，先修订 `Test Layer Plan` / `Test Evidence Matrix`，或补齐正确层级测试，不得用实现绕过。
    - `browser E2E` 行必须有真实浏览器 runtime marker（例如 Playwright/WebDriver/Cypress import、browser/context/page、`page.goto`、locator/getByRole、click/fill/select/press/submit、DOM/readback/screenshot/trace assertion）。没有这些 marker 的 `tests/e2e/**` 文件不得勾选 browser E2E Test ID；直接 import route handler、repository、server action、状态机或 component reducer 时必须改登记为 route/API、DB/integration、unit 或 component supplemental。
    - `component` 行必须有真实 component harness marker（mount/render 到交互 DOM、screen/getByRole/label/text、userEvent/fireEvent 或 framework interaction helper）。只用 `renderToStaticMarkup`、snapshot、字符串 DOM、reducer/state-machine 调用时，不得勾选 component primary proof。
    - `unit` 行不得触发真实 HTTP、浏览器 DOM、数据库事务、queue/worker 或 storage side effect；若实际测试跨越这些边界，必须改登记为对应 integration/component/API/browser 层，或补充正确层级 Test ID。
    - route/API 行必须调用实际 route handler、server action、API entry、RPC resolver 或 service contract boundary，并构造 Request/session/auth/context；DB/integration 行必须执行真实 database/repository/transaction/migration/readback/invariant path；worker/job、realtime/SSE、visual/responsive、security/negative 和 config/ops/check 行必须分别证明对应 production-compatible boundary。只证明 mock、fixture、私有 helper、静态文件存在或 broad command 通过时，必须先补测试或修 artifacts。

    Implementation 和 acceptance 在本 schema 中是同一个 workflow：
    - 按依赖顺序处理 AC sections。
    - 编辑任何 task 前，先读取当前 AC 的 AC-local execution contract：`Acceptance:`、`Source Atoms:`、`Projection:`、`Spec:`、`Design:`、`Runtime Rows Owned:`、`Test IDs:`、`Prerequisites:`、`Provides:`、`Consumes:`、`Start Gate:`、`No-Scope Boundary:`、`Primary Proof:`、`Required Evidence:`、`Mock / Fixture Boundary:` 和 `Mock Policy:`。
    - 编辑任何 task 前，确认当前 AC 的 `Prerequisites:`、`Depends On AC IDs` 和 `Prerequisite Test IDs` 已完成且证据存在；若未满足，必须先处理前置 AC 或修订 tasks，不得用 mock、fixture 或越界实现绕过。
    - 编辑任何 task 前，读取该 task 的 `Trace:`、`Runtime Rows:`、`Test IDs:`、`Acceptance:`、`Proof:` 和 `Overrides:` 字段。`Trace: inherits AC-###` 表示 task 继承 AC-level Source Atoms / Projection / Spec / Design / No-Scope Boundary / Mock Policy；只有 `Overrides:` 或 `Trace:` 中列出的 exception 才覆盖 AC-level contract。
    - 编辑任何 task 前，只读取该 AC-local contract 和 task trace 引用的 Runtime Surface、Operation、State / Branch、Async / Realtime Chain 和 Test Evidence detail rows；若 task 没有相关 rows 且不是 source-backed repository/setup task，先修订 tasks。
    - 读取 linked proposal register rows，并只读取该 task 需要的 focused original source line ranges。
    - 不实现无法追溯到 proposal、specs、design、Global Atom IDs 和 original source docs 的行为。
    - 优先建立或补齐该 AC-local `Test IDs:` 和 task `Test IDs:` 对应的自动测试，并同时落实 `Regression Test Deposit` 中的永久回归测试。实现与验证完成后，运行同一 Test ID 的唯一 `Fixed Command` 证明通过。实现完成前，`Test Layer Plan` 中每个 required layer 对应的独立 Test ID 必须存在或有 evidence-level blocked/not-applicable 理由；实现后相关 Test IDs、最小 regression commands 和 execution evidence 必须通过。fixed command、typecheck、lint、test、oracle 或 evidence 缺口失败默认是未完成工作，worker 或 change-stabilizer 必须修复实现、测试、artifacts 或 evidence 收集方式并重跑；只有失败原因无法由 agent 在当前 change scope 内自主解除时，才可记录 evidence-level `blocked` 并返回流程级 blocker。
    - 为每个 required layer 创建或补齐符合该 layer code requirements 的测试代码。若实现过程中发现组件状态、DTO/route contract、DB invariant、security/privacy boundary 或纯规则可低层稳定测试，必须新增对应 Test ID、Evidence row 和 Regression Deposit 行；不得把新低层责任塞进既有 smoke/browser Test ID。
    - 如果 fixed command 失败、只证明 mock/fixture/实现细节存在，或验证 oracle 不符合 `Verification Expectation`，先修实现、测试或 artifacts；不得削弱测试 oracle 以获得通过。
    - fixed command 或等价 regression command 通过后，必须把 `Evidence Status`、`Evidence Produced` 和 `Regression Test Deposit.Deposit Status` 更新回 `tasks.md`。新增/变更 required behavior 只有在永久测试文件或稳定入口已存在、regression command 已由当前 worktree evidence 证明通过时，才能写成 `deposited`。
    - 如果某个 behavior 只由 smoke/browser E2E 覆盖，而该 behavior 存在可低层稳定断言的 rule、DTO、component state、API contract、DB invariant 或 security boundary，必须先补齐对应低层测试或更新 artifacts 写明不适用理由；不得用单一 smoke 脚本替代分层测试体系。
    - 写测试前必须确认测试的 behavior contract 和 assertion oracle 来自 GA/spec/design/runtime row，而不是来自当前实现代码。不得把私有 helper、mock 调用次数、非契约 DOM 层级、className、快照全文、data-testid 存在或按钮 enabled 作为 required behavior 的主要断言。
    - 除非 task 的 `Proof:` 已执行且 linked acceptance slice 达到所需 fidelity，否则不得标记 task complete。
    - 如果 artifact 使用 `GA-0001-GA-0010` 这类 Global Atom ID ranges，暂停并更新 artifacts，使其枚举 exact IDs。
    - 如果 task summary 或 proof 弱于其 Global Atoms、specs、design 或 acceptance slice，先更新 artifacts 再实现。
    - 如果 task descriptions、acceptance/proof explanations 或 execution evidence expectations 是英文主导且非 source-native identifiers，先更新 artifacts 再实现。
    - 如果实现暴露出 artifacts 与 obligation atoms 或 original source docs 不一致，暂停并更新 artifacts，不得用代码绕过 mismatch。
    - 如果实现新增或发现新的 operation、state、branch、terminal outcome、async step、event、job、provider branch、storage branch、auth/security branch 或 responsive variant，先更新 `Verification Appendix`、`Runtime Acceptance Index`、owning AC-local contract、AC tasks 和 Test Evidence Matrix，再继续实现或勾选；不要把新 runtime/test 详情直接塞进 checkbox task。
    - 对用户可见的 mutating/selection/action control，勾选相关 task 前必须通过实际 runtime surface 执行 user-equivalent interaction（click/type/select/blur/submit/keyboard 等），并断言 handler/API 被触发、响应或持久化数据正确、rendered UI 更新且 reload/readback 后仍成立。静态 markup、截图、`data-testid`、enabled/disabled 或 API-only proof 不得单独作为操作已实现的完成依据。
    - 执行 proof strength：browser E2E 必须来自真实浏览器交互；component 必须来自可交互 component harness；API、DB、worker、SSE、visual、security 和 config/ops proof 必须分别来自对应 runtime/boundary 的命令结果、readback、artifact 或日志事实。静态 DOM、截图、`data-testid`、enabled/disabled、API-only proof、mock response 或 broad command 只能作为补充，不能单独支撑 required behavior completion。
    - 对 state/branch/terminal outcomes，勾选相关 task 前必须执行对应 Test IDs，断言进入条件、可观察 UI/API 结果、数据或事件事实、允许的 next states、terminal 标记和 recovery/retry 行为。成功状态测试不能替代失败/dispatch/timeout/unauthorized 等独立终态。
    - 对 async/realtime chain，勾选相关 task 前必须证明 chain matrix 中要求的 success 和 relevant failure variants。手工注入 `EventSource`、Playwright route intercept、fixture snapshot、直接 DB seed 或 isolated unit test 可作为补充，但不能作为唯一 proof 替代 queue/worker/domain/outbox/SSE/browser/readback 的 required default path 或 source-compatible deterministic path。
    - 测试相关 evidence 必须由 worker、change-stabilizer 或 CI collector 在运行固定命令后生成或收集到 `openspec-results/<change-slug>/<AC-ID>/<Test-ID>/`，其中 `<Test-ID>` 必须匹配 `T-[0-9]{3}`。执行方负责清理或隔离目录、捕获 stdout/stderr 到 `command.log` 或保存 runner/CI result/report、复制 runner/CI result/report 并保存截图、trace、DOM/API/DB/job/log facts。`/tmp`、未复制的 runner 默认输出、未复制到 canonical directory 的 agent 当场手工截图或口述路径不能作为最终 proof。
    - 测试代码负责行为断言和 runner artifact/attachment 产出；canonical `command.log`、runner/CI result/report 和 `openspec-results/<change-slug>/<AC-ID>/<Test-ID>/` 由 worker、change-stabilizer 或 automation 管理。如果需要业务 readback facts，使用 runner report、machine-readable attachment 或记录的 artifact directory，由 worker、change-stabilizer 或 automation 复制和保存。
    - 工作时维护 AC/Test-local execution evidence：对每个完成的 checkbox，按 `Test Evidence Matrix` 保存满足 task 的 fixed command、canonical rendered artifact、API/DB/job/storage/log/audit fact、`command.log`、runner/CI result/report 或 default-path proof；没有当前 worktree 的命令输出、exit code、`command.log` 或 runner/CI result/report，不得勾选依赖该 Test ID 的 task。
    - 当前 AC final verification / acceptance checkbox 勾选前，必须执行 AC evidence audit 并修复本 AC 所有 execution evidence / deposit 缺口；final proof 只能消费已经通过各自 AC evidence gate 的前置 evidence，不得把 final gate 作为前置 AC 执行证据的首次 canonicalization 检查。
    - 实现前必须执行 Testing Quality Core plan audit；该 gate 不要求 apply-owned evidence 已存在。当前 AC 完成前必须执行 AC evidence audit。change-stabilizer 完成前必须执行全量 Testing Quality Core final audit，final-reviewer 只读复核该结果。`Regression Test Deposit` 停留 `required`、evidence final 状态不完整或 execution evidence 缺失等问题默认是 worker 或 change-stabilizer 必须修复的未完成工作；只有无法在当前 change scope 内自主解除时，才成为流程级 blocker。
    - 所有 tasks 勾选后，必须启动一次 change-stabilizer，对三张 `Acceptance-Driven Coverage` 表、`Runtime Acceptance Index`、每个 AC-local contract、`Verification Appendix` 六张矩阵、`Regression Test Deposit` 和 `openspec/schemas/shared/verification-regression-gates.md` 的 verification/regression/anti-pattern gates 做全局收敛和 final audit，对照 completed tasks、implementation evidence、verification evidence、Global Atoms、runtime rows、Test IDs、fixed commands、canonical evidence directories、execution evidence、永久回归测试文件、回归命令和 anti-implementation-detail 边界。change-stabilizer 完成后必须启动只读 final-reviewer；只有 final-reviewer 返回 pass，change 才 ready for archive。若 final-reviewer 仍返回 blocker，停止 apply 并交人工查验。
