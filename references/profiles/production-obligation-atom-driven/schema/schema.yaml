name: production-obligation-atom-driven
version: 4
description: 面向生产实现的 obligation atom 工作流：proposal -> specs -> design -> acceptance-driven tasks，直接消费 openspec/orchestrate 的 canonical change packets，并按 artifact projection 区分 spec requirement、spec guard、design obligation、verification obligation 与 contextual-only atom
artifacts:
  - id: proposal
    generates: proposal.md
    description: 带 final change obligation atom 覆盖登记表的初始 proposal
    template: proposal.md
    instruction: |
      创建 proposal，说明 WHY 此 production change 必要、WHAT production capability boundary 由它负责、WHICH final obligation atoms 必须被后续 artifacts 覆盖，以及每个 atom 应投射到 specs、design、tasks/proof 还是 guard/context。

      核心规则：
      - 本 schema 直接消费当前已存在的 `openspec/orchestrate/change-capability-anchors/` canonical change packets 与 `obligation-atom-index.md`。proposal 阶段只允许使用这些最小权威读集，不得创建或要求任何新的 proposal 前置 source artifact。
      - 当前 Phase 4 final change packet：`openspec/orchestrate/change-capability-anchors/<change-slug>/<change-slug>.md` 是唯一 canonical change contract。它独占定义本 change 的 direct scope、capability 归属、artifact projection、contextual/preserve/non-goal guard、upstream realized baseline、downstream constraints、evidence burden 和 blockers。
      - `openspec/orchestrate/change-capability-anchors/obligation-atom-index.md` 只作为 GA lookup table，用于校验 `GA-####` 存在并补齐 `Source Document`、`Lines`、`Atom Type`、`Source Fact`、`Normativity`、`Coverage Status`、`Artifact Projection`、`Source Atom Origins`、`Propose Use` 和 `Evidence Need`。它不得覆盖当前 final change packet 的 direct scope、artifact projection 或 capability 归属。
      - `openspec/orchestrate/change-capability-anchors/index.md` 只用于 packet discovery。`change-plan.md` 只在自动推断 change slug 或核对 roadmap 顺序时读取，不得覆盖 final change packet。
      - 除 canonical change packet、global atom index 和必要 capability views 外，其他 orchestrate/review/report 产物都不是 proposal 门禁或内容权威。proposal 不得从这些文件新增、删除、移动、重判 direct atom，也不得用它们扩展 final packet 之外的 scope。
      - 不得创建或依赖 `source-truth.md`、`acceptance.md`、旧版 source coverage artifact、`change-source-map.md` 或任何新的 proposal 前置 source artifact。
      - Proposal 必须包含 `Change Atom Coverage Register`，对当前 packet 的每个 `Direct Owning Atoms` 行引用 exact Global Atom ID（`GA-0001` 这种格式），并记录 `Artifact Projection` 和 `Projection Source`。下游 artifacts 必须引用 exact `GA-####`，不得使用 ranges。
      - Proposal 可以将 obligation atoms 组织为简洁的产品或技术范围，但不得遗漏、弱化或窄化 packet/global index 记录的任何 direct source-backed behavior、preserve boundary、explicit non-goal、dependency、failure path、verification obligation、artifact projection 或 proposal-level implementation gap。
      - Proposal 必须证明每个 direct atom 都已通过 global index 中的 `Source Document` + `Lines` 定点重读原文。对 contextual、contextual-preserve、explicit-non-goal、prototype-only-not-production 等 non-direct atoms，在需要保留边界或避免误扩 scope 时定点重读。

      写入前：
      - 读取 `openspec/orchestrate/change-capability-anchors/index.md`，定位 exact planned change 和 packet path；change slug 必须来自该 final packet index。
      - 如果用户未提供明确 change，或需要核对 dependency/roadmap 顺序，再读取 `openspec/orchestrate/change-plan.md`；读取目的只限自动推断，不得覆盖 final packet。
      - 读取当前 final change packet：`openspec/orchestrate/change-capability-anchors/<change-slug>/<change-slug>.md`。proposal 的 direct scope、capability 归属、artifact projection、contextual/preserve/non-goal guard、upstream baseline、downstream constraints、evidence burden 和 blockers 均以该 packet 为准。
      - 读取 `openspec/orchestrate/change-capability-anchors/obligation-atom-index.md`。
      - 只有当 packet 中某个 capability increment 需要拆分 spec file 或 packet 明确要求读取 capability view 时，才读取对应 `openspec/orchestrate/change-capability-anchors/<change-slug>/capability-anchors/<capability>.md`；这些 view 只能辅助分组，不得覆盖 final packet。
      - 检查 `openspec/specs/` 只用于判断 proposal capabilities 是新增还是修改；existing specs 不得窄化或替代 final packet/global index。
      - 对每个 direct `GA-####`，按 global index 中的 source path 和 line range 定点重读原始 source window；不得重新做全量 source discovery。
      - 记录 `Source Window Read Set`，列出每个 direct atom 的重读 source window；non-direct atom 只在需要边界确认时列入。

      阻断条件：
      - change 不存在于 final packet index；用户指定的 change 不在 final packet index 中时，不得用 `change-plan.md` 或旧 packet 猜测替代。
      - 当前 change packet 缺失、没有 `Direct Owning Atoms` 表、direct atom 缺失 artifact projection 且无法按 legacy inference 保守推断，或记录影响本 change 的 blocker。
      - packet 中 direct atom 在 `obligation-atom-index.md` 中不存在，或 final packet 内部的 direct atom、capability、evidence burden、blocker 信息无法自洽。
      - packet 明确要求的 capability view file 缺失，且没有记录明确的非阻断 capability gap。
      - direct atom 指向的 source document、line range 或 source window 无法定点重读。
      - 用户请求扩展到 planned change boundary 之外。此时停止并报告请求超出当前 canonical change contract；不得在 proposal 内扩 scope，也不得创建或要求 proposal 前置 source artifact。

      Global Atom ID 规则：
      - 直接使用 global atom registry 中的 `GA-####`，不得在 proposal 中重新编号为任何局部 source ID。
      - 每个 packet direct atom 在 proposal register 中必须正好有一行。
      - 保留 global atom / packet row 的 `Source Document`、`Lines`、`Atom Type`、`Source Fact`、`Normativity`、`Coverage Status`、`Artifact Projection`、final packet `Capability`、`Propose Use`、`Evidence Need`。
      - `direct` atoms 是 implementation candidates。`contextual`、`contextual-preserve`、`explicit-non-goal`、`prototype-only-not-production`、`non-production`、`blocked` 等 rows 是边界、guardrail 或 verification context；除非 packet/global index 明确要求，不得把它们转成新增实现 scope。
      - `Artifact Projection` 允许值为 `spec-requirement`、`spec-guard`、`design-obligation`、`verification-obligation`、`contextual-only`。Proposal direct register rows 不得使用 `contextual-only`；`contextual-only` 只可用于非 direct context/boundary rows。`blocked` 只可用于无法安全消费的 row。
      - 若旧版 final packet/global index 缺少 artifact projection，proposal 必须保守推断并在 register 的 `Projection Source` 写 `inferred-from-legacy-packet`：用户/系统行为、API/data/auth/security contract -> `spec-requirement`；preserve-boundary、explicit non-goal、must-not scope -> `spec-guard`；architecture/runtime/package/schema/provider/deployment shape -> `design-obligation`；test/fixture/visual/smoke/evidence -> `verification-obligation`；非 direct context -> `contextual-only`。无法安全推断时记录 blocker。
      - 每个 direct atom 必须有非空 downstream coverage expectation，且 downstream coverage 必须匹配 artifact projection：`spec-requirement` 进入 specs requirement/scenario；`spec-guard` 进入 specs guard/gate 或 non-goal；`design-obligation` 必须进入 design artifact；`verification-obligation` 必须进入 tasks/proof；非 direct `contextual-only` 只作为 context/guard。若 final packet 的 direct row 使用 `contextual-only`，必须改入 context/non-direct handling 或记录 blocker；不得留下 orphan `GA-####`。
      - Proposal 不得因为 atom 是 direct 就自动要求 specs 生成 requirement/scenario。

      Proposal-specific constraints：
      - `What Changes` 必须引用 exact `GA-####`，并在 source-backed 时命名相关 product surfaces、routes、domain commands、APIs、database entities/migrations、worker jobs、events/SSE streams、storage/assets、auth/security rules、billing/entitlement rules、observability/ops surfaces、deployment constraints 和 verification surfaces。
      - 当 direct atom 描述用户可见操作或控件能力（例如新增、编辑、删除、保存、选择、重试、返回、提交、关闭、取消、上传、下载）时，proposal 必须保留每个 operation verb 及其可观察结果：触发入口、作用对象、相关 API/data mutation、成功后的页面或持久化变化，以及 disabled/failure/recovery 边界。不得只写“支持编辑”“支持操作”而不列出具体操作和结果。
      - `Capabilities` 必须匹配 final packet 的 capability atom views，除非 packet 记录 source-backed conflict 或 blocker。
      - `Production Source Coverage` 必须列出 proposal register 中 exact source files、line ranges 和 `GA-####`。不得新增宽泛整篇文档读取义务。
      - `Source Window Read Set` 必须列出每个重读 source window、匹配 `GA-####`，以及重读是否改变或确认 proposal interpretation。
      - `Non-Goals` 必须包含 explicit non-goal、later-change、preserve、prototype-only、superseded 或 forbidden-drift atoms 对本 change 的约束。
      - Proposal 必须把 source 只留给 propose/design 的实现细节（例如 API route 命名或最小 schema 选择）保留为 open design decisions，而不是伪装成 source-defined。

      必需章节：
      - **Obligation Atom Preconditions**
      - **Why**
      - **Change Plan Boundary**
      - **What Changes**
      - **Capabilities**
      - **Change Atom Coverage Register**
      - **Production Source Coverage**
      - **Source Window Read Set**
      - **Non-Goals**
      - **Impact**
      - **Rollout / Readiness**
      - **Proposal Alignment Gate**
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: 从 proposal obligation atoms 派生的详细规格
    template: spec.md
    instruction: |
      创建 specification files，定义 production system 应该做什么。

      写入前：
      - 先读取 `proposal.md`。把其中的 `Change Atom Coverage Register` 作为本 change 的 mandatory source-reading interface，并读取每行 `Artifact Projection`。
      - 对 proposal 中列出的每个 capability，读取当前 change 的 capability atom view file：`openspec/orchestrate/change-capability-anchors/<change-slug>/capability-anchors/<capability>.md`。随后先判定该 capability 是否有 `spec-requirement` 或 `spec-guard` delta；没有 spec-level delta 的 capability 不创建 spec file。
      - 对每个选中 `GA-####`，仅在需要保留 exact behavior、identifiers、failure paths 或 verification expectations 时，按 proposal register 的 `Source Document` + `Lines` 定点重读原始 source window。
      - 起草前建立 capability-to-atom map 和 artifact-projection map。每个 proposal direct `GA-####` 必须按 projection 映射到 requirement/scenario、spec guard、已有 delta spec 的 Artifact Projection Notes、或明确记录为 design/tasks handoff。
      - 如果修改 existing capability，起草 delta spec 前读取 `openspec/specs/<capability>/spec.md`。

      Obligation Atom closure：
      - Specs 必须把 capability 相关且 `Artifact Projection: spec-requirement` 的每个 direct obligation atom 转成规范性 requirements 和 scenarios，或在 proposal register 支持时明确捕获为 preserve/deferred/non-goal guard。
      - `Artifact Projection: spec-guard` 的 atom 应作为 guard、must-not、non-goal 或 Production Alignment Gate 约束表示，不得膨胀成新的正向行为。
      - `Artifact Projection: design-obligation` 的 atom 不得强行写成用户/系统行为 scenario。若同一 capability 已因 spec-level delta 创建 spec file，可在 `## Artifact Projection Notes` 中点名 exact `GA-####` 并声明 design artifact 的强制消费位置；若该 capability 只有 design-obligation，不得创建空 spec，必须在 `design.md` 和 `tasks.md` coverage 中消费。后续 `design.md` 必须实际落到 design obligation、implementation boundary 或 blocker。
      - `Artifact Projection: verification-obligation` 的 atom 应记录 proof expectation。若同一 capability 已因 spec-level delta 创建 spec file，可在 `## Artifact Projection Notes` 中声明 tasks/proof 的强制消费位置；若该 capability 只有 verification-obligation，不得创建空 spec，必须在 `tasks.md` proof/coverage 中消费。除非它也定义 normative behavior，不得伪造成 requirement。
      - `Artifact Projection: contextual-only` 不成为新增 requirement；它只允许用于非 direct context/boundary rows，并只在已有 delta spec 的 gate/notes、proposal non-goal、design 或 tasks 中保留必要边界。
      - 每个 requirement 必须在 `Source Atoms:` 下引用 exact `GA-####`。
      - Global Atom references 必须枚举 exact IDs，例如 `GA-0001, GA-0002, GA-0003`。禁止 `GA-0001-GA-0010`、`GA-0001..GA-0010`、`GA-0001 through GA-0010` 等 ranges。
      - Requirements 和 scenarios 必须保留 `spec-requirement` obligation atoms 中 implementation-relevant edge cases、failure states、disabled states、data/API contracts、auth/security rules 和 operational constraints；verification/design atoms 不强制写入 scenario，也不得为了 handoff 生成空 spec，但后续 design/tasks artifacts 必须按 projection 实际消费。
      - Specs 后不得留下 spec-level orphan direct atom。若某 direct atom 不产生 requirement/scenario 且同 capability 已有 delta spec，spec 可点名 exact `GA-####`，解释 source-backed boundary status、artifact projection、design/tasks handoff。若某 capability 没有任何 spec-level delta，则不创建 spec file；该 capability 的 direct atoms 必须在 proposal register、design atom matrix、tasks coverage 中闭环。

      只为有 OpenSpec delta 的 capability 创建 spec file：
      - New capabilities: 仅当至少有一个 `spec-requirement` 或 `spec-guard` 需要新增 requirement/guard 时，使用 exact kebab-case capability name（`specs/<capability>/spec.md`）。
      - Modified capabilities: 仅当 existing requirement 需要 ADDED/MODIFIED/REMOVED/RENAMED delta 时，使用 `openspec/specs/<capability>/` 中已有 spec folder name。
      - 禁止创建只包含 `## Artifact Projection Notes`、只写“无”、或没有 `### Requirement:` 的 `specs/<capability>/spec.md`；这类文件不是有效 delta spec，归档时会被 OpenSpec CLI 拒绝。

      Delta operations：
      - 新行为使用 `## ADDED Requirements`。
      - 变化行为使用 `## MODIFIED Requirements`，修改前必须复制完整 existing requirement block。
      - 删除行为只在有 **Reason** 和 **Migration** 时使用 `## REMOVED Requirements`。
      - 重命名只在有 `FROM:` / `TO:` 时使用 `## RENAMED Requirements`。

      Format requirements：
      - 每个 requirement：`### Requirement: <name>` 后跟 normative behavior。
      - Requirement names 和 scenario names 由 agent 拟定时应优先中文。只有 exact source-native names、existing requirement names、API/DB/package identifiers 或稳定技术术语才保留英文。
      - 使用 SHALL/MUST/MUST NOT 写规范行为。
      - 每个 requirement 必须包含 `Source Atoms:` bullets，列出 exact `GA-####` 和简短 obligation 摘要。
      - 每个 requirement 必须包含 `Source Trace:` bullets，列出 concrete source paths、line ranges、product workflows、architecture sections、routes、domain commands、DTOs、tables、migrations、events、jobs、queues、storage assets、auth rules、entitlement rules、prototype scenes、object states、fixture slices、responsive rules、ops processes、deployment environments 或 verification rows。
      - 每个 scenario 使用 `#### Scenario: <name>`，且必须使用 exactly 4 hashtags。
      - 每个 requirement 必须至少有一个 scenario。
      - 若 source-backed requirement 包含多个用户可见操作（例如新增、编辑、删除、选择和提交），scenario 必须逐项枚举这些操作或拆成多个 scenario；每个操作都要定义用户触发、预期 UI 变化、API/data 后果、持久化或 reload 后结果，以及适用的 disabled/failure/recovery 行为。只证明控件、data attribute、截图或静态 markup 存在，不足以表达“支持该操作”。

      Final alignment gate：
      - 每个 spec file 必须以 `## Production Alignment Gate` 结束。
      - 若已存在的 spec file 覆盖任何非 `spec-requirement` direct atom，必须在 gate 前包含 `## Artifact Projection Notes`，列出 `Global Atom ID`、`Artifact Projection`、`Spec Handling` 和 `Design / Tasks Handoff`。不得为了这张表单独创建 spec file。
      - Gate 必须列出 covered Global Atom IDs、artifact projection coverage、source docs and line ranges read、capability atom view file consumed、product workflow coverage、prototype route/object/responsive coverage（相关时）、architecture/module coverage、data/API/backend coverage、auth/security/privacy coverage、async/realtime/worker coverage、storage/asset coverage、observability/ops/deployment coverage、verification coverage 和 forbidden drift checked。
      - Gate 必须包含 `Orphan direct atoms: none` 或列出 blockers，并列出用于 exact behavior 的 focused source windows。
      - 如果任何 spec-level relevant direct atom 未被 requirement/scenario、已有 spec file 的 Artifact Projection Notes 或 gate 表示，停止并修订 proposal/specs 后再继续。纯 design/verification-only capability 的 closure 在 design/tasks 阶段检查。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: 由 obligation atoms 支撑实现细节的技术设计文档
    template: design.md
    instruction: |
      创建设计文档，说明 HOW to implement the production change。

      写入前：
      - 读取 proposal 和所有实际生成的 delta specs；不要期待纯 design/verification-only capability 有 spec file。
      - 使用 proposal 的 `Change Atom Coverage Register`、`Artifact Projection`、spec `Source Atoms`、spec `Source Trace` 和存在时的 spec `Artifact Projection Notes` 作为 source-reading interface。
      - 当 design 需要 exact product behavior、architecture/module boundaries、data/API shape、auth/security constraints、async/worker behavior、UI/prototype fidelity、observability、deployment 或 verification detail 时，只通过 registered `GA-####` 的 focused `Source Document` + `Lines` window 定点重读原始 source。
      - 不重新发现 source truth。如果 design 需要 proposal/spec atoms 无法到达的 source detail，修订 proposal/specs 或报告 blocker。
      - 起草前建立 design atom matrix。每个 `design-obligation` direct `GA-####`、每个需要 design placement 的 `spec-requirement`、每个 `spec-guard`，以及每个 in-scope spec scenario 必须映射到至少一个 design obligation、guard handling 或 explicit blocker。

      Design-specific constraints：
      - Design 必须 source-backed。无法追溯到 Global Atoms、proposal/specs 或 focused original source lines 的设计选择必须删除或记录为 open question。
      - Design 必须为每个 spec requirement、每个 `design-obligation` atom、以及每个需要 implementation placement 的 direct atom 提供 implementation approach。
      - Design 必须说明 change 如何消费并保持 source-defined architecture、runtime、package/module boundaries、routing/navigation、data ownership、transactions、auth、async processing、realtime streams、storage、provider boundaries、rendering chain、deployment 和 verification strategy。
      - 当 obligation atoms 定义行为但未定义 exact implementation shape 时，design 必须选择最小 source-compatible technical shape，并标记为 source-backed implementation decision。不得增加产品 scope、新 capability、新 provider、新 persistent domain concept 或新的 user-visible workflow。
      - Design 不得把 source-backed production behavior 替换成 placeholder、diagnostic、mock-only、static-only、fixture-only、registry-only 或 sandbox-only 行为，除非相关 atom 明确是 deferred、non-goal、contextual、reference-only 或 prototype-only-not-production。
      - 每个 source-backed implementation decision 必须记录：它解决的 source gap、选择的最小技术形态、满足的 `GA-####`，以及为避免 scope expansion 而拒绝的更大替代方案。
      - `design-obligation` atom 必须在适用 domain 上有 module/data/API/auth/worker/frontend/ops/deployment placement；`verification-obligation` atom 必须交给 Verification Design 或 tasks proof；`spec-guard` atom 必须体现为 forbidden drift、preserve 或 non-goal guard。无法 placement 时记录 blocker，不得留给 implementer 猜测。

      Section depth requirements：
      - Architecture / Module Boundary Design 必须列出 package ownership、import direction、exported entry points、forbidden imports 和 cross-package contract locations。
      - Domain / Data / Migration Design 必须定义 table/entity shape、constraints、indexes、migration ownership、transaction boundaries、idempotency strategy、repository function contracts 和 forbidden columns/entities（适用时）。
      - API / Auth / Security Design 必须定义 route/handler responsibilities、DTO validation、session/cookie handling、actor resolution、authorization entry points、return target sanitization 和 sensitive-data redaction。
      - Async / Realtime / AI / Worker Design 必须定义 job/event/stream/provider contracts、payloads、ownership、locking/idempotency/retry behavior、sandbox/test-double boundary 和 explicit deferred boundaries。
      - Frontend / UX / Prototype Fidelity Design 必须定义 route/component responsibilities、props/events/state model、state transitions、disabled/failure/retry behavior、responsive variants 和 local-versus-persisted state。
      - 对每个会改变数据、状态、route 或用户可见结果的 UI control，Frontend / UX / Prototype Fidelity Design 必须定义 owner component、runtime/client-server boundary、event trigger、handler/action/API route、request payload、response merge 或 reload persistence、submitting/disabled/error/retry behavior。若框架需要浏览器端 runtime、hydration 或 client component 才能绑定事件，design 必须明确该边界；server/static markup 不能单独视为 mutating control 的完整设计。
      - Observability / Ops / Deployment Design 必须定义 log/event categories、allowed and forbidden fields、config keys or categories、environment differences、migration ordering、staging smoke expectations 和 rollback constraints。
      - Verification Design 必须把每个主要行为映射到 concrete proof：unit、DB integration、route/API、worker/job、SSE/outbox、provider sandbox、storage/asset、component、E2E、responsive visual/DOM check、static forbidden-drift check、config validation、log redaction assertion 或 staging smoke。
      - 对用户可见的 mutating/selection/action control，Verification Design 必须映射到 positive interaction proof：通过实际点击、输入、选择、blur/submit 或键盘操作触发，并断言 API/data 结果和 rendered UI 更新。静态 DOM、截图、`data-testid`、enabled/disabled 断言或 SSR/static render 只能作为补充，不能单独证明交互能力。

      必需章节：
      - **Context**
      - **Goals / Non-Goals**
      - **Production Source Map**
      - **Decisions**
      - **Architecture / Module Boundary Design**
      - **Domain / Data / Migration Design**
      - **API / Auth / Security Design**
      - **Async / Realtime / AI / Worker Design**
      - **Frontend / UX / Prototype Fidelity Design**
      - **Observability / Ops / Deployment Design**
      - **Verification Design**
      - **Rollout / Compatibility**
      - **Production Alignment Gate**
      - **Risks / Trade-offs**
      - **Open Questions**

      `Production Alignment Gate` 必须回答：
      - 哪些 Global Atom IDs 被 implemented、preserved、deferred 或作为 forbidden-drift guard。
      - 每个 artifact projection 是否被正确消费，尤其是 `design-obligation`、`verification-obligation` 和 `spec-guard` 是否没有被伪装成 spec requirement。
      - 每个 spec scenario 是否有 design 中对应的 implementation contract。
      - 每个 direct atom 是否有 design obligation 或 explicit blocker。
      - 每个 source-backed implementation decision 是否最小化，并记录 rejected scope-expanding alternatives。
      - 每个 data mutation 是否在适用时有 table/column/constraint/transaction/idempotency details。
      - 每个 route/API/auth path 是否在适用时有 request/session/response/error handling details。
      - 每个 UI state 是否在适用时有 owner component、transition trigger、disabled/failure/recovery behavior 和 responsive handling。
      - 每个 observability requirement 是否在适用时有 allowed fields、forbidden fields 和 failure classes/event categories。
      - 是否仍有需要 implementer 从 atoms、specs 或 design 外部推断的行为。
    requires:
      - proposal
      - specs

  - id: tasks
    generates: tasks.md
    description: 带 obligation atom traceability 和 proof 的验收驱动实现清单
    template: tasks.md
    instruction: |
      创建 task list，将 production implementation work 拆成以 acceptance 为完成标准的执行清单。

      目的：
      - 本 schema 没有独立 `acceptance.md`。`tasks.md` 是 apply-ready execution and acceptance contract。
      - Tasks 必须按 acceptance slices 分组。每个 acceptance slice 描述 user/system-observable behavior、它证明的 exact Global Atoms，以及所需 primary evidence。
      - 一个 slice 可以包含多个 implementation tasks，并且必须至少包含一个 verification 或 acceptance task，其 proof 强度足以验收该 slice。
      - 所有 tasks 完成表示 implementation 和 acceptance proof 完成。不得把最终验收延后到独立 artifact。

      写入前：
      - 读取 proposal、所有实际生成的 delta specs 和 design；不要期待纯 design/verification-only capability 有 spec file。
      - 使用 proposal 的 `Change Atom Coverage Register`、`Artifact Projection`、spec `Source Atoms`、存在时的 spec `Artifact Projection Notes` 和 design `Production Source Map` 作为 source-reading interface。
      - 仅在需要让 task proof 达到 source-equivalent 时，通过 relevant `GA-####` 的 focused `Source Document` + `Lines` windows 定点重读原始 source。
      - 将 missing 或 failed proposal/spec/design alignment gates 视为 blockers。
      - Finalizing tasks 前建立 proposal `GA-####` rows、artifact projection map、spec scenarios、design obligations、AC sections、checkbox task IDs、coverage table references、Runtime Appendix rows 和 Test Evidence rows 的索引。每个 coverage table task ID 必须解析到实际 checkbox task。
      - Finalizing tasks 前必须先建立 runtime acceptance model，再把该模型分层写入 `Runtime Acceptance Index`、AC-local execution contracts、checkbox tasks 和 `Verification Appendix`；不得先粗分 AC 再用 broad proof 补洞。
      - 写入时必须明确 artifact information ownership：coverage tables 只负责 source/spec/design coverage；`Runtime Acceptance Index` 只负责 AC 到 row/Test ID 的路由；AC section 是人工审阅和 worker 执行主入口；`Verification Appendix` 是 runtime row 详情、fixed commands、evidence directories、ledger files、fixture boundaries 和 CI runnable 状态的唯一事实来源。

      Runtime acceptance model 原则：
      - Runtime acceptance model 是 source-backed obligations 的验证投影，不是新的产品需求来源。每个 runtime row 必须回链到 proposal register row、spec requirement/scenario、design obligation、spec guard 或 verification obligation。
      - 每个 runtime row 必须包含 source basis：exact `GA-####`、spec scenario 名称、design section/obligation 或明确的 verification-obligation。无法回链的 row 只能作为非阻断工程辅助，不得成为 AC scope、产品行为或完成门禁。
      - 通用 web 最佳实践只能用于选择 proof 形态、测试层级和 evidence 强度，不能产生 source 外的 route、control、state、API、job、event、provider、storage、retry、offline、toast 或 lifecycle 行为。
      - 如果 proposal/spec/design 中出现 operation verbs、status enum、stage、terminal state、failure branch、disabled/loading/empty/retry/recovery branch、async queue/worker/provider/SSE/storage chain、auth/security branch 或 responsive variant，tasks 必须把它们抽取成 runtime acceptance model rows。
      - Runtime acceptance model 的完整细节用于主 agent preflight 和最终 audit；每个 worker 的主要输入必须是当前 AC-local execution contract 以及该 AC 引用的 Appendix rows，不得要求 worker 从完整全局矩阵自行推断当前责任。
      - 如果实现过程中发现新的 runtime state、branch、operation、event、job、API 或 terminal outcome，必须先更新 tasks 的 runtime acceptance model、AC-local execution contract 和 AC proof，再实现或勾选任务；不得让实现悄悄扩大状态空间。

      Task-writing constraints：
      - 严格遵循 checkbox format。Apply phase 解析 `- [ ]` leaf tasks。
      - 按 `## AC-### <short acceptance slice name>` headings 分组。short acceptance slice name 应优先中文，除非它是 exact source-native identifier。
      - 每个 AC section 必须包含 non-checkbox fields：`Acceptance:`、`Source Atoms:`、`Projection:`、`Spec:`、`Design:`、`Runtime Rows Owned:`、`Test IDs:`、`No-Scope Boundary:`、`Primary Proof:`、`Required Evidence:`、`Mock / Fixture Boundary:`、`Mock Policy:`。
      - AC section 只保存人工可读的验收行为、scope/no-scope、runtime row IDs、Test IDs、proof 摘要和 default-path/mock 原则；不得重复 `Verification Appendix` 中的 runtime row 详情、fixed commands、test file/name、canonical evidence directory、ledger file、fixture boundary 或 CI runnable 状态。
      - 每个 executable task 必须是 checkbox：`- [ ] AC-###.N Task description`。
      - Checkbox task descriptions 必须中文，除非 description 完全由固定 ID、commands、paths、code identifiers 或 source-native terms 构成。技术名词可以混入中文句子。
      - 每个 checkbox 后必须跟随 indented trace block，字段为 `Trace:`、`Runtime Rows:`、`Test IDs:`、`Acceptance:`、`Proof:`、`Overrides:`。
      - 每个 task block 必须与下一个 checkbox task block 之间保留一个空行。同一个 task block 的 trace fields 之间不要插入空行。
      - `Trace:` 默认写 `inherits AC-###`。只有当该 task 的 source atoms、projection、spec/design、no-scope 或 mock 边界比 owning AC 更窄或有例外时，才在 `Trace:` 或 `Overrides:` 中展开 exact override。不要在每个 task 中机械重复 AC-level Source Atoms / Projection / Spec / Design。
      - `Runtime Rows:` 必须列出该 task 负责的 Runtime Surface、Operation、State / Branch、Async / Realtime row IDs；若 task 是无 runtime 行为的 source-backed setup task，必须写 `Not applicable` 并给出理由。
      - `Test IDs:` 必须列出该 task 建立、维护或由 final verification 执行的 Test Evidence row IDs；不得重复 fixed command、test path、evidence directory 或 ledger path。每个 Test ID 只能归属一个 AC，task 只能引用 owning AC 的 Test IDs；禁止同一 Test ID 出现在多个 AC section。
      - AC sections、task overrides 和 coverage tables 中的 Global Atom references 必须枚举 exact IDs。禁止 ranges。
      - `Acceptance:` 必须描述 task 贡献证明的具体行为，而不是 file-edit summary。
      - `Proof:` 必须说明可观察证据，证明 linked Global Atoms、spec scenarios、design obligations 和 preserve constraints 达到 source-equivalent fidelity。
      - `Overrides:` 必须写 `None` 或列出该 task 相对 AC-level source/no-scope/mock boundary 的 exact override；不得把 Appendix 已定义的命令、目录或 fixture 明细复制到这里。
      - 每个 AC section 必须至少包含一个 final verification 或 acceptance checkbox，其 task ID 出现在 section 的 `Primary Proof` / `Required Evidence` 和所有相关 coverage table verification columns。
      - Checkbox task IDs 必须唯一、稳定，并匹配 owning AC prefix。Coverage tables 不得引用不存在的 task IDs。
      - 每个 AC 必须有至少一个 final verification Test ID。`Test IDs:` 只列 ID；Test ID 的固定可重跑命令、canonical evidence directory、ledger 文件和 local/CI runnable 状态只在 `Test Evidence Matrix` 中定义。
      - 每个 Test ID 必须有固定命令，例如 `pnpm test:e2e tests/e2e/pre-v1-failure-recovery.spec.ts` 或带稳定 test name/filter 的等价命令。命令必须能由审阅者在本地或 CI 直接重跑，不得依赖 agent 当场点击、临时 REPL、手工浏览器操作或口述步骤作为 primary proof。
      - Broad workspace commands 只能作为补充 proof；primary proof 必须绑定 AC-owned Test ID、Appendix row IDs、fixed command 和 canonical evidence directory。
      - 对用户可见的 mutating/selection/action requirement，AC 的 `Primary Proof`、`Required Evidence`、final verification checkbox 和 coverage table `Acceptance Proof` 只写人类可读摘要并引用 Operation/State rows；trigger、request/action、expected rendered UI update、API/data assertion、reload/persistence assertion、disabled/failure/recovery branch 只在 `Operation Coverage Matrix` / `State / Branch Coverage Matrix` 中定义。
      - 如果 scenario 或 atom 使用“支持 A、B、C、D”这种多个操作的表述，tasks 不得只用一个 broad “component/browser proof” 覆盖；必须在 final verification task 中逐项执行 A、B、C、D，除非记录 blocker 并回到 specs/design 修订。

      Acceptance-driven coverage gate：
      - `tasks.md` 必须以 non-checkbox `## Acceptance-Driven Coverage` section 开头。
      - 该 section 必须按顺序包含三张非 checkbox coverage tables：`### Obligation Atom Coverage`、`### Requirement / Scenario Coverage`、`### Design Obligation Coverage`。
      - `Obligation Atom Coverage` columns：`Global Atom ID`、`Artifact Projection`、`Atom Summary`、`Acceptance Slice IDs`、`Implementation Task IDs`、`Verification Task IDs`、`Acceptance Proof`。
      - `Obligation Atom Coverage` 必须为 `tasks.md` 任意位置引用的每个 Global Atom ID 建一行，并包含 proposal 中每个 direct atom，即使它只作为 preserve 或 verification context 出现。
      - `Obligation Atom Coverage` 每行只能有一个 `GA-####`。禁止 aggregate rows、ranges 或 multi-ID cells。
      - `Requirement / Scenario Coverage` columns：`Capability`、`Requirement`、`Scenario`、`Global Atom IDs`、`Artifact Projection Handling`、`Acceptance Slice IDs`、`Implementation Task IDs`、`Verification Task IDs`、`Acceptance Proof`。
      - `Requirement / Scenario Coverage` 必须为每个 in-scope requirement scenario 建一行。不得为纯 `design-obligation` 或 `verification-obligation` atom 伪造 requirement/scenario。
      - `Design Obligation Coverage` columns：`Design Section`、`Design Obligation`、`Global Atom IDs`、`Artifact Projection Handling`、`Acceptance Slice IDs`、`Implementation Task IDs`、`Verification Task IDs`、`Acceptance Proof`。
      - `Design Obligation Coverage` 必须为每个影响 implementation、preservation 或 verification 的 material design obligation 建一行。
      - 每个 coverage row 必须映射到至少一个 acceptance slice、concrete task IDs 和 source-equivalent proof。
      - 三张表中所有 `Implementation Task IDs` 和 `Verification Task IDs` 都必须解析到实际 checkbox task。若某 row 只有 AC-level proof，则创建 explicit verification checkbox，而不是只引用 AC heading。
      - Finalizing 前比较：proposal direct `GA-####` set、artifact projection map、specs/design/tasks 中所有 `GA-####` references、`Obligation Atom Coverage` rows、checkbox trace blocks 和 AC `Source Atoms`。任何 missing、extra、status-mismatched 或 projection-mismatched ID 都是 blocker，除非明确解释为 proposal 支持的 guard/deferred/non-goal row。

      Runtime acceptance index and verification appendix gate：
      - `Acceptance-Driven Coverage` section 之后、任何 `## AC-###` section 之前，`tasks.md` 必须包含 non-checkbox `## Runtime Acceptance Index` section。若 change 不触及 web/runtime behavior，也必须写明 `Not applicable` 和 source-backed 理由。
      - `Runtime Acceptance Index` 是给主 agent preflight 使用的轻量路由表，不是 worker 的主要执行说明，也不是 runtime/test 详情来源。它必须包含 `### AC Runtime Ownership Index` table，columns 至少为：`AC ID`、`Source Basis`、`Runtime Surface Rows`、`Operation Rows`、`State / Branch Rows`、`Async / Realtime Rows`、`Test IDs`、`Scope Role`、`No-Scope-Expansion Check`、`Detail Matrix Rows`。
      - 每个 AC section 必须把 `AC Runtime Ownership Index` 中属于自己的 rows 编译为本 section 的 `Runtime Rows Owned:`、`Test IDs:`、`Required Evidence:`、`Mock / Fixture Boundary:` 摘要和 final verification checkbox；worker 不需要从完整全局矩阵自行搜索当前 AC 责任。
      - 所有 AC sections 之后，`tasks.md` 必须包含 non-checkbox `## Verification Appendix` section，并按顺序包含五张详细矩阵：`### Runtime Surface Inventory`、`### Operation Coverage Matrix`、`### State / Branch Coverage Matrix`、`### Async / Realtime Chain Matrix`、`### Test Evidence Matrix`。这五张矩阵是 runtime/test 明细唯一事实来源，用于生成质量、主 agent preflight 和最终 audit，不属于 executable work section。
      - detailed runtime matrices（除 `Test Evidence Matrix` 外）必须包含 `Source Basis`、`Projection Type`、`Scope Role`、`AC IDs`、`Test IDs`、`No-Scope-Expansion Check` columns。`Test Evidence Matrix` 必须包含 `Test ID`，并包含单数 `AC ID`、`Fixed Command`、`Evidence Directory`、`Ledger File`、`CI Runnable?`、`Source Basis`、`Projection Type`、`Scope Role`、`No-Scope-Expansion Check` columns。`Source Basis` 必须列 exact `GA-####` 或 spec/design/verification obligation；`Scope Role` 只能是 `required behavior`、`preserve boundary`、`proof-only` 或 `not applicable`。
      - `Runtime Surface Inventory` columns 至少包含：`Surface ID`、`Surface Type`、`Owner`、`Entry Point`、`Default Path Required`、`External Boundary`、`Source Basis`、`Projection Type`、`Scope Role`、`AC IDs`、`Test IDs`、`No-Scope-Expansion Check`。Surface type 覆盖适用的 UI route、client component、server action、route handler/API、DB/repository、worker/job、queue、SSE/event stream、webhook、storage/asset、auth/session、config/deployment。
      - `Operation Coverage Matrix` columns 至少包含：`Operation ID`、`Trigger`、`Control / Route`、`Request / Action`、`Expected Rendered UI Update`、`API/Data Assertion`、`Reload/Persistence Assertion`、`Disabled/Failure/Recovery Branches`、`Source Basis`、`Projection Type`、`Scope Role`、`AC IDs`、`Test IDs`、`No-Scope-Expansion Check`。
      - `State / Branch Coverage Matrix` columns 至少包含：`State ID`、`State / Branch`、`Trigger Into`、`Observable UI / API Outcome`、`Data/Event Facts`、`Allowed Next States`、`Terminal?`、`Source Basis`、`Projection Type`、`Scope Role`、`AC IDs`、`Test IDs`、`No-Scope-Expansion Check`。
      - `Async / Realtime Chain Matrix` columns 至少包含：`Chain ID`、`User/System Entry`、`Enqueue / Dispatch Fact`、`Worker / Consumer Fact`、`Domain Mutation`、`Event / Outbox Fact`、`Client Subscription / Readback`、`Rendered Terminal State`、`Failure Variant`、`Source Basis`、`Projection Type`、`Scope Role`、`AC IDs`、`Test IDs`、`No-Scope-Expansion Check`。
      - `Test Evidence Matrix` columns 至少包含：`Test ID`、`AC ID`、`Fixed Command`、`Test File / Name`、`Layer`、`Covers Rows`、`Default Path?`、`Fixture Boundary`、`Must Fail Before Implementation`、`Evidence Directory`、`Evidence Produced`、`Ledger File`、`CI Runnable?`、`Source Basis`、`Projection Type`、`Scope Role`、`No-Scope-Expansion Check`。Layer 应使用 unit、component、route/API contract、DB/integration、worker/job integration、realtime/SSE integration、browser E2E、visual/responsive、security/negative、config/ops/check 等稳定类别。
      - 每个 operation/state/branch/async row 必须至少映射一个 Test ID、一个 AC ID，并出现在 owning AC 的 `Runtime Rows Owned:` 和至少一个 checkbox `Runtime Rows:` 中，除非 `Scope Role` 为 `preserve boundary` 或 `not applicable` 且说明不需要执行 proof 的 source-backed 理由。
      - 每个 Test ID 必须覆盖具体 matrix row IDs，并且 `AC ID` 只能是一个 exact `AC-###`。禁止 `AC ID` 单元格包含逗号、多个 AC、范围或 “shared”。若同一个物理 test file/name 服务多个 AC，必须拆成多个 Test ID；这些 Test ID 可以共享物理文件，但必须有 AC-local fixed command、test name/filter 和 evidence directory。
      - 每个 Test ID 必须出现在 owning AC 的 `Test IDs:` 和相关 checkbox `Test IDs:` 中，不得出现在其他 AC section。Broad command 可作为补充 evidence produced，但 primary proof 必须绑定 AC-owned Test ID、fixed command、row IDs 和 canonical evidence directory。
      - `Evidence Directory` 必须使用 `test-results/<change-slug>/<AC-ID>/<Test-ID>/`。所有测试相关 evidence 必须保存或复制到该目录；`/tmp`、未复制的测试框架默认目录、agent 本地临时截图路径或口述路径不得作为最终验收 evidence。若 Playwright/Vitest/其他 runner 原始输出在别处，final verification task 必须复制或生成审阅所需的 curated artifacts 到 canonical directory。
      - 每个 Test ID 的 evidence produced 至少应包含 `command.log`、`ledger.json`，并按 layer 产出 screenshot、trace、DOM snapshot、API facts、DB facts、job/event facts、log/audit facts 或 failure trace。`Ledger File` 必须位于该 Test ID 的 canonical evidence directory，并记录 `change`、`acId`、`testId`、`taskId`、`runtimeRows`、`command`、`result`、`artifacts[]` 和 default-path/fixture boundary facts。
      - Fixture/mock 边界必须在 `Test Evidence Matrix` 的 `Fixture Boundary` 中逐 Test ID 声明：允许 mock/sandbox 的段、不能 mock 的 default path、以及另一个测试如何覆盖被 fixture 替换的 production path。AC 的 `Mock / Fixture Boundary:` 只保留人类可读摘要。Playwright route intercept、手工注入 `EventSource`、直接写 DB 构造终态、fixture snapshot 或 isolated unit test 不得作为 async/realtime/browser terminal state 的唯一 proof。
      - 对每个 async/realtime chain，至少应有 success terminal row 和 relevant failure terminal row 的自动 proof；若 source/design 明确只有单一终态或 failure deferred，必须在 matrix 和 owning AC 的 `Mock / Fixture Boundary:` 摘要中引用 source-backed deferred/guard 理由。
      - 对每个 user-visible operation，至少应有 user-equivalent browser/runtime proof；如果操作会改变 API/data/persistence，proof 必须在同一 AC 或互相引用的 paired tasks 中闭环到 API/data/readback。

      Proof strength：
      - 如果 atom 描述 user-visible behavior，proof 必须包含 user-equivalent interaction、browser-rendered DOM/screenshot、responsive、accessibility 或 visual evidence。
      - 如果 atom 描述 API behavior，proof 必须 call 或 test 该 contract。
      - 如果 atom 描述 persistence、data mutation、migration、idempotency 或 transaction behavior，proof 必须断言 resulting stored data 和相关 invariants。
      - 如果 atom 描述 worker、queue、provider、SSE/outbox、reconciler 或 async behavior，proof 必须通过 default wiring 或 source-compatible deterministic sandbox 覆盖该路径。
      - 如果 atom 描述 auth、security、privacy、entitlement、asset access 或 sensitive data behavior，proof 必须在相关时包含 negative/unauthorized、redaction、audit 或 privacy evidence。
      - 如果 atom 描述 failure、edge、disabled、loading 或 empty behavior，proof 必须覆盖 failing branch 和 recovery/retry path。
      - 如果 atom 描述用户可见操作，proof 必须包含 user-equivalent runtime interaction。控件存在、`data-*` 标记、截图、静态 markup、enabled/disabled 状态或 isolated render test 只能证明 affordance，不证明操作可用；它们必须与实际 click/type/select/blur/submit 和结果断言配对。
      - Broad commands 如 workspace-wide test suites 只能作为补充，除非绑定 exact AC-owned Test IDs、Appendix row IDs、fixed commands 和 canonical evidence directories。
      - Tasks 必须为每个 AC 定义 evidence ledger expectation：AC section 描述 evidence fact categories，`Test Evidence Matrix` 定义 fixed commands、canonical `test-results/<change-slug>/<AC-ID>/<Test-ID>/` artifacts、ledger files 和不能被 mocks 替代的 default-production-path proof。

      Recommended AC grouping：
      - AC sections 必须由 runtime acceptance model 反推生成，并在 `Runtime Acceptance Index` 中登记 ownership：按 externally meaningful user/system acceptance behavior、terminal state、failure/recovery branch 或 async chain segment 分组，不按文件分组。
      - 一个 AC 只拥有一个可验收行为闭环，或一个明确的异步 lifecycle 段。若一个行为包含多个 terminal states（如 success、failed、dispatch_failed、timeout、unauthorized），必须拆成多个 AC 或多个 final verification checkboxes，并在 State / Branch Coverage Matrix、`Runtime Rows Owned:` 和 checkbox `Runtime Rows:` 中逐行映射。
      - AC section 是 worker 的主要执行契约；全局三张 coverage 表只负责 source/spec/design 覆盖，`Runtime Acceptance Index` 只负责路由，`Verification Appendix` 负责 runtime/test 明细。
      - 需要体现实现顺序时，可在一个 AC 下使用多个较小 tasks。
      - 当 acceptance proof 跨层时，在每个 AC slice 内包含 final verification task。
      - Repository/runtime setup tasks 只有直接支撑 source-backed acceptance behavior 时才放入相关 AC；否则使用短 `AC-000 Repository / Runtime Support` section，并给出 concrete `Not applicable` justification。

      Final check：
      - 确认 AC names 和 checkbox task descriptions 在非 source-native identifier 时为中文。
      - 确认每个 direct atom 的 `Artifact Projection` 在 proposal、specs、design、AC sections、task overrides 与 coverage tables 中一致或有明确 handoff 理由。
      - 确认每个 direct atom 按 `Artifact Projection` 获得对应执行覆盖：`spec-requirement` 需要 implementation task 和 verification/acceptance proof；`design-obligation` 需要 design placement、必要 implementation task 和 proof；`verification-obligation` 需要 explicit verification/acceptance proof，可不伪造实现任务；`spec-guard` 需要 guard/preserve/静态或负向 proof。除非该 atom 被 proposal 明确分类为 deferred/non-goal/reference-only/guard，否则不得缺少 projection 对应的覆盖。
      - 确认每个 in-scope requirement scenario 映射到 AC section。
      - 确认每个 material design obligation 映射到 AC section。
      - 确认 `Runtime Acceptance Index` 中每个 owning row 都能解析到 AC-local `Runtime Rows Owned:`、`Test IDs:`、checkbox `Runtime Rows:` / `Test IDs:` 和 `Verification Appendix` detail matrix rows。
      - 确认 `Verification Appendix` 中每个 mandatory row 都有 source basis、scope role、AC ID、Test ID 和 no-scope-expansion check，且没有 source-less mandatory AC 或没有 owning AC 的 runtime row。
      - 确认 specs/design 中出现的 operation、state、branch、terminal outcome、async chain、failure/retry/recovery、auth/security branch、responsive variant 都已出现在相应 detail matrix、`Runtime Acceptance Index` 和 owning AC-local contract；若不适用，必须有 source-backed `Not applicable` 理由。
      - 确认每个 `Test Evidence Matrix` row 绑定具体 operation/state/branch/async row IDs，并且只有一个 exact owning `AC ID`；任何多 AC Test ID、shared Test ID、范围 AC 或同一 Test ID 出现在多个 AC-local contracts 中都是 blocker。
      - 确认每个 Test ID 有 fixed command、canonical evidence directory、ledger file、local/CI runnable 标记，并出现在 owning AC 的 `Test IDs:` 和相关 checkbox trace 中；每个 required row 至少有自动测试或明确 source-backed manual/staging gate。
      - 确认 fixed command、evidence directory、ledger file、fixture boundary 和 CI runnable 状态只在 `Test Evidence Matrix` 中定义，AC section 和 checkbox task 只能引用 Test ID 或描述 evidence category。
      - 确认每个 coverage table task ID 解析到 checkbox task，且每个 AC 有 final verification/acceptance checkbox。
      - 确认不存在 orphan direct atoms、aggregate Obligation Atom Coverage rows 或 GA ranges。
      - 确认 task 未要求 unplanned services、integrations、routes、scenes、pages、surfaces、objects、components、states、assets、APIs、tables、jobs、events、providers、deployment environments 或 source-out-of-scope behavior。
      - 确认每个 task 有 observable proof，而不只是 file-edit statement。
      - 确认没有任何 source-backed 用户可见操作只由 static DOM、screenshot、控件存在、API-only test 或 broad test command 覆盖；UI 操作、API/data mutation 和 persistence/readback 需要在同一 AC proof 中闭环，或明确拆成互相引用的 implementation 和 verification tasks。
    requires:
      - proposal
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    编码前读取 proposal、specs、design 和 tasks。通过 linked Global Atom IDs 及其 registered source document + line ranges 消费 source documents。

    实现前建立 apply preflight index：
    - Proposal Change Atom register rows、direct atoms、boundary/guard atoms 和 source line ranges。
    - Proposal Artifact Projection map。
    - Spec requirements/scenarios 及其 `GA-####` references。
    - Design obligations 及其 `GA-####` references。
    - AC sections、AC-local execution contract fields、checkbox task IDs、trace inheritance / overrides、coverage table rows、AC-owned Test IDs 和 proof/evidence requirements。
    - `Runtime Acceptance Index`：每个 AC 的 source basis、runtime surface rows、operation rows、state/branch rows、async/realtime rows、Test IDs、scope role、no-scope-expansion check 和 detail matrix row references。它只作为 routing index，不作为 row/test 详情来源。
    - `Verification Appendix`：`Runtime Surface Inventory`、`Operation Coverage Matrix`、`State / Branch Coverage Matrix`、`Async / Realtime Chain Matrix`、`Test Evidence Matrix` 的全部 row IDs、source basis、scope role、runtime detail `AC IDs`、Test Evidence owning `AC ID`、Test IDs 和 no-scope-expansion checks。Appendix 是 runtime/test detail source of truth。
    - 从 specs/design/tasks 抽取的 user-visible operation matrix：每个 mutating/selection/action control 的 trigger、handler/action/API route、expected UI update、API/data assertion、reload/persistence assertion 和 disabled/failure/recovery branch。
    - 从 specs/design/tasks 抽取的 state/branch matrix：每个 status、stage、loading、empty、disabled、locked、success、failure、retry/recovery、terminal outcome、auth/security branch、responsive variant 及其 required tests。
    - 从 specs/design/tasks 抽取的 async/realtime chain matrix：每个 queue、worker、provider、webhook、outbox、SSE、polling、storage 或 readback path 的 success/failure terminal proof。
    - Test evidence matrix：每个 Test ID、owning AC ID、fixed command、test file/name、layer、covered row IDs、default path 标记、fixture boundary、must-fail-before-implementation 要求、canonical evidence directory、ledger file、CI runnable 标记和 evidence produced。
    - 从 `Test Evidence Matrix` 汇总的 evidence ledger targets：fixed commands、canonical `test-results/<change-slug>/<AC-ID>/<Test-ID>/` artifacts、browser/rendered artifacts、API/DB/job/storage/log/audit facts 和 default-production-path proof。
    - Language gate targets：checkbox task descriptions、AC-level no-scope/mock-policy explanations 和 task-level acceptance/proof/overrides explanations。

    若 preflight index 发现 GA ranges、orphan direct atoms、artifact projection mismatch、coverage tables 中 unresolved task IDs、`Runtime Acceptance Index` 缺失或与 AC-local contract 不一致、detail runtime matrix row 缺少 source basis、mandatory row 缺少 AC ID 或 Test ID、Test Evidence row 未绑定具体 covered rows、Test Evidence row 归属多个 AC、同一 Test ID 出现在多个 AC-local contracts、缺少 fixed command、缺少 canonical evidence directory、evidence directory 不在 `test-results/<change-slug>/<AC-ID>/<Test-ID>/`、AC-local `Runtime Rows Owned:` / `Test IDs:` 无法解析到 detail matrices、checkbox `Trace:` / `Runtime Rows:` / `Test IDs:` 缺失、缺少 final verification task 的 AC sections、missing trace inheritance/overrides、英文主导 task descriptions、用户可见操作只有 presence-only/static proof，或 proof 弱于 atom/source/design obligations，暂停并更新 artifacts 后再编辑代码。
    如果 specs/design 中出现的 operation、state、branch、terminal outcome、async chain、failure/retry/recovery、auth/security branch 或 responsive variant 没有进入 `Verification Appendix`、`Runtime Acceptance Index` 和 owning AC-local contract，必须先修订 tasks；不得通过实现或测试绕过缺失矩阵行。
    如果 AC section 或 checkbox task 重复定义 fixed command、evidence directory、ledger file、fixture boundary、test file/name 或 CI runnable 状态，而不是只引用 Test ID 和 evidence category，必须先修订 tasks，保持这些明细只在 `Test Evidence Matrix` 中维护。

    Implementation 和 acceptance 在本 schema 中是同一个 workflow：
    - 按依赖顺序处理 AC sections。
    - 编辑任何 task 前，先读取当前 AC 的 AC-local execution contract：`Acceptance:`、`Source Atoms:`、`Projection:`、`Spec:`、`Design:`、`Runtime Rows Owned:`、`Test IDs:`、`No-Scope Boundary:`、`Primary Proof:`、`Required Evidence:`、`Mock / Fixture Boundary:` 和 `Mock Policy:`。
    - 编辑任何 task 前，读取该 task 的 `Trace:`、`Runtime Rows:`、`Test IDs:`、`Acceptance:`、`Proof:` 和 `Overrides:` 字段。`Trace: inherits AC-###` 表示 task 继承 AC-level Source Atoms / Projection / Spec / Design / No-Scope Boundary / Mock Policy；只有 `Overrides:` 或 `Trace:` 中列出的 exception 才覆盖 AC-level contract。
    - 编辑任何 task 前，只读取该 AC-local contract 和 task trace 引用的 Runtime Surface、Operation、State / Branch、Async / Realtime Chain 和 Test Evidence detail rows；若 task 没有相关 rows 且不是 source-backed repository/setup task，先修订 tasks。
    - 读取 linked proposal register rows，并只读取该 task 需要的 focused original source line ranges。
    - 不实现无法追溯到 proposal、specs、design、Global Atom IDs 和 original source docs 的行为。
    - 优先建立或补齐该 AC-local `Test IDs:` 和 task `Test IDs:` 对应的自动测试。实现完成前，相关 proof 应能失败或暴露缺口；实现后，相关 Test IDs 必须通过 `Test Evidence Matrix` 中的固定命令，并在 canonical evidence directory 产生可审阅 evidence。
    - 除非 task 的 `Proof:` 已执行且 linked acceptance slice 达到所需 fidelity，否则不得标记 task complete。
    - 如果 artifact 使用 `GA-0001-GA-0010` 这类 Global Atom ID ranges，暂停并更新 artifacts，使其枚举 exact IDs。
    - 如果 task summary 或 proof 弱于其 Global Atoms、specs、design 或 acceptance slice，先更新 artifacts 再实现。
    - 如果 task descriptions、acceptance/proof explanations 或 evidence ledger expectations 是英文主导且非 source-native identifiers，先更新 artifacts 再实现。
    - 如果实现暴露出 artifacts 与 obligation atoms 或 original source docs 不一致，暂停并更新 artifacts，不得用代码绕过 mismatch。
    - 如果实现新增或发现新的 operation、state、branch、terminal outcome、async step、event、job、provider branch、storage branch、auth/security branch 或 responsive variant，先更新 `Verification Appendix`、`Runtime Acceptance Index`、owning AC-local contract、AC tasks 和 Test Evidence Matrix，再继续实现或勾选；不要把新 runtime/test 详情直接塞进 checkbox task。
    - 对用户可见的 mutating/selection/action control，勾选相关 task 前必须通过实际 runtime surface 执行 user-equivalent interaction（click/type/select/blur/submit/keyboard 等），并断言 handler/API 被触发、响应或持久化数据正确、rendered UI 更新且 reload/readback 后仍成立。静态 markup、截图、`data-testid`、enabled/disabled 或 API-only proof 不得单独作为操作已实现的完成依据。
    - 对 state/branch/terminal outcomes，勾选相关 task 前必须执行对应 Test IDs，断言进入条件、可观察 UI/API 结果、数据或事件事实、允许的 next states、terminal 标记和 recovery/retry 行为。成功状态测试不能替代失败/dispatch/timeout/unauthorized 等独立终态。
    - 对 async/realtime chain，勾选相关 task 前必须证明 chain matrix 中要求的 success 和 relevant failure variants。手工注入 `EventSource`、Playwright route intercept、fixture snapshot、直接 DB seed 或 isolated unit test 可作为补充，但不能作为唯一 proof 替代 queue/worker/domain/outbox/SSE/browser/readback 的 required default path 或 source-compatible deterministic path。
    - 测试相关 evidence 必须由固定命令自动生成或由 final verification task 复制到 `test-results/<change-slug>/<AC-ID>/<Test-ID>/`。不得把 `/tmp`、未复制的 runner 默认输出、agent 当场手工截图或口述路径作为最终 proof。
    - 工作时维护 AC/Test-local evidence ledger：对每个完成的 checkbox，按 `Test Evidence Matrix` 的 Ledger File 记录满足 task 的 fixed command、canonical rendered artifact、API/DB/job/storage/log/audit fact 或 default-path proof。
    - 所有 tasks 勾选后，对三张 `Acceptance-Driven Coverage` 表、`Runtime Acceptance Index`、每个 AC-local contract 和 `Verification Appendix` 五张矩阵做最终 audit，对照 completed tasks、implementation evidence、verification evidence、Global Atoms、runtime rows、Test IDs、fixed commands、canonical evidence directories 和 evidence ledger。只有 audit 通过后，change 才 ready for archive。
