name: production-obligation-atom-driven
version: 18
description: 面向生产实现的 obligation atom 工作流；artifact graph 由本 schema 定义，artifact 内容合同由 _production-contracts 定义，trace-first 编排由 agent-runtime 定义
artifacts:
  - id: proposal
    generates: proposal.md
    description: 带 final change obligation atom 覆盖登记表的初始 proposal
    template: proposal.md
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；不得仅按 schema template 直接写 Markdown。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: 从 proposal obligation atoms 派生的详细规格
    template: spec.md
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；不得仅按 schema template 直接写 Markdown。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: 由 obligation atoms 支撑实现细节的技术设计文档
    template: design.md
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；不得仅按 schema template 直接写 Markdown。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires:
      - proposal
      - specs

  - id: runtime-acceptance
    generates: runtime-acceptance.md
    description: canonical runtime coverage registry，定义供 tasks.md 与 verification.md 共同引用的 RS/OP/ST/CH rows
    template: runtime-acceptance.md
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；不得仅按 schema template 直接写 Markdown。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires:
      - proposal
      - specs
      - design

  - id: verification
    generates: verification.md
    description: slice-only 独立测试意图、Proof Slice 原子测试义务和测试前一致性预检 artifact
    template: verification.md
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；不得仅按 schema template 直接写 Markdown。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires:
      - proposal
      - specs
      - design
      - runtime-acceptance

  - id: tasks
    generates: tasks.md
    description: 生产实现计划与运行时验收覆盖模型
    template: tasks.md
    instruction: |
      本 artifact 只作为 OpenSpec CLI entrypoint；不得仅按 schema template 直接写 Markdown。实际 propose 编排必须先读取并遵守 `openspec/agent-runtime/openspec-propose-artifacts.md`；artifact 内容契约由该 runtime 按当前 `schemaName` 和 artifact id 解析 `openspec/schemas/_production-contracts/**`。
    requires:
      - proposal
      - specs
      - design
      - runtime-acceptance

apply:
  requires: [runtime-acceptance, verification, tasks]
  tracks: tasks.md
  instruction: |
    本 schema 的 apply instruction 只定义 schema-local artifact 语义；执行顺序、subagent 编排、测试质量门禁、evidence 输出和 ready-for-archive 判定必须遵守 `openspec/agent-runtime/openspec-apply-change.md`。
    Checkpoint commit policy 也由 `openspec/agent-runtime/openspec-apply-change.md` 强制定义；checkpoint commit 只作为写入型 apply-stage agent 的过程性审计轨迹，不得作为 runtime oracle、Proof Slice evidence、verification pass、runtime row covered 或 ready-for-archive 信号。

    Apply 必须读取 proposal、实际 delta specs 或 `specs/no-spec-delta/README.md` marker、design、runtime-acceptance、verification 和 tasks。缺少 `runtime-acceptance.md` 或 `verification.md` 是 blocker；新 schema 不兼容旧 `tasks.md` 内置测试矩阵模式。
    Apply Phase 0 必须运行 `node openspec/agent-runtime/scripts/validate-production-artifacts.mjs --change "<change-slug>" --complete`；validator hard error 必须作为实现前 `Artifact Consistency Blocker`，不得启动 implementation-worker。

    `runtime-acceptance.md` 是 canonical runtime coverage registry：
    - 它定义 RS-/OP-/ST-/CH- runtime rows、source basis、runtime obligation、observable fact、owner candidate、default path policy、external boundary、scope role 和 no-scope-expansion check。
    - `tasks.md` 和 `verification.md` 只能引用其中已定义的 runtime rows，不得各自发明新的 canonical runtime row。

    `tasks.md` 是 production implementation Delivery Plane；runtime acceptance audit model 位于 `trace/tasks.trace.json`：
    - 使用 `GA-####` 作为 Global Atom ID；必须保留 proposal trace register、spec、design 和 coverage rows 中的 exact IDs，不得使用 ranges。
    - Delivery Plane 的 AC section 是 implementation slice 和 worker 默认入口；implementation worker 默认消费 AC 的 `Outcome`、`Start Gate`、`Runtime Rows`、`Resolved Runtime Contract`、`Implementation Scope`、`Preserve`、`Proof Contract` 和 checkbox tasks。
    - Delivery Plane checkbox 只能代表 production implementation work；`Proof:`、`Acceptance Proof`、coverage closure、fixture execution、截图、测试执行或 evidence collection 不得单独成为 checkbox。
    - `trace/tasks.trace.json` 的 `acceptance-driven-coverage` 负责把 obligation atoms、spec scenarios 和 design obligations 映射到 AC、implementation checkbox 和 runtime proof 摘要。
    - `trace/tasks.trace.json` 的 `runtime-acceptance-index` 和 `runtime-acceptance-projection` 只把 runtime-acceptance.md rows 投影到 provider/consumer graph、start gates、no-scope boundary、implementation task ownership 和 runtime proof categories。
    - `trace/tasks.trace.json` 中的 coverage rows 和 runtime projection 不是额外 executable work。
    - `tasks.md` 只允许更新 implementation checkbox；不得写入测试计划、测试编号、测试文件、固定命令、evidence path、执行状态或 deposit 状态。

    `verification.md` 是 independent test intent and oracle artifact：
    - Proof Slice Matrix 是唯一测试义务模型，不是执行清单；不生成、不引用任何额外业务 oracle 分组 ID。
    - `verification.md` 不重复 `Source Basis`，不重新解释 source/scope；source/scope 审计只能通过 Proof Slice -> Runtime Row IDs -> runtime-acceptance row 反查。
    - oracle 必须描述 public/runtime observable behavior，不得来自当前实现细节、私有 helper、artifact 文本结构或 OpenSpec 流程状态。
    - Proof Slice 的语义只能摘取或细分 runtime-acceptance canonical row 的 runtime obligation、observable fact、failure/branch/default/no-scope 字段，不得新增 source/scope 外 behavior。
    - 每个 required / preserve / proof-only runtime row 必须拆出所有独立可失败分支；每个分支对应一个 required Proof Slice，或有 source-backed manual/not-applicable reason。
    - 每个 Proof Slice 必须有 `Primary Runtime Row ID`，且该 row 必须存在于同一 slice 的 `Runtime Row IDs` 中；`Primary Runtime Row ID` 是 coverage/trace anchor。独立 operation、state、failure/retry、auth/security、layout、observability、fixture variant、viewport 或 redaction branch 不得合并成一个 slice；多个 atomic slices 可以共享相同 `Primary Runtime Row ID`。
    - Proof Slice 的 `Primitive Type` 只能是 `operation`、`state`、`failure`、`negative-boundary`、`layout`、`observability`、`fixture-variant`、`authorization`。
    - Proof Slice 的 `Branch / Variant`、`Oracle Fragment`、`Failure Signal` 和 `Primary Assertion Shape` 必须都是单一原子断言维度。
    - Proof Slice 的 `Primary Layer` 只能是 `unit`、`component`、`route/API`、`DB/integration`、`contract`、`worker/job`、`realtime/SSE`、`browser/e2e`、`visual/responsive`、`security/negative`。
    - Proof Slice 的 `Production Owner` 是 production owner 边界，不是测试目录、runner selector 或 evidence 目录。
    - Proof Slice 的 `Production Owner` 必须是 exactly one production code boundary token；包含逗号、多个 owner token、`+`、`/` owner list、`and`、`和` 或 `与` 的复合 owner 必须视为无效。
    - Proof Slice 必须声明 `persistent-test-required` boolean 和 `proof-evidence-mode`。`proof-evidence-mode` 只能是 `durable-test`、`readiness-command`、`build-command`、`codegen-command`、`compose-config-readback`、`static-boundary-readback`、`manual-environment`。
    - `persistent-test-required=true` 时，`proof-evidence-mode` 必须为 `durable-test`，`test-contract.primary-test-cardinality` 必须为 `exactly-one`；`persistent-test-required=false` 时，`proof-evidence-mode` 不得为 `durable-test`，`test-contract.primary-test-cardinality` 必须为 `none`。
    - 每个 Proof Slice 的 `test-contract.placement` 必须规划目录级测试落点。`persistent-test-required=true` 时，`planned-test-directory` 必须是外置 `tests/` 子树目录 glob、以 `/**` 结尾，并匹配 `Primary Layer` 的默认子树；`persistent-test-required=false` 时，`planned-test-directory` 必须为 `N/A` 且 `placement-basis` 必须为 `nonpersistent-evidence`。
    - Layer 默认目录子树：`unit -> tests/unit/**`，`component -> tests/component/**`，`route/API -> tests/api/**` 或 `tests/contract/**`，`DB/integration -> tests/integration/**`，`contract -> tests/contract/**`，`worker/job -> tests/worker/**`，`realtime/SSE -> tests/integration/**`，`browser/e2e` / `visual/responsive -> tests/e2e/**`，`security/negative -> tests/security/**` 或能真实触达边界的 layer 子树。
    - business change 中，若 `manual-environment-gate` 为 `None`，Proof Slice 默认必须 `persistent-test-required=true`。foundation change 可按 slice 标记 `persistent-test-required=false`，但仍必须提供非持久 proof evidence mode。
    - Layer / Harness / Fixture Notes 只是跨 slice 说明，不是固定测试计划；apply 阶段必须按 `openspec-apply-change.md` 和 `test-quality-strength.md` 消费 Proof Slice 生成或确认测试。
    - apply 阶段不得为了适配当前实现静默修改 `verification.md`。

    Artifact integrity blockers：
    - 静态 artifact validator 返回 hard error，必须报告 `Artifact Consistency Blocker`。
    - `runtime-acceptance.md` 缺失、runtime row ID 重复、runtime row 缺少 source basis/default path/no-scope boundary、或包含测试/任务/evidence/deposit 字段，必须报告 `Artifact Consistency Blocker`。
    - `tasks.md` 或 `verification.md` 引用了 runtime-acceptance.md 中不存在的 runtime row，必须报告 `Artifact Consistency Blocker`。
    - `tasks.md` AC 主体缺少 `Resolved Runtime Contract`，或该表 row IDs 与 AC `Runtime Rows:` 不一致，或与 runtime-acceptance.md canonical row 语义冲突，必须报告 `Artifact Consistency Blocker`。
    - runtime-acceptance.md 中 required / preserve runtime row 缺少 tasks projection 或 verification Proof Slice projection，必须报告 `Artifact Consistency Blocker`。
    - proof-only runtime row 未分类为 `production-work-required` 或 `proof-projection-only`，或 `proof-projection-only` row 被投影到新建 proof-only AC/checkbox，必须报告 `Artifact Consistency Blocker`。
    - `tasks.md` 包含只执行 proof、verification、test、fixture、screenshot、evidence、coverage closure 或 acceptance closure、且不实现 production runtime behavior 的 checkbox，必须报告 `Artifact Consistency Blocker`。
    - task-level `Runtime Rows` 包含仅由 proof/readback 观察、但该 task 不实现或实质保留的 supporting rows，必须报告 `Artifact Consistency Blocker`。
    - 同一 runtime row 在 runtime-acceptance.md、tasks.md 和 verification.md 中的 scope role、default path policy 或 no-scope boundary 冲突，必须报告 `Artifact Consistency Blocker`。
    - `tasks.md` 不得包含 `Test Evidence Matrix`、`Regression Test Deposit`、`Test Layer Plan`、`Fixed Command`、`Test File / Name`、`Evidence Directory`、`Evidence Status`、`Deposit Status` 或 `Test IDs` 字段。
    - `verification.md` 不得包含具体测试文件路径、固定测试命令、runner selector、evidence directory 或 deposit status；目录级 planned test glob 只能出现在 `Planned Test Placement Matrix` 中。
    - `verification.md` 若缺少 `Proof Slice Matrix` 或 `Planned Test Placement Matrix`、required / preserve / proof-only runtime row 未列出 expected Proof Slice、slice 缺少 `Primary Runtime Row ID`、`Primitive Type`、`Branch / Variant`、`Failure Signal`、`Regression Intent`、`persistent-test-required`、`proof-evidence-mode` 或 `test-contract.placement`，primary row 不在该 slice 的 `Runtime Row IDs` 中、slice 的 `Oracle Fragment`、`Branch / Variant` 或 `Primary Assertion Shape` 合并多个独立可失败分支、slice 混合多个 primary layer、slice 缺少 production owner、slice 的 production owner 是复合 owner / owner list、persistent-test-required 与 proof-evidence-mode/test-contract 不一致、durable slice 的 planned-test-directory 不是合法目录 glob 或不匹配 Primary Layer、non-persistent slice 未使用 `N/A + nonpersistent-evidence`、business automatic slice 关闭持久测试、runtime row 标记 covered 但 missing slice 非空、slice 引用不存在的 runtime row、或 slice 把 `tests/runtime`/repo-wide env/ops/workspace/forbidden-drift 当成默认新测试目标，必须报告 `Artifact Consistency Blocker`。
    - `verification.md` 的 oracle 若与 proposal/specs/design 冲突、引入 source 外行为、要求测试 artifact/process、重复 source/scope basis、或依赖 implementation detail，必须报告 `Artifact Consistency Blocker`。
